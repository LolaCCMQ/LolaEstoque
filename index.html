<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estoque — Lola Bar</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500;1,9..144,600&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--v:#A82A2A;--ve:#7E1E1F;--rf:#FBF7F1;--rb:#ECE3D9;--rt:#F6E7E5;--rm:#E4C8C0;--tx:#2A1A17;--ts:#92837B;--vd:#2E6B45;--am:#c4852a;--grad:linear-gradient(135deg,#B5302E,#7E1E1F);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hanken Grotesk',sans-serif;background:var(--rf);color:var(--tx);min-height:100vh;}
/* TOPBAR */
.topbar{background:var(--grad);border-bottom:none;padding:0 24px;height:72px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;color:#fff;}
.logo-area{display:flex;align-items:center;gap:14px;}
.logo-svg-wrap{height:52px;display:flex;align-items:center;}
.logo-svg-wrap svg{height:52px;width:auto;filter:brightness(0) invert(1);}
.logo-div{width:1.5px;height:34px;background:rgba(255,255,255,.4);}
.logo-app{font-size:11px;font-weight:800;color:#fff;letter-spacing:2px;text-transform:uppercase;}
.topbar-date{font-size:12px;font-weight:600;color:rgba(255,255,255,.85);}
/* LAYOUT */
.app-body{display:flex;min-height:calc(100vh - 72px);}
.sidebar{width:210px;background:#fff;border-right:1.5px solid var(--rb);position:sticky;top:60px;height:calc(100vh - 60px);overflow-y:auto;flex-shrink:0;padding:10px 0 20px;}
.ns{padding:12px 16px 4px;font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--rm);}
.ni{display:flex;align-items:center;gap:9px;padding:9px 16px;cursor:pointer;color:var(--ts);font-size:13px;font-weight:600;border-left:3px solid transparent;transition:all .15s;}
.ni:hover{background:var(--rf);color:var(--v);}
.ni.active{background:var(--rt);color:var(--v);border-left-color:var(--v);font-weight:700;}
.main{flex:1;padding:22px 22px;overflow-x:hidden;}
.ph{margin-bottom:18px;}
.ph h2{font-family:'Fraunces',serif;font-style:italic;font-size:23px;font-weight:700;color:var(--v);}
.ph p{font-size:12px;color:var(--ts);margin-top:2px;}
/* CARDS */
.card{background:#fff;border:1.5px solid var(--rb);border-radius:16px;padding:18px;box-shadow:0 4px 18px rgba(126,30,31,.06);}
.sc{background:#fff;border:1.5px solid var(--rb);border-radius:16px;padding:18px 20px;box-shadow:0 4px 18px rgba(126,30,31,.06);}
.sci{font-size:24px;margin-bottom:7px;}
.scl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--ts);}
.scv{font-family:'Fraunces',serif;font-size:30px;font-weight:700;color:var(--v);margin-top:3px;}
.scs{font-size:11px;color:var(--ts);margin-top:1px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px;}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:50px;border:none;cursor:pointer;font-family:'Hanken Grotesk',sans-serif;font-size:12.5px;font-weight:700;transition:all .15s;white-space:nowrap;}
.bp{background:var(--grad);color:#fff;} .bp:hover{background:var(--ve);}
.bo{background:transparent;color:var(--v);border:2px solid var(--v);} .bo:hover{background:var(--rt);}
.bg{background:var(--rt);color:var(--v);} .bg:hover{background:var(--rb);}
.bd{background:#fee2e2;color:#dc2626;border:1px solid #fca5a5;}
.bv{background:var(--vd);color:#fff;} .bv:hover{background:#1f5235;}
.bsm{padding:5px 12px;font-size:11.5px;} .bxs{padding:3px 8px;font-size:11px;}
/* TABS */
.tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:16px;}
.tp{padding:0 16px;border-radius:50px;cursor:pointer;font-size:12px;font-weight:700;border:2px solid var(--rb);background:#fff;color:var(--ts);transition:all .15s;height:36px;display:inline-flex;align-items:center;}
.tp:hover{border-color:var(--v);color:var(--v);} .tp.active{background:var(--v);color:#fff;border-color:var(--v);}
/* TABLE */
.tw{background:#fff;border:1.5px solid var(--rb);border-radius:14px;overflow:hidden;}
table{width:100%;border-collapse:collapse;}
thead th{padding:10px 14px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--v);background:var(--rt);font-weight:800;border-bottom:1.5px solid var(--rb);white-space:nowrap;}
thead th.tr{text-align:right;}
.tbl-saidas{table-layout:fixed;}
.tbl-saidas th,.tbl-saidas td{white-space:normal;overflow:hidden;text-overflow:ellipsis;padding-top:15px;padding-bottom:15px;}
.tbl-saidas th:nth-child(1),.tbl-saidas td:nth-child(1){width:18%}
.tbl-saidas th:nth-child(2),.tbl-saidas td:nth-child(2){width:22%}
.tbl-saidas th:nth-child(3),.tbl-saidas td:nth-child(3){width:8%}
.tbl-saidas th:nth-child(4),.tbl-saidas td:nth-child(4){width:7%}
.tbl-saidas th:nth-child(5),.tbl-saidas td:nth-child(5){width:14%}
.tbl-saidas th:nth-child(6),.tbl-saidas td:nth-child(6){width:17%}
.tbl-saidas th:nth-child(7),.tbl-saidas td:nth-child(7){width:14%}
tbody tr{border-bottom:1px solid var(--rf);transition:background .1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--rf);}
td{padding:10px 14px;font-size:13px;vertical-align:middle;white-space:nowrap;}
td .sub{font-size:10px;color:var(--ts);margin-top:2px;}
.tr{text-align:right;}
/* BADGES */
.bq{display:inline-flex;align-items:center;padding:2px 10px;border-radius:50px;font-size:10px;font-weight:700;}
.bc{background:#dbeafe;color:#1d4ed8;} .bm{background:#dcfce7;color:#166534;}
.bce{background:#fef3c7;color:#92400e;} .bev{background:#f3e8ff;color:#7c3aed;}
.bpd{background:#fef3c7;color:#92400e;} .bco{background:#dbeafe;color:#1d4ed8;}
.brsc{background:#f1f5f9;color:#64748b;font-weight:700;border:1px solid #cbd5e1;}
.bsol{background:#dcfce7;color:#166534;font-weight:800;}
.bconf{background:#dbeafe;color:#1d4ed8;font-weight:800;}
.bent{background:#f3e8ff;color:#7c3aed;font-weight:800;}
.bca{background:#fee2e2;color:#dc2626;font-weight:800;}
.brec{background:#dcfce7;color:#166534;font-weight:800;}
.bdiv{background:#fef3c7;color:#92400e;font-weight:800;}
.bprod{background:#dbeafe;color:#1d4ed8;font-weight:800;}
.bpronto{background:#fef3c7;color:#92400e;font-weight:800;}
.ben{background:#dcfce7;color:#166534;}
.bct{background:var(--rt);color:var(--v);}
/* FORM */
.fg{margin-bottom:12px;}
.fl{display:block;font-size:11px;font-weight:700;color:var(--ts);margin-bottom:4px;}
.fi,.fs,.fta{width:100%;padding:8px 12px;border:1.5px solid var(--rb);border-radius:9px;font-family:'Hanken Grotesk',sans-serif;font-size:13px;background:#fff;color:var(--tx);outline:none;transition:border-color .15s;}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--v);}
.fta{min-height:68px;resize:vertical;}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;}
.fg4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:11px;}
/* MODAL */
.ov{position:fixed;inset:0;background:rgba(44,26,26,.52);display:flex;align-items:center;justify-content:center;z-index:300;backdrop-filter:blur(4px);}
.mo{background:#fff;border-radius:18px;width:96%;max-width:560px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 50px rgba(170,43,43,.2);border:1.5px solid var(--rb);}
.mol{max-width:720px;} .moxl{max-width:900px;}
.mh{padding:18px 22px 14px;border-bottom:1.5px solid var(--rb);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;border-radius:18px 18px 0 0;z-index:1;}
.mh h3{font-family:'Fraunces',serif;font-size:18px;font-weight:700;color:var(--v);}
.mb{padding:18px 22px;}
.mf{padding:12px 22px 18px;display:flex;gap:8px;justify-content:flex-end;border-top:1px solid var(--rf);}
.xb{background:var(--rt);border:none;cursor:pointer;color:var(--v);font-size:14px;padding:5px 9px;border-radius:50px;font-weight:700;}
/* SEARCH */
.sb{display:flex;align-items:center;gap:7px;background:#fff;border:1.5px solid var(--rb);border-radius:50px;padding:6px 14px;min-width:200px;height:36px;}
.sb input{border:none;outline:none;font-family:'Hanken Grotesk',sans-serif;font-size:12px;background:transparent;width:100%;}
/* ALERTS */
.al{padding:10px 14px;border-radius:9px;font-size:12px;font-weight:600;margin-bottom:14px;}
.ali{background:var(--rt);color:var(--v);border:1.5px solid var(--rb);}
.alw{background:#fef3c7;color:#92400e;border:1.5px solid #fcd34d;}
.alo{background:#dcfce7;color:#166534;border:1.5px solid #86efac;}
/* LOADING / EMPTY */
.ld{display:flex;align-items:center;justify-content:center;height:180px;color:var(--ts);font-size:13px;gap:9px;font-weight:600;}
.sp{width:20px;height:20px;border:2.5px solid var(--rb);border-top-color:var(--v);border-radius:50%;animation:sp .8s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
.em{text-align:center;padding:44px 20px;color:var(--ts);}
.em-ic{font-size:38px;margin-bottom:12px;opacity:.5;}
.em p{font-size:13px;font-weight:600;}
/* UTILS */
.fl_{display:flex;} .aic{align-items:center;} .jb{justify-content:space-between;}
.gap2{gap:8px;} .gap3{gap:10px;}
.mt2{margin-top:8px;} .mt3{margin-top:12px;} .mt4{margin-top:16px;}
.mb3{margin-bottom:12px;} .mb4{margin-bottom:16px;}
.bold{font-weight:700;} .tv{color:var(--v);} .tvd{color:var(--vd);} .tss{color:var(--ts);font-size:12px;}
.dv{border:none;border-top:1px solid var(--rf);margin:14px 0;}
.ir{display:flex;gap:7px;align-items:center;margin-bottom:7px;padding:7px 10px;background:var(--rf);border-radius:8px;}
.abar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.eok{color:var(--vd);font-weight:700;} .ebx{color:var(--am);font-weight:700;} .ecr{color:#dc2626;font-weight:700;}
.custo-box{background:var(--rf);border:1.5px solid var(--rb);border-radius:10px;padding:12px 16px;margin-top:12px;}
@media print{.sidebar,.topbar,.no-print{display:none!important;}.main{margin:0!important;padding:0!important;}body{background:#fff;}body>*:not(.ov){display:none!important;}.ov{position:static!important;display:block!important;background:none!important;padding:0!important;overflow:visible!important;}.ov .mo{position:static!important;box-shadow:none!important;border:none!important;max-width:none!important;width:auto!important;max-height:none!important;height:auto!important;overflow:visible!important;margin:0!important;display:block!important;}.ov .mb{overflow:visible!important;max-height:none!important;height:auto!important;}.ov .xb,.ov .mf{display:none!important;}}

/* ── MOBILE ─────────────────────────────────────────────── */
.ham{display:none;background:none;border:none;cursor:pointer;padding:8px;color:var(--v)}
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:199}
@media(max-width:768px){
  .shell{flex-direction:column}
  .sidebar{
    position:fixed;top:0;left:0;bottom:0;width:260px;z-index:200;
    transform:translateX(-100%);transition:transform .25s ease;
    box-shadow:4px 0 20px rgba(0,0,0,.15);
  }
  .sidebar.open{transform:translateX(0)}
  .mob-overlay.open{display:block}
  .ham{display:flex;align-items:center;justify-content:center}
  .topbar{padding:0 12px;height:52px;gap:8px}
  .topbar .logo{height:30px}
  .topbar h1{font-size:14px}
  .main{margin-left:0!important;padding:12px!important;min-height:100vh}
  .abar{flex-wrap:wrap;gap:8px}
  .tabs{flex-wrap:wrap;gap:4px}
  .tp{font-size:11px;padding:0 10px;height:28px}
  .tw{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{min-width:500px}
  .mo{width:95vw!important;max-width:95vw!important;margin:10px auto}
  .moxl{width:95vw!important;max-width:95vw!important}
  .fg2,.fg3{grid-template-columns:1fr!important}
  .g3{grid-template-columns:1fr!important}
  .custo-box{padding:10px 12px}
  h2{font-size:20px}
}
/* Recebimento: rodape e corpo do modal rolavel */
.recv-modal .mh{flex:0 0 auto}
.recv-modal .mb{flex:1 1 auto;min-height:0;overflow-y:auto}
.recv-modal .mf{flex:0 0 auto}
/* Recebimento: tabela cabe no celular */
@media (max-width:560px){
  .recv-modal table{table-layout:fixed;width:100%}
  .recv-modal th,.recv-modal td{padding:6px 4px!important;font-size:11px!important}
  .recv-modal th{letter-spacing:0!important;font-size:9px!important}
  .recv-modal td:first-child,.recv-modal th:first-child{white-space:normal!important;word-break:break-word}
  .recv-modal th:nth-child(2),.recv-modal td:nth-child(2){width:48px}
  .recv-modal th:nth-child(3),.recv-modal td:nth-child(3){width:50px}
  .recv-modal th:nth-child(4),.recv-modal td:nth-child(4){width:58px}
  .recv-modal th:nth-child(5),.recv-modal td:nth-child(5){width:42px}
  .recv-modal td input[type=number]{width:100%!important;box-sizing:border-box;padding:5px 4px!important;font-size:12px!important}
}
</style>

/* ── SHELL ── */
 function buildShell(){
  const app=$('#app');app.innerHTML='';
  // Overlay mobile
  const mobOv=div('mob-overlay');
  app.appendChild(mobOv);
  function openSidebar(){sb.classList.add('open');mobOv.classList.add('open');}
  function closeSidebar(){sb.classList.remove('open');mobOv.classList.remove('open');}
  mobOv.addEventListener('click',closeSidebar);

  // Topbar com hamburguer
  const hamBtn=document.createElement('button');
  hamBtn.className='ham';
  hamBtn.innerHTML='<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>';
  hamBtn.addEventListener('click',e=>{e.stopPropagation();sb.classList.contains('open')?closeSidebar():openSidebar();});

  const tbLeft=div('logo-area',[div('logo-svg-wrap',null,{html:LOGO_SVG}),div('logo-div'),span('logo-app','Estoque')]);
  const tbRight=span('topbar-date',new Date().toLocaleDateString('pt-BR',{weekday:'short',day:'numeric',month:'short'}));
  const tb=div('topbar',[hamBtn,tbLeft,tbRight]);

  const menus=[
    {s:'Geral',items:[{id:'dashboard',lb:'📊 Dashboard'}]},
    {s:'Cardápio & Custos',items:[
      {id:'insumos',lb:'🧂 Insumos'},
      {id:'preproducoes',lb:'🍳 Pré-produções'},
      {id:'fichas',lb:'🍽️ Fichas Técnicas'},
    ]},
    {s:'Operações',items:[
      {id:'contagem',lb:'📦 Contagem Estoque'},
      {id:'saidas',lb:'📤 Saída de Estoque'},
      {id:'fornecedores',lb:'🏪 Fornecedores'},
      {id:'pedidos',lb:'🛒 Pedidos à Central'},
    ]},
  ];
  const sb=el('aside','sidebar');
  menus.forEach(m=>{
    sb.appendChild(span('ns',m.s));
    m.items.forEach(it=>{
      const ni=div('ni'+(it.id===PAGE?' active':''),[it.lb]);
      ni.dataset.page=it.id;
      ni.addEventListener('click',()=>{closeSidebar();nav(it.id);});
      sb.appendChild(ni);
    });
  });
  app.appendChild(tb);
  app.appendChild(div('app-body',[sb,el('main','main',null,{id:'main'})]));
}


const TITLES={dashboard:'Dashboard',insumos:'Insumos',preproducoes:'Pré-produções',fichas:'Fichas Técnicas',contagem:'Contagem de Estoque',saidas:'Saída de Estoque',fornecedores:'Fornecedores',pedidos:'Pedidos à Central'};
const SUBS={dashboard:'Visão geral das operações',insumos:'Ingredientes e matérias-primas com custo real',preproducoes:'Fichas técnicas dos preparos da cozinha',fichas:'Composição e custo dos pratos do cardápio',contagem:'Registro de estoque do CCMQ e Mac',saidas:'Registro de saídas de insumos do estoque',fornecedores:'Cadastro e gestão de fornecedores',pedidos:'Pedidos entre unidades e Cozinha Central'};

function nav(p){PAGE=p;document.querySelectorAll('.ni').forEach(n=>n.classList.toggle('active',n.dataset.page===p));renderPage();}

async function renderPage(){
  const main=$('#main');if(!main)return;
  main.innerHTML='';
  main.appendChild(div('ph',[el('h2',null,TITLES[PAGE]),el('p',null,SUBS[PAGE])]));
  const body=div(null,null,{id:'pb'});main.appendChild(body);
  const map={dashboard:pgDash,insumos:pgIns,preproducoes:pgPreps,fichas:pgFichas,contagem:pgCont2,saidas:pgSaidas,fornecedores:pgFornecedores,pedidos:pgPed};
  if(map[PAGE])await map[PAGE](body);
}

async function pgDash(c){
  c.appendChild(ld());
  try{
    const[ai,af,ap,ar,pr,uc,rv_ft,rv_pp]=await Promise.all([
      db('lola_insumos','GET',null,'?select=id&ativo=eq.true'),
      db('lola_fichas_tecnicas','GET',null,'?select=id&ativo=eq.true'),
      db('lola_pedidos','GET',null,'?select=id&status=in.(em_producao,pronto_entrega)'),
      db('lola_preproducoes','GET',null,'?select=id&ativo=eq.true'),
      db('lola_pedidos','GET',null,'?select=*&status=in.(em_producao,pronto_entrega,solicitado,confirmado)&order=data_pedido.asc'),
      db('lola_contagens','GET',null,'?order=data_contagem.desc&limit=3'),
      db('lola_fichas_tecnicas','GET',null,'?select=id,nome&ativo=eq.true&revisar=eq.true'),
      db('lola_preproducoes','GET',null,'?select=id,nome&ativo=eq.true&revisar=eq.true'),
    ]);
    c.innerHTML='';
    let fichasEl=null, contagensEl=null;
    const statsEl=div('g3',[
      mkStat('🧂','Insumos',ai.length,'ingredientes ativos'),
      mkStat('🍳','Pré-produções',ar.length,'preparos mapeados'),
      mkStat('🛒','Em produção',ap.length,'aguardando Central',ap.length>0?'var(--v)':'var(--vd)'),
    ]);
    if((rv_ft||[]).length+(rv_pp||[]).length>0){
      const tot=(rv_ft||[]).length+(rv_pp||[]).length;
      const alRev=document.createElement('div');
      alRev.style.cssText='background:#fef3c7;border:1.5px solid #fcd34d;border-radius:12px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap';
      const alL=document.createElement('div');

          if(ns!=='em_producao'&&ns!=='pronto_entrega'){row.style.opacity='0.4';row.style.pointerEvents='none';setTimeout(()=>row.remove(),800);}

        right.appendChild(sel);right.appendChild(bVer);

    c.innerHTML='';

    const cats=CATS_ORDER.filter(c=>_ins.some(i=>i.categoria===c));
    let filtCat='Todos';let filtBusca='';
    const tabW=div('tabs');
    function mkCatTabs(){
      tabW.innerHTML='';
      ['Todos',...cats].forEach(cat=>{
        const LABELS={'Bebidas Alcoólicas':'Alcoólicas','Bebidas Não Alcoólicas':'Não Alcoólicas','Cervejas':'Cervejas','Vinhos':'Vinhos','Carnes e Pescados':'Carnes','Hortifruti':'Hortifruti','Insumos Alimentos':'Alimentos','Limpeza':'Limpeza','Pães':'Pães'};

        tabW.appendChild(p);
      });
    }
    mkCatTabs();
    c.appendChild(tabW);
    c.appendChild(div('abar no-print',[
      mkSearch(q=>{filtBusca=q;drawIns($('#ins-t'));},'Buscar insumo...'),
      div('fl_ gap2',[
        btn('btn bo bsm','💰 Atualizar preços',()=>modalPrecos()),
        btn('btn bp bsm','+ Novo insumo',()=>modalIns()),
      ])
    ]));
    const w=div(null,null,{id:'ins-t'});c.appendChild(w);
    function drawIns(w){
      w.innerHTML='';
      let f=_ins;
      if(filtCat!=='Todos')f=f.filter(i=>i.categoria===filtCat);
      if(filtBusca)f=f.filter(i=>i.nome.toLowerCase().includes(filtBusca.toLowerCase()));
      if(!f.length){w.appendChild(em('🧂','Nenhum insumo encontrado'));return;}
      // agrupar por categoria se estiver em "Todos"
      if(filtCat==='Todos'){
        const grupos={};f.forEach(i=>{if(!grupos[i.categoria])grupos[i.categoria]=[];grupos[i.categoria].push(i);});
        Object.entries(grupos).forEach(([cat,itens])=>{
          w.appendChild(div('mt3 mb3',el('span','bct bold',cat,{style:'font-size:11px;letter-spacing:1px;'})));
          w.appendChild(mkInsTable(itens));
        });
      }else{
        w.appendChild(mkInsTable(f));
      }
    }
    window._drawIns=drawIns;
    drawIns(w);
  }catch(e){c.innerHTML='<p style="color:red;padding:20px">'+e.message+'</p>';}
}

function modalIns(item){
  const ed=!!item;
  // Compatibilidade: converter unidade_compra antiga 'g/ml' para unidade real
  const _unCompraReal=(()=>{
    const uc=item?.unidade_compra;
    if(!uc||uc==='g/ml') return (item?.unidade_custo==='L'?'ml':'g');
    if(uc==='un') return 'un';
    return uc; // já é valor real (g, ml, kg, L, etc)
  })();
  let f={
    categoria:item?.categoria||'Hortifruti',
    nome:item?.nome||'',
    unidade_compra:_unCompraReal,
    unidade_custo:item?.unidade_custo||'kg',
    qtd_comprada:item?.qtd_comprada||1000,
    valor_pago:item?.valor_pago||'',
    custo_por_unidade:item?.custo_por_unidade||0
  };

  // Unidades disponíveis para compra (a que aparece na embalagem)
  const UNS_COMPRA_GM=['g','ml']; // peso/volume pequeno
  const UNS_COMPRA_BIG=['kg','L']; // peso/volume grande
  const UNS_ESPECIAIS=['un','cx','pct','maço','dz'];
  const todasUns=[...UNS_COMPRA_GM,...UNS_COMPRA_BIG,...UNS_ESPECIAIS];

  // Unidade de custo depende do tipo
  function unsCusto(){
    if(f.unidade_compra==='g') return ['g','kg'];
    if(f.unidade_compra==='ml') return ['ml','L'];
    if(f.unidade_compra==='kg') return ['kg','g'];
    if(f.unidade_compra==='L') return ['L','ml'];
    if(['g/ml'].includes(f.unidade_compra)) return ['kg','L','g','ml'];
    return ['un','cx','pct','maço','dz','kg','g','ml','L'];
  }

  function calcCusto(){
    const vp=parseFloat(f.valor_pago)||0;
    const qc=parseFloat(f.qtd_comprada)||1;
    const uc=f.unidade_custo||'kg';
    const ucompra=f.unidade_compra||'g';
    // compra em g ou ml → custo em kg/L: multiplica por 1000
    if(['g','ml'].includes(ucompra)){
      if(['kg','L'].includes(uc)) return (vp/qc)*1000;
      return vp/qc;
    }
    // compra em kg → custo em kg: direto
    if(ucompra==='kg') return vp/qc;
    // compra em L → custo em L: direto
    if(ucompra==='L') return vp/qc;
    // un, cx, pct, maço, dz → direto
    return vp/qc;
  }

  const custoEl=div('custo-box mt2');
  // Campo de conversão: aparece quando unidade de compra ≠ unidade de uso
  // Ex: compra em "maço" mas usa em "g" → precisa saber quantas gramas tem 1 maço
  let f_conversao=parseFloat(item?.conversao_qtd)||0; // qtd da unidade de uso por 1 unidade de compra
  const conversaoWrap=div(null);
  conversaoWrap.style.marginBottom='8px';

  function precisaConversao(){
    const compra=f.unidade_compra||'';
    const uso=f.unidade_custo||'';
    // Se são unidades do mesmo sistema (g↔kg, ml↔L) não precisa conversão manual
    const mesmoPeso=['g','kg'].includes(compra)&&['g','kg'].includes(uso);
    const mesmoVol=['ml','L'].includes(compra)&&['ml','L'].includes(uso);
    const mesmoUn=compra===uso;
    return !mesmoPeso&&!mesmoVol&&!mesmoUn;
  }

  function atualizaConversaoWrap(){
    // Usar display em vez de innerHTML para não quebrar event listeners
    if(!precisaConversao()){conversaoWrap.style.display='none';return;}
    conversaoWrap.style.display='';
    if(conversaoWrap.querySelector('input'))return; // já foi renderizado
    conversaoWrap.style.display='';
    const compra=f.unidade_compra||'un';
    const uso=f.unidade_custo||'g';
    const inpConv=el('input','fi',null,{type:'number',step:'0.1',min:'0',
      value:f_conversao||'',placeholder:'Ex: 150'});
    inpConv.addEventListener('input',e=>{f_conversao=parseFloat(e.target.value)||0;atualizaCusto();});
    const msg=div('al ali');
    msg.style.cssText='margin-top:6px;font-size:12px';
    msg.textContent='Quantos '+uso+' tem em 1 '+compra+'? (necessário para calcular o custo por '+uso+')';
    conversaoWrap.appendChild(fgrp('📐 Conversão: '+uso+' por 1 '+compra,inpConv));
    conversaoWrap.appendChild(msg);
  }

  function calcCustoComConversao(){
    const vp=parseFloat(f.valor_pago)||0;
    const qc=parseFloat(f.qtd_comprada)||1;
    const uc=f.unidade_custo||'kg';
    const ucompra=f.unidade_compra||'g';
    // Mesmo sistema: g↔kg
    if(['g','kg'].includes(ucompra)&&['g','kg'].includes(uc)){
      if(ucompra==='g'&&uc==='kg') return (vp/qc)*1000;
      if(ucompra==='kg'&&uc==='g') return (vp/qc)/1000;
      return vp/qc;
    }
    // Mesmo sistema: ml↔L
    if(['ml','L'].includes(ucompra)&&['ml','L'].includes(uc)){
      if(ucompra==='ml'&&uc==='L') return (vp/qc)*1000;
      if(ucompra==='L'&&uc==='ml') return (vp/qc)/1000;
      return vp/qc;
    }
    // Conversão manual: ex maço → g, un → ml
    if(precisaConversao()&&f_conversao>0){
      // 1 maço = f_conversao g → custo por g = valor_por_maço / f_conversao
      const custoPorEmbalagem=vp/qc;
      return custoPorEmbalagem/f_conversao;
    }
    // Mesmo (un, cx, etc)
    return vp/qc;
  }

  function atualizaCusto(){
    const c=calcCustoComConversao();
    f.custo_por_unidade=c;
    custoEl.innerHTML='';
    const temConversao=precisaConversao();
    const valido=!temConversao||(temConversao&&f_conversao>0);
    if(temConversao&&!f_conversao){
      custoEl.appendChild(div('al alw','⚠️ Informe a conversão acima para calcular o custo corretamente.'));
    } else {
      custoEl.appendChild(div('fl_ jb aic',[
        span('tss','Custo por '+f.unidade_custo+' (unidade que usamos):'),
        el('span','bold tv',R(c)+' / '+f.unidade_custo),
      ]));
    }
    // Atualizar opções de unidade de custo
    selCusto.innerHTML='';
    unsCusto().forEach(u=>{
      const o=el('option',null,u,{value:u});
      if(u===f.unidade_custo)o.selected=true;
      selCusto.appendChild(o);
    });
    atualizaConversaoWrap();
  }

  const cats=['Bebidas Alcoólicas','Bebidas Não Alcoólicas','Cervejas','Vinhos','Carnes e Pescados','Hortifruti','Insumos Alimentos','Limpeza','Pães'];

  const selUnCompra=fsel('',todasUns,f.unidade_compra,v=>{
    f.unidade_compra=v;
    // Ajustar unidade de custo automaticamente
    if(v==='g') f.unidade_custo='g';
    else if(v==='ml') f.unidade_custo='ml';
    else if(v==='kg') f.unidade_custo='kg';
    else if(v==='L') f.unidade_custo='L';
    else f.unidade_custo='g'; // para maço, un, cx → padrão g para receitas
    f_conversao=0;
    atualizaCusto();
  });
  const selCusto=el('select','fs',null);
  selCusto.addEventListener('change',e=>{f.unidade_custo=e.target.value;f_conversao=0;atualizaCusto();});
  const inpQtd=finp('',f.qtd_comprada,v=>{f.qtd_comprada=v;atualizaCusto();},'number');
  const inpVP=finp('',f.valor_pago,v=>{f.valor_pago=v;atualizaCusto();},'number');

  atualizaCusto();

  mkModal(ed?'Editar insumo':'Novo insumo',[
    div('fg2',[
      fgrp('Categoria',fsel('',cats,f.categoria,v=>f.categoria=v)),
      fgrp('Nome do insumo',finp('',f.nome,v=>f.nome=v)),
    ]),
    div('fg2',[
      fgrp('Unidade de compra (embalagem)',selUnCompra),
      fgrp('Unidade que usamos nas receitas',selCusto),
    ]),
    conversaoWrap,
    div('fg2',[
      fgrp('Quantidade comprada',inpQtd),
      fgrp('Valor pago (R$)',inpVP),
    ]),
    custoEl,
  ],async()=>{
    f.custo_por_unidade=calcCusto();
    const p={
      categoria:f.categoria,nome:f.nome,
      unidade_compra:f.unidade_compra,   // salvar a unidade real (g, ml, kg, L, un...)
      unidade_custo:f.unidade_custo,
      qtd_comprada:parseFloat(f.qtd_comprada),
      valor_pago:parseFloat(f.valor_pago),
      custo_por_unidade:f.custo_por_unidade
    };
    if(ed)await db('lola_insumos','PATCH',p,'?id=eq.'+item.id);
    else await db('lola_insumos','POST',p);
    _ins=await db('lola_insumos','GET',null,'?select=*&ativo=eq.true&order=categoria.asc,nome.asc');
    window._drawIns&&window._drawIns($('#ins-t'));
  });
}

      '?insumo_id=eq.'+ins.id+'&order=editado_em.asc&select=*');

    mb.innerHTML='';

      div('custo-box',[span('scl','Atualizações'),div('bold mt2',hist.length+' registro'+(hist.length!==1?'s':''))]),
      div('custo-box',[span('scl','Primeira vez'),div('bold mt2',hist.length?new Date(hist[0].editado_em).toLocaleDateString('pt-BR',{month:'short',year:'2-digit'}):'—')]),
    ]));

    if(!hist.length){
      mb.appendChild(div('tss mt3 tc','Nenhum histórico de alteração registrado ainda. Os preços serão registrados automaticamente a cada atualização mensal.'));
      mo.appendChild(div('mf',[btn('btn bg','Fechar',()=>ov.remove())]));
      return;
    }

    // Montar dados com ponto atual
    const dados=[...hist.map(h=>({
      data:new Date(h.editado_em),
      preco:parseFloat(h.custo_por_unidade_novo||h.custo_novo||0),
      editor:h.editado_por||'',
    })),{data:new Date(),preco:parseFloat(ins.custo_por_unidade),editor:'atual'}];

    // Calcular variação
    if(dados.length>=2){
      const primeiro=dados[0].preco;
      const ultimo=dados[dados.length-1].preco;
      const var_pct=((ultimo-primeiro)/primeiro*100).toFixed(1);
      const cor=var_pct>0?'#dc2626':var_pct<0?'#166534':'var(--ts)';
      const seta=var_pct>0?'↑':var_pct<0?'↓':'→';
      const varEl=div('al ali mb3');
      varEl.style.cssText='padding:10px 16px;border-radius:10px;background:'+(var_pct>0?'#fee2e2':var_pct<0?'#dcfce7':'var(--rf)');
      varEl.innerHTML='<span style="font-weight:700;color:'+cor+'">'+seta+' '+Math.abs(var_pct)+'% desde o início</span> <span style="font-size:12px;color:var(--ts)">· de '+R(primeiro)+' para '+R(ultimo)+'/'+unCusto+'</span>';
      mb.appendChild(varEl);
    }

    // Gráfico SVG simples
    const precos=dados.map(d=>d.preco);
    const minP=Math.min(...precos)*0.9;
    const maxP=Math.max(...precos)*1.1||1;
    const W=480,H=160,PAD=40;
    const iW=W-PAD*2,iH=H-PAD;

    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('viewBox','0 0 '+W+' '+H);
    svg.style.cssText='width:100%;height:auto;display:block;margin-bottom:16px';

    // Linhas de grade
    [0,0.25,0.5,0.75,1].forEach(p=>{
      const y=PAD/2+iH*(1-p);
      const line=document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1',PAD);line.setAttribute('x2',W-PAD);
      line.setAttribute('y1',y);line.setAttribute('y2',y);
      line.setAttribute('stroke','#f0e0e0');line.setAttribute('stroke-width','1');
      svg.appendChild(line);
      const val=minP+(maxP-minP)*p;
      const txt=document.createElementNS('http://www.w3.org/2000/svg','text');
      txt.setAttribute('x',PAD-4);txt.setAttribute('y',y+4);
      txt.setAttribute('text-anchor','end');txt.setAttribute('font-size','9');
      txt.setAttribute('fill','#999');txt.textContent='R$'+val.toFixed(0);
      svg.appendChild(txt);
    });

    // Pontos e linha
    const pts=dados.map((d,i)=>{
      const x=PAD+iW*(i/(dados.length-1||1));
      const y=PAD/2+iH*(1-(d.preco-minP)/(maxP-minP||1));
      return {x,y,d};
    });

    // Linha
    if(pts.length>1){
      const path=document.createElementNS('http://www.w3.org/2000/svg','polyline');
      path.setAttribute('points',pts.map(p=>p.x+','+p.y).join(' '));
      path.setAttribute('fill','none');path.setAttribute('stroke','#AA2B2B');
      path.setAttribute('stroke-width','2.5');path.setAttribute('stroke-linejoin','round');
      svg.appendChild(path);
      // Área
      const area=document.createElementNS('http://www.w3.org/2000/svg','polygon');
      const areaPoints=[...pts.map(p=>p.x+','+p.y),
        (W-PAD)+','+(PAD/2+iH), PAD+','+(PAD/2+iH)].join(' ');
      area.setAttribute('points',areaPoints);
      area.setAttribute('fill','rgba(170,43,43,0.08)');
      svg.appendChild(area);
    }

    // Pontos e labels
    pts.forEach((pt,i)=>{
      const circle=document.createElementNS('http://www.w3.org/2000/svg','circle');
      circle.setAttribute('cx',pt.x);circle.setAttribute('cy',pt.y);
      circle.setAttribute('r','4');circle.setAttribute('fill','#AA2B2B');
      svg.appendChild(circle);
      // Label de preço
      const txt=document.createElementNS('http://www.w3.org/2000/svg','text');
      txt.setAttribute('x',pt.x);txt.setAttribute('y',pt.y-8);
      txt.setAttribute('text-anchor','middle');txt.setAttribute('font-size','9');
      txt.setAttribute('fill','#AA2B2B');txt.setAttribute('font-weight','bold');
      txt.textContent='R$'+pt.d.preco.toFixed(2);
      svg.appendChild(txt);
      // Label de data
      if(i===0||i===pts.length-1||pts.length<=6){
        const dtxt=document.createElementNS('http://www.w3.org/2000/svg','text');
        dtxt.setAttribute('x',pt.x);dtxt.setAttribute('y',H-4);
        dtxt.setAttribute('text-anchor','middle');dtxt.setAttribute('font-size','8');
        dtxt.setAttribute('fill','#999');
        dtxt.textContent=pt.d.editor==='atual'?'hoje':pt.d.data.toLocaleDateString('pt-BR',{month:'short',year:'2-digit'});
        svg.appendChild(dtxt);
      }
    });

    const svgWrap=div('custo-box mb3');svgWrap.appendChild(svg);
    mb.appendChild(svgWrap);

    // Tabela de histórico
    mb.appendChild(el('strong',null,'Histórico detalhado',{style:'font-size:12px;display:block;margin-bottom:8px'}));
    const tblWrap=div('tw');
    const tbl=document.createElement('table');tbl.style.cssText='width:100%;border-collapse:collapse';
    const thead=document.createElement('thead');const htr=document.createElement('tr');
    ['Data','Preço anterior','Novo preço','Variação','Editado por'].forEach((h,i)=>{
      const th=document.createElement('th');
      th.style.cssText='padding:6px 10px;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--v);background:var(--rt);text-align:'+(i>=1&&i<=3?'right':'left');
      th.textContent=h;htr.appendChild(th);
    });
    thead.appendChild(htr);tbl.appendChild(thead);
    const tbody=document.createElement('tbody');
    hist.forEach((h,i)=>{
      const tr=document.createElement('tr');
      tr.style.cssText=(i%2===0?'background:var(--rf)':'background:#fff')+';border-bottom:1px solid var(--rb)';
      const novoP=parseFloat(h.custo_por_unidade_novo||h.custo_novo||0);
      const anteP=parseFloat(h.custo_por_unidade_anterior||h.custo_anterior||0);
      const vPct=anteP>0?((novoP-anteP)/anteP*100).toFixed(1):null;
      const cor=vPct>0?'#dc2626':vPct<0?'#166534':'var(--ts)';
      [
        new Date(h.editado_em).toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'2-digit'}),
        R(anteP)+'/'+unCusto,
        R(novoP)+'/'+unCusto,
        vPct!==null?(vPct>0?'↑ +':vPct<0?'↓ ':'→ ')+Math.abs(vPct)+'%':'—',
        h.editado_por||'—',
      ].forEach((val,ci)=>{
        const td=document.createElement('td');
        td.style.cssText='padding:7px 10px;font-size:12px;text-align:'+(ci>=1&&ci<=3?'right':'left')+(ci===3?';font-weight:700;color:'+cor:'');
        td.textContent=val;tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
    tbl.appendChild(tbody);tblWrap.appendChild(tbl);
    mb.appendChild(tblWrap);

  }catch(e){mb.innerHTML='<p style="color:red;padding:20px">'+e.message+'</p>';}

  mo.appendChild(div('mf',[btn('btn bg','Fechar',()=>ov.remove())]));
}

function modalPrecos(){
  let _filtCat='Todos';
  let _filtBusca='';

  const cats=['Todos',...new Set(_ins.map(i=>i.categoria))].sort();

  function mkRows(container){
    container.innerHTML='';
    let lista=_ins;
    if(_filtCat!=='Todos') lista=lista.filter(i=>i.categoria===_filtCat);
    if(_filtBusca) lista=lista.filter(i=>i.nome.toLowerCase().includes(_filtBusca.toLowerCase()));
    if(!lista.length){container.appendChild(div('tss mt3','Nenhum insumo encontrado.'));return;}
    lista.forEach(i=>{
      const lbl=i.unidade_custo||'kg';
      const inp=el('input','fi',null,{type:'number',step:'0.01',value:N(i.custo_por_unidade,4),'data-id':i.id,'data-un':i.unidade_compra,'data-qtd':i.qtd_comprada,style:'width:110px;text-align:right'});
      container.appendChild(div('fl_ jb aic mt2',[
        div(null,[el('div','bold',i.nome,{style:'font-size:13px'}),span('tss',i.categoria+' · atual: '+R(i.custo_por_unidade)+' /'+lbl)]),
        div('fl_ aic gap2',[span('tss','R$/'+lbl+':'),inp])
      ],{style:'padding:8px 12px;background:var(--rf);border-radius:9px;gap:10px'}));
    });
  }

  // Barra de busca
  const srchInp=el('input','fi',null,{placeholder:'Buscar insumo...',style:'margin-bottom:8px'});
  srchInp.addEventListener('input',e=>{_filtBusca=e.target.value;mkRows(rowsWrap);});

  // Tabs de categoria
  const catTabs=div('tabs',null,{style:'margin-bottom:12px'});
  cats.forEach(cat=>{
    const p=span('tp'+(cat===_filtCat?' active':''),cat==='Todos'?'Todos':cat.split(' ')[0]);
    p.style.cssText='font-size:11px;padding:0 10px;height:30px';
    p.addEventListener('click',()=>{
      _filtCat=cat;
      catTabs.querySelectorAll('.tp').forEach(x=>x.classList.remove('active'));
      p.classList.add('active');
      mkRows(rowsWrap);
    });
    catTabs.appendChild(p);
  });

  const rowsWrap=div(null);
  mkRows(rowsWrap);

  const rows=_ins.map(i=>{
    const lbl=i.unidade_custo||'kg';
    const inp=el('input','fi',null,{type:'number',step:'0.01',value:N(i.custo_por_unidade,4),'data-id':i.id,'data-un':i.unidade_compra,'data-qtd':i.qtd_comprada,style:'width:110px;text-align:right'});
    return div('fl_ jb aic mt2',[
      div(null,[el('div','bold',i.nome,{style:'font-size:13px'}),span('tss',i.categoria+' · atual: '+R(i.custo_por_unidade)+' /'+lbl)]),
      div('fl_ aic gap2',[span('tss','R$/'+lbl+':'),inp])
    ],{style:'padding:8px 12px;background:var(--rf);border-radius:9px;gap:10px'});
  });
  mkModal('💰 Atualização mensal de preços',[
    div('al ali','Digite o novo custo por kg/L ou por unidade. Só altere o que mudou.'),
    srchInp,
    catTabs,
    rowsWrap
  ],async()=>{
    for(const i of _ins){
      const inp=document.querySelector('[data-id="'+i.id+'"]');
      if(!inp)continue;
      const novoCusto=parseFloat(inp.value);
      if(Math.abs(novoCusto-parseFloat(i.custo_por_unidade))>0.0001){
        const un=inp.dataset.un;
        const qtd=parseFloat(inp.dataset.qtd)||1000;
        const novoValorPago=un==='g/ml'?novoCusto*(qtd/1000):novoCusto*qtd;
        await db('lola_insumos_historico','POST',{insumo_id:i.id,custo_anterior:i.custo_por_unidade,custo_novo:novoCusto});
        await db('lola_insumos','PATCH',{custo_por_unidade:novoCusto,valor_pago:novoValorPago},'?id=eq.'+i.id);
      }
    }
    _ins=await db('lola_insumos','GET',null,'?select=*&ativo=eq.true&order=categoria.asc,nome.asc');
    window._drawIns&&window._drawIns($('#ins-t'));
    alert('✅ Preços atualizados!');
  },'mo mol');
}

function editarDestinosPP(pp, onSave){
  const DESTS=[
    {k:'ccmq',label:'CCMQ',cor:'#AA2B2B'},

async function modalPrep(item){
  const ed=!!item;
  let margInp;
  let f={nome:item?.nome||'',categoria:item?.categoria||_ppTab,rendimento_qtd:item?.rendimento_qtd||1000,rendimento_un:item?.rendimento_un||'g',custo_total:item?.custo_total||0,custo_por_unidade:item?.custo_por_unidade||0,valor_venda_central:item?.valor_venda_central||0,margem_venda:item?.margem_venda||70,porcao_qtd:item?.porcao_qtd||null,porcao_un:item?.porcao_un||null};
  const ings=[];
  const iw=div(null);

  // Carregar ingredientes existentes se editando
  if(ed && item?.id){
    try{
      const existentes=await db('lola_preproducoes_itens','GET',null,
        '?select=*,lola_insumos(id,nome,custo_por_unidade,unidade_custo,unidade_compra),lola_preproducoes_sub:sub_preproducao_id(id,nome,custo_por_unidade,rendimento_un)&preproducao_id=eq.'+item.id);
      existentes.forEach(it=>{
        const isIns=!!it.lola_insumos;
        const src=isIns?it.lola_insumos:it.lola_preproducoes_sub;
        if(!src)return;
        ings.push({
          tipo:isIns?'insumo':'prep',
          id:src.id,
          unidade:it.unidade||'g',
          qtd_bruta:it.qtd_bruta,
          qtd_liquida:it.qtd_liquida,
          fc:it.fc||1,
          custo_unitario:it.custo_unitario,
          custo_total:it.custo_total,
        });
      });
    }catch(e){console.error('Erro ao carregar itens PP:',e);}
  }

  function calcTotais(){
    const ct=ings.reduce((t,ig)=>{
      if(!ig.id&&!ig.nome_manual)return t;
      return t+parseFloat(ig.custo_total||0);
    },0);
    f.custo_total=ct;
    const qtd=parseFloat(f.rendimento_qtd)||1;
    // Calcular custo na unidade base correta
    // g → custo por kg (×1000/qtd), ml → custo por L (×1000/qtd)
    // kg, L, un, porção → custo direto (÷qtd)
    const unBase=f.rendimento_un==='g'?'kg':f.rendimento_un==='ml'?'L':f.rendimento_un;
    f.custo_por_unidade=(['g','ml'].includes(f.rendimento_un))?(ct/qtd)*1000:ct/qtd;
    const m=parseFloat(f.margem_venda)||70;
    f.valor_venda_central=f.custo_por_unidade/(m/100);
    const numPorcoes2=parseFloat(f.porcao_qtd)>0?(parseFloat(f.rendimento_qtd)/parseFloat(f.porcao_qtd)):null;
    const custoPorcao2=numPorcoes2?ct/numPorcoes2:null;
    custoResEl.innerHTML='<div class="fl_ jb mb3"><span>Custo total</span><strong>'+R(ct)+'</strong></div>'+
      '<div class="fl_ jb mb3"><span>Rendimento total</span><strong>'+N(qtd,0)+' '+f.rendimento_un+'</strong></div>'+
      (numPorcoes2?'<div class="fl_ jb mb3"><span>Porções ('+N(f.porcao_qtd,0)+' '+f.porcao_un+')</span><strong>'+numPorcoes2.toFixed(1)+'</strong></div>':'')+
      (custoPorcao2?'<div class="fl_ jb mb3"><span>Custo/porção</span><strong class="tv">'+R(custoPorcao2)+'</strong></div>':'')+'<div class="fl_ jb mb3"><span>Custo/'+unBase+'</span><strong class="tv">'+R(f.custo_por_unidade)+'</strong></div>'+
      '<div class="fl_ jb"><span>Valor venda central ('+m+'% CMV)</span><strong>'+R(f.valor_venda_central)+'</strong></div>';
  }

  // Lista unificada: insumos + sub-pré-prods em ordem alfabética
  function mkOptsUnificadaPP(){
    const ins=_ins.map(i=>{
      const uc=i.unidade_custo||'kg';
      let unUso;
      if(i.unidade_compra==='g/ml') unUso=uc==='L'?'ml':'g';
      else if(['g','ml'].includes(i.unidade_compra)) unUso=i.unidade_compra;
      else if(i.unidade_compra==='kg') unUso='g';
      else if(i.unidade_compra==='L') unUso='ml';
      else unUso=i.unidade_compra||'un';
      return {v:'ins:'+i.id,l:i.nome,custo:i.custo_por_unidade,un:unUso,tipo:'insumo',srcId:i.id};
    });
    // pré-prods exceto a própria (evitar referência circular)
    const pps=_pp.filter(p=>p.id!==item?.id).map(p=>({v:'pp:'+p.id,l:'[PP] '+p.nome,custo:p.custo_por_unidade,un:p.rendimento_un,tipo:'prep',srcId:p.id}));
    return [...ins,...pps].sort((a,b)=>a.l.localeCompare(b.l,'pt'));
  }
