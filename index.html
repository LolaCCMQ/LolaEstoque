async function renderContArea(){
  const area=$('#cont-area');
  if(!area)return;
  area.innerHTML='';
  area.appendChild(ld());
  try{
    const itens=await db('lola_estoque_itens','GET',null,'?categoria=eq.'+_contCat+'&ativo=eq.true&order=ordem.asc');
    const contagens=await db('lola_contagens','GET',null,'?order=data_contagem.desc&limit=5');
    area.innerHTML='';
    if(!itens.length){area.appendChild(em('📦','Nenhum item cadastrado para esta categoria'));return;}

    // Cards últimas contagens
    if(contagens.length){
      const hist=div('g3 mb3');
      contagens.slice(0,3).forEach(ct=>{
        const dataFmt=new Date(ct.data_contagem+'T12:00:00').toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'short'});
        const card=div('sc');
        card.style.cursor='pointer';
        card.onclick=()=>verContagem(ct);
        card.appendChild(span('scl',(ct.tipo==='quinta'?'Quinta':'Dom/Seg')+' · '+dataFmt));
        const v=document.createElement('div');v.className='scv';v.style.fontSize='16px';v.textContent=ct.responsavel||'—';
        card.appendChild(v);
        card.appendChild(span('scs','Ver contagem →'));
        hist.appendChild(card);
      });
      area.appendChild(hist);
    }

    // Buscar TODAS as contagens recentes e pegar o último valor de cada item
    // (a contagem mais recente pode não ter todos os itens)
    let ultimosItens={};
    if(contagens.length){
      // Pegar os últimas 10 contagens e para cada item, usar o valor mais recente
      const todasContIds=contagens.map(c=>c.id);
      const uItens=await db('lola_contagem_itens','GET',null,
        '?contagem_id=in.('+todasContIds.join(',')+')'
        +'&select=*,lola_contagens!contagem_id(data_contagem)'
        +'&order=lola_contagens(data_contagem).desc');
      // Para cada item, guardar só o valor mais recente (primeiro da lista)
      uItens.forEach(it=>{
        if(!ultimosItens[it.estoque_item_id]){
          const data=it.lola_contagens?.data_contagem;
          ultimosItens[it.estoque_item_id]={
            qtd:it.qtd_contada,
            pedido:it.pedido,
            data:data?new Date(data+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}):null
          };
        }
      });
    }

    // Alertas
    const abaixo=itens.filter(it=>{const u=ultimosItens[it.id];return u&&parseFloat(u.qtd)<=parseFloat(it.qtd_minima);});
    if(abaixo.length){
      const alertBox=document.createElement('div');
      alertBox.style.cssText='background:#fee2e2;border:1.5px solid #fca5a5;color:#7f1d1d;border-radius:10px;padding:12px 16px;margin-bottom:14px';
      const t=document.createElement('div');t.style.cssText='font-weight:700;font-size:13px;margin-bottom:8px';t.textContent='⚠️ Abaixo do mínimo na última contagem:';alertBox.appendChild(t);
      abaixo.forEach(it=>{
        const u=ultimosItens[it.id];
        const r=document.createElement('div');r.style.cssText='display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #fca5a580;font-size:12px';
        r.innerHTML='<span>🔴 '+it.nome+'</span><span>'+N(u?.qtd||0,1)+' '+it.unidade+' (mín: '+N(it.qtd_minima,0)+')</span>';
        alertBox.appendChild(r);
      });
      area.appendChild(alertBox);
    }

    // Tabela
    area.appendChild(div('tw',mkTable(
      ['Produto','Un. compra','Un. uso','Mín.','Última qtd','Status','Fornecedor'],
      itens.map(it=>{
        const u=ultimosItens[it.id];
        const qtd=u?parseFloat(u.qtd):null;
        const min=parseFloat(it.qtd_minima)||0;
        let statusEl;
        if(qtd===null){statusEl=span('tss','não contado');}
        else if(qtd<=0){const d=div('fl_ aic gap2');d.appendChild(span(null,'🔴'));const s=document.createElement('span');s.style.cssText='font-size:12px;font-weight:700;color:#dc2626';s.textContent='Zerado';d.appendChild(s);statusEl=d;}
        else if(qtd<=min){const d=div('fl_ aic gap2');d.appendChild(span(null,'🟠'));const s=document.createElement('span');s.style.cssText='font-size:12px;font-weight:700;color:#c4852a';s.textContent='Abaixo';d.appendChild(s);statusEl=d;}
        else if(qtd<=min*1.5){const d=div('fl_ aic gap2');d.appendChild(span(null,'🟡'));const s=document.createElement('span');s.textContent='Atenção';d.appendChild(s);statusEl=d;}
        else{const d=div('fl_ aic gap2');d.appendChild(span(null,'🟢'));const s=document.createElement('span');s.style.color='var(--vd)';s.textContent='OK';d.appendChild(s);statusEl=d;}
        const btnEdit=btn('btn bg bsm','✏️',()=>modalEditarItemEstoque(it,()=>renderContArea()));
        // Coluna última qtd com data
        let ultimaQtdEl;
        if(qtd===null){
          ultimaQtdEl=span('tss','—');
        } else {
          ultimaQtdEl=div(null);
          const qtdSpan=document.createElement('span');
          qtdSpan.style.cssText='font-weight:700';
          qtdSpan.textContent=N(qtd,1)+' '+it.unidade;
          ultimaQtdEl.appendChild(qtdSpan);
          if(u.data){
            const dataSpan=document.createElement('div');
            dataSpan.style.cssText='font-size:10px;color:var(--ts)';
            dataSpan.textContent=u.data;
            ultimaQtdEl.appendChild(dataSpan);
          }
        }
        return[el('strong',null,it.nome),el('span','tss',it.unidade_compra||it.unidade),it.unidade,N(min,0),ultimaQtdEl,statusEl,el('span','tss',it.fornecedor||'—'),btnEdit];
      }),
      [null,'tr','tr','tr','tr',null,null,null]
    )));
  }catch(e){area.innerHTML='<p style="color:red">'+e.message+'</p>';}
}

function pedFiltrados(){
  let f=_peds;
  if(_pedMes) f=f.filter(p=>p.data_pedido?.startsWith(_pedMes));
  if(_pedTab!=='todos') f=f.filter(p=>p.unidade===_pedTab||p.status===_pedTab||(_pedTab==='rascunho'&&p.status==='rascunho'));
  return f;
}

function drawPed(w){
  w.innerHTML='';
  const f=pedFiltrados();
  if(!f.length){w.appendChild(em('📋','Nenhum pedido encontrado'));return;}
  w.appendChild(div('tw',mkTable(
    ['Nº','Destino','Data','Observações','Status','Total',''],
    f.map(p=>{
      // Select de status com cor dinâmica
      const STATUS_COLORS={
        rascunho:'background:#f1f5f9;color:#64748b',
        solicitado:'background:#dcfce7;color:#166534',
        confirmado:'background:#dbeafe;color:#1d4ed8',
        entregue:'background:#f3e8ff;color:#7c3aed',
        cancelado:'background:#fee2e2;color:#dc2626',
      };
      // Rascunho: mostrar badge simples sem select (não pode mudar status)
      let statusEl;
      if(p.status==='rascunho'){
        statusEl=bq('📝 Rascunho','bct');
      } else {
        const sel=document.createElement('select');
        function applySelStyle(status){
          sel.style.cssText='padding:6px 12px;font-size:12px;font-weight:700;border-radius:50px;border:none;cursor:pointer;font-family:Nunito,sans-serif;min-width:130px;'+(STATUS_COLORS[status]||'');
        }
        applySelStyle(p.status);
        ['solicitado','confirmado','entregue','cancelado'].forEach(s=>{
          const o=document.createElement('option');o.value=s;o.textContent=s;
          if(s===p.status)o.selected=true;sel.appendChild(o);
        });
        sel.addEventListener('change',async e=>{
          await db('lola_pedidos','PATCH',{status:e.target.value},'?id=eq.'+p.id);
          p.status=e.target.value;
          applySelStyle(e.target.value);
        });
        statusEl=sel;
      }
      const destLabel=p.unidade==='ccmq'?'CCMQ':p.unidade==='mac'?'Mac':(p.destinatario||p.unidade||'—');
      return[
        el('strong',null,'#'+p.numero_pedido),
        bq(destLabel,p.unidade==='ccmq'?'bc':p.unidade==='mac'?'bm':'bev'),
        DBR(p.data_pedido),
        el('span','tss',p.responsavel||p.observacoes||''),
        statusEl,
        el('span','bold tv',R(p.valor_total)),
        (()=>{
          const wrap=div('fl_ gap2');
          wrap.appendChild(btn('btn bg bsm','📋 Ver',()=>verPedido(p)));
          wrap.appendChild(btn('btn bg bsm','✏️',()=>editarPedido(p)));
          if(p.status==='rascunho'){
            const envBtn=btn('btn bv bsm','📤 Enviar',async()=>{
              if(!confirm('Enviar pedido #'+p.numero_pedido+' para a Central?'))return;
              await db('lola_pedidos','PATCH',{status:'solicitado'},'?id=eq.'+p.id);
              p.status='solicitado';
              _peds=await db('lola_pedidos','GET',null,'?select=*&order=created_at.desc');
              drawPed($('#ped-t'));
            });
            wrap.appendChild(envBtn);
          } else {
            wrap.appendChild(btn('btn bo bsm no-print','🖨️',()=>imprimirPed(p)));
          }
          return wrap;
        })()
      ];
    }),
    [null,null,null,null,null,'tr',null]
  )));
}

let _pedTab='todos',_peds=[],_pedMes='';

async function pgPed(c){
  c.appendChild(ld());
  try{
    _peds=await db('lola_pedidos','GET',null,'?select=*&order=created_at.desc');
    c.innerHTML='';

    // Filtro de mês — dropdown estilo app de banco
    const anoAtual=new Date().getFullYear();
    const MESES_NOMES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
    const todosMeses=MESES_NOMES.map((_,i)=>anoAtual+'-'+String(i+1).padStart(2,'0'));

    const mesDropWrap=div(null);mesDropWrap.style.cssText='position:relative;display:inline-block';

    function getMesLabel(m){
      if(!m)return'Todos os meses';
      const[ano,mes]=m.split('-');
      return MESES_NOMES[parseInt(mes)-1]+'/'+String(ano).slice(2);
    }

    const mesBtnEl=document.createElement('button');
    mesBtnEl.type='button';
    mesBtnEl.style.cssText='display:inline-flex;align-items:center;gap:8px;padding:0 16px;height:36px;border-radius:50px;border:2px solid var(--rb);background:#fff;color:var(--tx);font-family:Nunito,sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s';
    const mesBtnLabel=document.createElement('span');
    mesBtnLabel.textContent='Todos os meses';
    const mesBtnArrow=document.createElement('span');
    mesBtnArrow.style.cssText='font-size:10px;opacity:.6';
    mesBtnArrow.textContent='▼';
    mesBtnEl.appendChild(mesBtnLabel);
    mesBtnEl.appendChild(mesBtnArrow);

    const mesDropdown=div(null);
    mesDropdown.style.cssText='position:absolute;top:calc(100% + 6px);left:0;min-width:200px;background:#fff;border:1.5px solid var(--rb);border-radius:14px;box-shadow:0 8px 24px rgba(170,43,43,.13);z-index:500;display:none;overflow:hidden';

    function buildMesDropdown(){
      mesDropdown.innerHTML='';
      // Opção "Todos os meses"
      const allOpt=document.createElement('div');
      allOpt.style.cssText='padding:10px 16px;cursor:pointer;font-size:13px;font-weight:700;color:'+(!_pedMes?'var(--v)':'var(--tx)')+';background:'+(!_pedMes?'var(--rt)':'#fff');
      allOpt.textContent='Todos os meses';
      allOpt.addEventListener('click',()=>{_pedMes='';closeDrop();buildMesDropdown();atualizaResumo();drawPed($('#ped-t'));});
      allOpt.addEventListener('mouseover',()=>{if(_pedMes)allOpt.style.background='var(--rf)';});
      allOpt.addEventListener('mouseout',()=>{if(_pedMes)allOpt.style.background='#fff';});
      mesDropdown.appendChild(allOpt);

      // Divisor
      const div2=document.createElement('div');div2.style.cssText='height:1px;background:var(--rb);margin:0 12px';mesDropdown.appendChild(div2);

      // Meses
      todosMeses.forEach(m=>{
        const temPedidos=_peds.some(p=>p.data_pedido?.startsWith(m));
        const opt=document.createElement('div');
        const isAtivo=_pedMes===m;
        opt.style.cssText='padding:9px 16px;cursor:pointer;font-size:13px;font-weight:'+(isAtivo?'700':'600')+';color:'+(isAtivo?'var(--v)':temPedidos?'var(--tx)':'var(--ts)')+';background:'+(isAtivo?'var(--rt)':'#fff')+';display:flex;justify-content:space-between;align-items:center';
        opt.innerHTML='<span>'+getMesLabel(m)+'</span>'+(temPedidos?'<span style="width:7px;height:7px;border-radius:50%;background:var(--v);flex-shrink:0"></span>':'');
        opt.addEventListener('click',()=>{_pedMes=m;closeDrop();buildMesDropdown();atualizaResumo();drawPed($('#ped-t'));});
        opt.addEventListener('mouseover',()=>{if(!isAtivo)opt.style.background='var(--rf)';});
        opt.addEventListener('mouseout',()=>{if(!isAtivo)opt.style.background=isAtivo?'var(--rt)':'#fff';});
        mesDropdown.appendChild(opt);
      });

      // Atualizar label do botão
      mesBtnLabel.textContent=getMesLabel(_pedMes);
      mesBtnEl.style.borderColor=_pedMes?'var(--v)':'var(--rb)';
      mesBtnEl.style.color=_pedMes?'var(--v)':'var(--tx)';
    }

    function closeDrop(){mesDropdown.style.display='none';}
    mesBtnEl.addEventListener('click',e=>{
      e.stopPropagation();
      const aberto=mesDropdown.style.display==='block';
      mesDropdown.style.display=aberto?'none':'block';
    });
    document.addEventListener('click',()=>closeDrop());

    mesDropWrap.appendChild(mesBtnEl);
    mesDropWrap.appendChild(mesDropdown);
    buildMesDropdown();

    // Alias para compatibilidade com código que chama buildMesTabs()
    function buildMesTabs(){buildMesDropdown();}

    async function recarregarPedidos(){
      const btnRef=$('#btn-refresh-ped');
      if(btnRef){btnRef.textContent='⏳';btnRef.disabled=true;}
      _peds=await db('lola_pedidos','GET',null,'?select=*&order=created_at.desc');
      atualizaResumo();
      drawPed($('#ped-t'));
      if(btnRef){btnRef.textContent='🔄 Atualizar';btnRef.disabled=false;}
    }

    // Montar barra manualmente para evitar null nodes
    const barraTopo=div('fl_ jb aic');
    const tabsGrupo=div('fl_ gap2 aic');
    const tabsEl=div('tabs');
    [{k:'todos',l:'Todos'},{k:'rascunho',l:'Rascunhos'},{k:'ccmq',l:'CCMQ'},{k:'mac',l:'Mac'},{k:'terceiro',l:'Terceiros'},{k:'solicitado',l:'Solicitados'},{k:'entregue',l:'Entregues'}]
      .forEach(t=>{const p=span('tp'+(_pedTab===t.k?' active':''),t.l);p.addEventListener('click',()=>{_pedTab=t.k;drawPed($('#ped-t'));});tabsEl.appendChild(p);});
    tabsGrupo.appendChild(tabsEl);
    barraTopo.appendChild(tabsGrupo);
    const btnsDir=div('fl_ gap2');
    const bAtualizar=btn('btn bo bsm','🔄 Atualizar',recarregarPedidos);
    bAtualizar.id='btn-refresh-ped';
    btnsDir.appendChild(bAtualizar);
    const bNovo=btn('btn bp','+ Novo pedido',()=>modalNovoPedido());
    bNovo.style.cssText='padding:10px 22px;font-size:13px;font-weight:800;letter-spacing:.5px;box-shadow:0 3px 10px rgba(170,43,43,.3)';
    btnsDir.appendChild(bNovo);
    barraTopo.appendChild(btnsDir);
    const barraWrap=div('abar no-print');
    const coluna=div(null);
    coluna.style.cssText='display:flex;flex-direction:column;gap:8px;flex:1';
    coluna.appendChild(barraTopo);
    coluna.appendChild(mesDropWrap);
    barraWrap.appendChild(coluna);
    c.appendChild(barraWrap);

    // Resumo financeiro do período
    const resumoEl=div('',null,{id:'ped-resumo'});
    c.appendChild(resumoEl);
    const w=div(null,null,{id:'ped-t'});
    c.appendChild(w);

    function atualizaResumo(){
      const base=_pedMes?_peds.filter(p=>p.data_pedido?.startsWith(_pedMes)):_peds;
      // Contar apenas pedidos ENTREGUES no resumo financeiro
      const entregues=base.filter(p=>p.status==='entregue');
      const totCCMQ=entregues.filter(p=>p.unidade==='ccmq').reduce((t,p)=>t+parseFloat(p.valor_total||0),0);
      const totMAC=entregues.filter(p=>p.unidade==='mac').reduce((t,p)=>t+parseFloat(p.valor_total||0),0);
      const totTerc=entregues.filter(p=>p.unidade==='terceiro').reduce((t,p)=>t+parseFloat(p.valor_total||0),0);
      const totGeral=totCCMQ+totMAC+totTerc;
      const label=_pedMes?(()=>{const[ano,mes]=_pedMes.split('-');return new Date(ano,parseInt(mes)-1,1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'});})():'todos os períodos';
      const nCCMQ=entregues.filter(p=>p.unidade==='ccmq').length;
      const nMAC=entregues.filter(p=>p.unidade==='mac').length;
      const nTerc=entregues.filter(p=>p.unidade==='terceiro').length;
      // Pedidos pendentes (para info)
      const nPend=base.filter(p=>p.status==='solicitado'||p.status==='confirmado').length;
      resumoEl.innerHTML='';
      const g=div('g3 mb3',[
        div('sc',[
          span('scl','CCMQ — '+label.toUpperCase()),
          div('scv',R(totCCMQ)),
          span('scs',nCCMQ+' pedido'+(nCCMQ!==1?'s':'')+' entregues'),
        ]),
        div('sc',[
          span('scl','MAC — '+label.toUpperCase()),
          el('div','scv tvd',R(totMAC)),
          span('scs',nMAC+' pedido'+(nMAC!==1?'s':'')+' entregues'),
        ]),
        div('sc',[
          span('scl','TERCEIROS — '+label.toUpperCase()),
          el('div','scv',R(totTerc),{style:'color:var(--am)'}),
          span('scs',nTerc+' pedido'+(nTerc!==1?'s':'')+' entregues'),
        ]),
      ]);
      const infoEl=div(null);
      infoEl.appendChild(el('span','bold',_pedMes?'Total entregue no período:':'Total entregue (geral):',{style:'font-size:14px'}));
      if(nPend>0) infoEl.appendChild(el('span','tss',' · '+nPend+' pedido'+(nPend!==1?'s':'')+' ainda em aberto',{style:'font-size:11px;margin-left:8px'}));
      const tot=div('card mb3 fl_ jb aic',[
        infoEl,
        el('span','bold tv',R(totGeral),{style:'font-size:22px;font-family:Playfair Display,serif'}),
      ]);
      resumoEl.appendChild(g);
      resumoEl.appendChild(tot);
    }

    atualizaResumo();
    drawPed(w);

  }catch(e){c.innerHTML='<p style="color:red;padding:20px">'+e.message+'</p>';}
}

async function modalNovoPedido(){
  if(!_pp.length)_pp=await db('lola_preproducoes','GET',null,'?select=*&ativo=eq.true&order=nome.asc');
  if(!_ins.length)_ins=await db('lola_insumos','GET',null,'?select=*&ativo=eq.true&order=nome.asc');

  const DEST_COR={ccmq:'#AA2B2B',mac:'#166534',eventos:'#c47700'};
  const DEST_LBL={ccmq:'CCMQ',mac:'MAC',eventos:'Evento'};
  const DEST_KEYS=['ccmq','mac','eventos'];

  let _destPed='ccmq';
  let _dataPed=TD();
  let _respPed='';
  let _obsPed='';

  // Mapa de quantidades: id -> {item, quantidade}
  const qtdMap={};

  const ov=div('ov');
  const mo=div('mo moxl');
  mo.addEventListener('click',e=>e.stopPropagation());
  ov.addEventListener('click',e=>{if(e.target===ov)ov.remove();});

  // Header
  mo.appendChild(div('mh',[
    el('h3',null,'🛒 Novo Pedido'),
    btn('xb','✕',()=>ov.remove())
  ]));

  const mb=div('mb');mo.appendChild(mb);

  // Linha 1: Destino + Data
  const inpData=el('input','fi',null,{type:'date',value:_dataPed});
  inpData.addEventListener('change',e=>_dataPed=e.target.value);

  // Abas de destino
  const destTabsWrap=div('tabs mb3');
  function buildDestTabs(){
    destTabsWrap.innerHTML='';
    DEST_KEYS.forEach(k=>{
      const p=span('tp'+(_destPed===k?' active':''),DEST_LBL[k]);
      p.style.cssText+=(';font-weight:800;border:2px solid '+DEST_COR[k]);
      if(_destPed===k) p.style.background=DEST_COR[k]+';color:#fff';
      p.addEventListener('click',()=>{_destPed=k;buildDestTabs();buildItens();});
      destTabsWrap.appendChild(p);
    });
  }
  buildDestTabs();

  mb.appendChild(div('fg2 mb3',[
    fgrp('Destino',destTabsWrap),
    fgrp('Data',inpData),
  ]));

  mb.appendChild(el('hr','dv'));

  // Área de itens
  const itensArea=div(null);
  mb.appendChild(itensArea);

  let _buscaNovoPed='';

  // Campo de busca — renderizado uma vez antes de buildItens
  const buscaInp=el('input','fi',null,{placeholder:'🔍 Buscar item...',autocomplete:'off'});
  buscaInp.style.cssText='width:100%;margin-bottom:12px';
  buscaInp.addEventListener('input',e=>{_buscaNovoPed=e.target.value.toLowerCase();buildItens();});
  mb.appendChild(buscaInp);

  function buildItens(){
    itensArea.innerHTML='';

    // Filtrar pré-produções e insumos pelo destino selecionado
    const ppDest=_pp.filter(x=>(x.destinos||[]).includes(_destPed)&&
      (!_buscaNovoPed||x.nome.toLowerCase().includes(_buscaNovoPed)));
    const insDest=_ins.filter(x=>(x.destinos||[]).includes(_destPed)&&
      (!_buscaNovoPed||x.nome.toLowerCase().includes(_buscaNovoPed)));

    if(!ppDest.length&&!insDest.length){
      conteudo.appendChild(div('tss mt3 mb3','Nenhum item categorizado para '+DEST_LBL[_destPed]+' ainda. Use o botão 🏷️ nas pré-produções e insumos para categorizar.'));
      itensArea.appendChild(conteudo);
      return;
    }

    function mkGrupo(titulo, lista, getPreco, getUnidade, getId, getNome){
      if(!lista.length) return;
      const g=div(null);
      g.style.cssText='margin-bottom:16px';
      const gt=document.createElement('div');
      gt.style.cssText='font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--v);margin-bottom:8px;padding-bottom:4px;border-bottom:1.5px solid var(--rb)';
      gt.textContent=titulo;
      g.appendChild(gt);

      lista.forEach(item=>{
        const id=getId(item);
        if(!qtdMap[id]) qtdMap[id]={item,quantidade:'',preco:getPreco(item),unidade:getUnidade(item),nome:getNome(item)};

        const row=document.createElement('div');
        row.style.cssText='display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;margin-bottom:4px;background:var(--rf);border:1px solid var(--rb)';

        // Nome + preço
        const info=document.createElement('div');info.style.cssText='flex:1;min-width:0';
        const n=document.createElement('div');n.style.cssText='font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis';
        n.textContent=getNome(item);
        const p2=document.createElement('div');p2.style.cssText='font-size:11px;color:var(--ts)';
        p2.textContent=R(getPreco(item))+'/'+getUnidade(item);
        info.appendChild(n);info.appendChild(p2);row.appendChild(info);

        // Input quantidade
        const inp=document.createElement('input');
        inp.type='number';inp.min='0';inp.step='0.5';
        inp.placeholder='0';
        inp.value=qtdMap[id].quantidade||'';
        inp.setAttribute('inputmode','decimal');
        inp.style.cssText='width:80px;padding:8px;border:2px solid var(--rb);border-radius:10px;font-size:15px;text-align:center;font-family:Nunito,sans-serif;font-weight:700;-webkit-appearance:none';
        inp.addEventListener('input',e=>{
          qtdMap[id].quantidade=parseFloat(e.target.value)||0;
          inp.style.borderColor=parseFloat(e.target.value)>0?'var(--v)':'var(--rb)';
          calcTotal();
        });
        if(qtdMap[id].quantidade>0) inp.style.borderColor='var(--v)';

        // Unidade
        const un=document.createElement('div');
        un.style.cssText='font-size:11px;color:var(--ts);width:30px;text-align:left;font-weight:600';
        un.textContent=getUnidade(item);
        row.appendChild(info);row.appendChild(inp);row.appendChild(un);
        g.appendChild(row);
      });
      conteudo.appendChild(g);
    }

    // Grupo pré-produções
    mkGrupo('🍳 Pré-produções',ppDest,
      x=>{
        const ru=x.rendimento_un||'un';
        const porcaoQtd=parseFloat(x.porcao_qtd)||0;
        const porcaoUn=x.porcao_un||'';
        if(porcaoQtd>0&&porcaoUn&&porcaoUn!==ru){
          const numP=(parseFloat(x.rendimento_qtd)||1)/porcaoQtd;
          return (parseFloat(x.custo_total||0)/numP)/(parseFloat(x.margem_venda||70)/100);
        }
        return parseFloat(x.valor_venda_central)||0;
      },
      x=>{
        const ru=x.rendimento_un||'un';
        const porcaoQtd=parseFloat(x.porcao_qtd)||0;
        const porcaoUn=x.porcao_un||'';
        if(porcaoQtd>0&&porcaoUn&&porcaoUn!==ru) return porcaoUn==='un'?'porção':porcaoUn;
        return ru==='g'?'kg':ru==='ml'?'L':ru;
      },
      x=>'pp_'+x.id,
      x=>x.nome
    );

    // Grupo insumos
    mkGrupo('🧂 Insumos',insDest,
      x=>{
        const uc=x.unidade_custo||'kg';
        const uCompra=x.unidade_compra||uc;
        if(uCompra==='g'&&uc==='kg') return x.custo_por_unidade/1000;
        if(uCompra==='ml'&&uc==='L') return x.custo_por_unidade/1000;
        return parseFloat(x.custo_por_unidade)||0;
      },
      x=>x.unidade_compra||x.unidade_custo||'un',
      x=>'ins_'+x.id,
      x=>x.nome
    );

    itensArea.appendChild(conteudo);
    calcTotal();
  }

  // Total
  const totalEl=div('custo-box mt3 mb3');
  mb.appendChild(totalEl);

  function calcTotal(){
    const total=Object.values(qtdMap).reduce((t,v)=>t+(v.quantidade||0)*v.preco,0);
    totalEl.innerHTML='';
    const itensComQtd=Object.values(qtdMap).filter(v=>v.quantidade>0);
    if(itensComQtd.length){
      itensComQtd.forEach(v=>{
        const sub=(v.quantidade||0)*v.preco;
        const row=div('fl_ jb aic',null,{style:'font-size:12px;padding:3px 0;border-bottom:1px solid var(--rf)'});
        const nl=document.createElement('span');nl.textContent=v.nome+' × '+v.quantidade+' '+v.unidade;
        const sl=document.createElement('span');sl.style.cssText='font-weight:700;color:var(--v)';sl.textContent=R(sub);
        row.appendChild(nl);row.appendChild(sl);
        totalEl.appendChild(row);
      });
    }
    const totRow=div('fl_ jb aic mt2');
    const tl=document.createElement('strong');tl.textContent='TOTAL';
    const tv=document.createElement('span');tv.style.cssText='font-size:20px;font-weight:800;color:var(--v)';tv.textContent=R(total);
    totRow.appendChild(tl);totRow.appendChild(tv);
    totalEl.appendChild(totRow);
  }

  // Rodapé: responsável + obs
  mb.appendChild(el('hr','dv'));
  const inpResp=el('input','fi',null,{type:'text',placeholder:'Seu nome (obrigatório)'});
  inpResp.addEventListener('input',e=>{_respPed=e.target.value;inpResp.style.borderColor=e.target.value.trim()?'var(--vd)':'var(--rb)';});
  const inpObs=el('input','fi',null,{type:'text',placeholder:'Observações...'});
  inpObs.addEventListener('input',e=>_obsPed=e.target.value);
  mb.appendChild(div('fg2 mt2',[fgrp('✍️ Responsável',inpResp),fgrp('Observações',inpObs)]));

  // Footer
  const mf=div('mf');
  mf.appendChild(btn('btn bg','Cancelar',()=>ov.remove()));
  const saveBtn=btn('btn bp','Salvar rascunho',async()=>{
    if(!_respPed.trim()){inpResp.style.borderColor='#dc2626';inpResp.focus();return;}
    const itensValidos=Object.values(qtdMap).filter(v=>v.quantidade>0);
    if(!itensValidos.length){alert('Adicione pelo menos um item com quantidade.');return;}
    saveBtn.textContent='Salvando...';saveBtn.disabled=true;
    try{
      const total=itensValidos.reduce((t,v)=>t+(v.quantidade||0)*v.preco,0);
      const[ped]=await db('lola_pedidos','POST',{
        unidade:_destPed,status:'rascunho',
        data_pedido:_dataPed||TD(),
        valor_total:total,
        observacoes:_obsPed||null,
        responsavel:_respPed,
      });
      for(const v of itensValidos){
        await db('lola_pedidos_itens','POST',{
          pedido_id:ped.id,
          nome_item:v.nome,
          quantidade:v.quantidade,
          unidade:v.unidade,
          preco_unitario:v.preco,
        });
      }
      _peds=await db('lola_pedidos','GET',null,'?select=*&order=created_at.desc');
      drawPed($('#ped-t'));
      ov.remove();
    }catch(e){alert('Erro: '+e.message);saveBtn.textContent='Salvar rascunho';saveBtn.disabled=false;}
  });
  mf.appendChild(saveBtn);
  mo.appendChild(mf);
  ov.appendChild(mo);
  document.body.appendChild(ov);
  buildItens();
}

async function editarPedido(ped){
  try{
    if(!_pp.length)_pp=await db('lola_preproducoes','GET',null,'?select=*&ativo=eq.true&order=nome.asc');
    if(!_ins.length)_ins=await db('lola_insumos','GET',null,'?select=*&ativo=eq.true&order=nome.asc');

    const existentes=await db('lola_pedidos_itens','GET',null,'?select=*&pedido_id=eq.'+ped.id);
    // Construir lista de itens editáveis
    const itens=existentes.map(it=>({
      nome:it.nome_item||'',
      unidade:it.unidade||'',
      preco:parseFloat(it.preco_unitario)||0,
      quantidade:parseFloat(it.quantidade)||0,
    }));

    let destino=ped.unidade||'ccmq';
    const ov=div('ov');
    const mo=div('mo moxl');
    mo.appendChild(div('mh',[
      el('h3',null,'✏️ Editar Pedido #'+ped.numero_pedido),
      btn('xb','✕',()=>ov.remove())
    ]));
    const mb=div('mb');
    mo.appendChild(mb);

    // Cabeçalho
    const destSel=fsel('',['ccmq','mac','terceiro'],destino,v=>{destino=v;});
    let dataPedido=ped.data_pedido||TD();
    const inpData=el('input','fi',null,{type:'date',value:dataPedido});
    inpData.addEventListener('change',e=>dataPedido=e.target.value);
    mb.appendChild(div('fg2 mb3',[
      fgrp('Destino',destSel),
      fgrp('Data',inpData),
    ]));

    mb.appendChild(el('hr','dv'));
    mb.appendChild(el('strong',null,'Itens do pedido',{style:'font-size:13px;display:block;margin:10px 0'}));

    // Tabela de itens
    const tblWrap=div('tw mb3');
    mb.appendChild(tblWrap);

    function rebuildTabela(){
      tblWrap.innerHTML='';
      if(!itens.length){
        tblWrap.appendChild(div('tss mt2','Nenhum item. Adicione abaixo.'));
        calcTotal();return;
      }
      const tbl=document.createElement('table');
      tbl.style.width='100%';tbl.style.borderCollapse='collapse';
      // thead
      const thead=document.createElement('thead');
      const htr=document.createElement('tr');
      ['Item','Un','Preço','Qtd','Subtotal',''].forEach((h,i)=>{
        const th=document.createElement('th');
        th.style.cssText='padding:7px 10px;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--v);background:var(--rt);text-align:'+(i>=2&&i<=4?'right':'left');
        th.textContent=h;htr.appendChild(th);
      });
      thead.appendChild(htr);tbl.appendChild(thead);
      // tbody
      const tbody=document.createElement('tbody');
      itens.forEach((it,idx)=>{
        const tr=document.createElement('tr');
        tr.style.cssText=(idx%2===0?'background:var(--rf)':'background:#fff')+';border-bottom:1px solid var(--rb)';

        function mkTd(txt,align,bold){
          const td=document.createElement('td');
          td.style.cssText='padding:7px 10px;font-size:12px;text-align:'+(align||'left')+(bold?';font-weight:700':'');
          td.textContent=txt||'';return td;
        }
        tr.appendChild(mkTd(it.nome,'left',true));
        tr.appendChild(mkTd(it.unidade));
        tr.appendChild(mkTd(R(it.preco),'right'));

        // Input quantidade
        const tdQtd=document.createElement('td');tdQtd.style.cssText='padding:4px 10px';
        const inpQ=document.createElement('input');inpQ.type='number';inpQ.min='0';inpQ.step='0.01';
        inpQ.value=it.quantidade;
        inpQ.style.cssText='width:75px;padding:5px 7px;border:1.5px solid var(--rb);border-radius:8px;font-size:12px;text-align:right;font-family:Nunito,sans-serif';
        inpQ.addEventListener('input',e=>{it.quantidade=parseFloat(e.target.value)||0;calcTotal();
          subTd.textContent=R(it.quantidade*it.preco);
          subTd.style.color=it.quantidade>0?'var(--v)':'var(--ts)';
        });
        tdQtd.appendChild(inpQ);tr.appendChild(tdQtd);

        // Subtotal
        const subTd=document.createElement('td');
        subTd.style.cssText='padding:7px 10px;font-size:12px;text-align:right;font-weight:700;color:'+(it.quantidade>0?'var(--v)':'var(--ts)');
        subTd.textContent=R(it.quantidade*it.preco);tr.appendChild(subTd);

        // Remover
        const tdRm=document.createElement('td');tdRm.style.cssText='padding:4px 10px;text-align:right';
        const rmBtn=btn('btn bd bxs','✕',()=>{itens.splice(idx,1);rebuildTabela();});
        tdRm.appendChild(rmBtn);tr.appendChild(tdRm);

        tbody.appendChild(tr);
      });
      tbl.appendChild(tbody);tblWrap.appendChild(tbl);
      calcTotal();
    }

    // Total
    const totalEl=div('custo-box mb3');
    mb.appendChild(totalEl);
    function calcTotal(){
      const total=itens.reduce((t,i)=>t+(i.quantidade*i.preco),0);
      totalEl.innerHTML='<div class="fl_ jb aic"><strong>TOTAL</strong><span class="bold tv" style="font-size:18px">'+R(total)+'</span></div>';
    }

    // Adicionar novo item
    mb.appendChild(el('strong',null,'+ Adicionar item',{style:'font-size:12px;color:var(--ts);display:block;margin-bottom:8px'}));
    let tipoAdd='preprods';
    const tabsAdd=div('tabs mb2');
    const optsWrap=div(null);

    function buildOpts(){
      optsWrap.innerHTML='';
      // Montar lista completa de itens para autocomplete
      let listaTotal=[];
      if(tipoAdd==='preprods'){
         listaTotal=_pp.map(x=>{
           const ru=x.rendimento_un||'un';
           const porcaoQtd=parseFloat(x.porcao_qtd)||0;
           const porcaoUn=x.porcao_un||'';
           if(porcaoQtd>0 && porcaoUn && porcaoUn!==ru){
             const rendQtd=parseFloat(x.rendimento_qtd)||1;
             const numPorcoes=rendQtd/porcaoQtd;
             const custoPorcao=parseFloat(x.custo_total||0)/numPorcoes;
             const vendaPorcao=custoPorcao/(1-(parseFloat(x.margem_venda||70)/100));
             const unLabel=porcaoUn==='un'?'porção':porcaoUn;
             return {nome:x.nome,unidade:unLabel,preco:vendaPorcao,tipo:'prep',cat:x.categoria,
                     info:'('+porcaoQtd+ru+'/porção — '+numPorcoes.toFixed(1)+' porções)'};
           }
           const unidade=ru==='g'?'kg':ru==='ml'?'L':ru;
           return {nome:x.nome,unidade,preco:x.valor_venda_central,cat:x.categoria};
         }).sort((a,b)=>a.nome.localeCompare(b.nome,'pt'));
      } else {
        listaTotal=_ins.map(x=>{
          const uc=x.unidade_custo||'kg';
          const uCompra=x.unidade_compra||uc;
          let precoPedido;
          if(uCompra==='g'&&uc==='kg') precoPedido=x.custo_por_unidade/1000;
          else if(uCompra==='ml'&&uc==='L') precoPedido=x.custo_por_unidade/1000;
          else precoPedido=x.custo_por_unidade;
          return {nome:x.nome,unidade:uCompra,preco:precoPedido,cat:x.categoria||''};
        }).sort((a,b)=>a.nome.localeCompare(b.nome,'pt'));
      }

      // Input de busca
      const searchWrap=div(null);searchWrap.style.cssText='position:relative';
      const inp=el('input','fi',null,{placeholder:'Digite para buscar...',autocomplete:'off'});
      inp.style.cssText='width:100%';
      const dropdown=div(null);
      dropdown.style.cssText='position:absolute;top:100%;left:0;right:0;background:#fff;border:1.5px solid var(--rb);border-radius:10px;max-height:220px;overflow-y:auto;z-index:999;display:none;box-shadow:0 8px 24px rgba(170,43,43,.12)';
      let selectedItem=null;

      function renderDropdown(q){
        dropdown.innerHTML='';
        const filtrado=q?listaTotal.filter(x=>x.nome.toLowerCase().includes(q.toLowerCase())):listaTotal.slice(0,20);
        if(!filtrado.length){dropdown.style.display='none';return;}
        filtrado.forEach(x=>{
          const row=document.createElement('div');
          row.style.cssText='padding:9px 14px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--rf);display:flex;justify-content:space-between;align-items:center';
          row.innerHTML='<span style="font-weight:600">'+x.nome+'</span><span style="font-size:11px;color:var(--ts)">'+R(x.preco)+'/'+x.unidade+'</span>';
          row.addEventListener('mousedown',e=>{
            e.preventDefault();
            selectedItem=x;
            inp.value=x.nome+' — '+R(x.preco)+'/'+x.unidade;
            dropdown.style.display='none';
          });
          row.addEventListener('mouseover',()=>row.style.background='var(--rf)');
          row.addEventListener('mouseout',()=>row.style.background='');
          dropdown.appendChild(row);
        });
        dropdown.style.display='block';
      }

      inp.addEventListener('input',e=>renderDropdown(e.target.value));
      inp.addEventListener('focus',()=>renderDropdown(inp.value));
      inp.addEventListener('blur',()=>setTimeout(()=>dropdown.style.display='none',150));
      searchWrap.appendChild(inp);searchWrap.appendChild(dropdown);

      const addBtn=btn('btn bp','+ Adicionar',()=>{
        if(!selectedItem){alert('Selecione um item da lista.');return;}
        itens.push({...selectedItem,quantidade:0});
        rebuildTabela();
        inp.value='';selectedItem=null;dropdown.style.display='none';
      });
      addBtn.style.cssText='white-space:nowrap;flex-shrink:0';

      const row=div('fl_ gap2 mt2 aic');
      row.style.alignItems='flex-start';
      row.appendChild(searchWrap);row.appendChild(addBtn);
      optsWrap.appendChild(row);
    }

    ['Pré-produções','Insumos'].forEach((lb,i)=>{
      const k=['preprods','insumos'][i];
      const p=span('tp'+(tipoAdd===k?' active':''),lb);
      p.addEventListener('click',()=>{tipoAdd=k;tabsAdd.querySelectorAll('.tp').forEach(x=>x.classList.remove('active'));p.classList.add('active');buildOpts();});
      tabsAdd.appendChild(p);
    });
    mb.appendChild(tabsAdd);mb.appendChild(optsWrap);
    buildOpts();

    // Footer
    const obsInp=finp('',ped.observacoes||'',v=>ped.observacoes=v);
    mb.appendChild(div('mt3',[fgrp('Observações',obsInp)]));

    const mf=div('mf');
    mf.appendChild(btn('btn bg','Cancelar',()=>ov.remove()));
    const saveBtn=btn('btn bp','Salvar',async()=>{
      const itensValidos=itens.filter(i=>i.quantidade>0);
      if(!itensValidos.length){alert('Adicione pelo menos um item com quantidade.');return;}
      saveBtn.textContent='Salvando...';saveBtn.disabled=true;
      try{
        const total=itensValidos.reduce((t,i)=>t+(i.quantidade*i.preco),0);
        await db('lola_pedidos','PATCH',{unidade:destino,data_pedido:dataPedido,valor_total:total,observacoes:ped.observacoes||null},'?id=eq.'+ped.id);
        // Inserir novos itens primeiro, só apagar os antigos se tudo der certo
        const novosItens=[];
        for(const it of itensValidos){
          const[novo]=await db('lola_pedidos_itens','POST',{pedido_id:ped.id,nome_item:it.nome,quantidade:it.quantidade,unidade:it.unidade,preco_unitario:it.preco});
          novosItens.push(novo);
        }
        // Só apagar os antigos se todos os novos foram inseridos com sucesso
        if(novosItens.length===itensValidos.length){
          // Apagar apenas os itens antigos (não os recém inseridos)
          const novosIds=novosItens.map(n=>n.id);
          const antigosItens=existentes.filter(e=>!novosIds.includes(e.id));
          for(const antigo of antigosItens){
            await db('lola_pedidos_itens','DELETE',null,'?id=eq.'+antigo.id);
          }
        }
        _peds=await db('lola_pedidos','GET',null,'?select=*&order=created_at.desc');
        // Reconstruir tabs de meses com os dados atualizados
        const mesesNovos=[...new Set(_peds.map(p=>p.data_pedido?.substring(0,7)).filter(Boolean))].sort().reverse();
        const mesTabs=$('#mes-tabs-ped');
        if(mesTabs){
          mesTabs.innerHTML='';
          const all=span('tp'+(!_pedMes?' active':''),'Todos os meses');
          all.addEventListener('click',()=>{_pedMes='';buildMesTabs();atualizaResumo();drawPed($('#ped-t'));});
          mesTabs.appendChild(all);
          mesesNovos.forEach(m=>{
            const[ano,mes]=m.split('-');
            const label=new Date(ano,parseInt(mes)-1,1).toLocaleDateString('pt-BR',{month:'short',year:'2-digit'});
            const p=span('tp'+(_pedMes===m?' active':''),label.charAt(0).toUpperCase()+label.slice(1));
            p.addEventListener('click',()=>{_pedMes=m;buildMesTabs();atualizaResumo();drawPed($('#ped-t'));});
            mesTabs.appendChild(p);
          });
        }
        drawPed($('#ped-t'));
        ov.remove();
      }catch(e){alert('Erro ao salvar: '+e.message);saveBtn.textContent='Salvar';saveBtn.disabled=false;}
    });
    mf.appendChild(saveBtn);
    mo.appendChild(mf);

    ov.appendChild(mo);
    ov.addEventListener('click',e=>{if(e.target===ov&&!mo.contains(e.target))ov.remove();});
    document.body.appendChild(ov);

    rebuildTabela();

  }catch(e){alert('Erro ao abrir pedido: '+e.message);}
}

}

      <div><strong>Pedido Nº:</strong> #${ped.numero_pedido}</div>
      <div><strong>Data:</strong> ${DBR(ped.data_pedido)}</div>
      <div><strong>Destino:</strong> ${destLabel}</div>
      <div><strong>Status:</strong> ${ped.status}</div>
      ${ped.observacoes?`<div colspan="2"><strong>Obs:</strong> ${ped.observacoes}</div>`:''}
    </div>
    <table style="width:100%;border-collapse:collapse;margin-bottom:18px">
      <thead><tr style="background:#AA2B2B;color:#fff">
        <th style="padding:10px 11px;text-align:left;font-size:11px;letter-spacing:1px">PRODUTO</th>
        <th style="padding:10px 11px;text-align:center;font-size:11px">UN.</th>
        <th style="padding:10px 11px;text-align:center;font-size:11px">QTD</th>
        <th style="padding:10px 11px;text-align:right;font-size:11px">PREÇO UN.</th>
        <th style="padding:10px 11px;text-align:right;font-size:11px">SUBTOTAL</th>

      <tbody>${rows}</tbody>

          <td colspan="4" style="padding:12px;text-align:right;font-weight:800;font-size:15px">TOTAL</td>
          <td style="padding:12px;text-align:right;font-weight:900;font-size:20px;color:#AA2B2B">${R(ped.valor_total)}</td>
        </tr>
      </tfoot>
    </table>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:50px;margin-top:36px">
      <div><div style="border-top:1.5px solid #AA2B2B;padding-top:8px;text-align:center;font-size:11px;color:#7a5a5a">Assinatura — ${destLabel}</div></div>

  ov.appendChild(mo);ov.addEventListener('click',e=>{
    // Só fecha se clicar exatamente no overlay, nunca em filhos (selects, dropdowns)

// ── fichaTable: modal com formato planilha ─────────────────────────────────
function fichaTable(itens,rendQtd,rendUn,custoTotal,custoPorcao,titulo,historico){
  // Construção imperativa para evitar bugs com null/string em children
  function td(txt,style,children){
    const t=document.createElement('td');
    t.style.cssText=style||'padding:8px 10px;font-size:12px';
    if(children){children.forEach(c=>t.appendChild(c));}
    else if(txt!=null)t.appendChild(document.createTextNode(String(txt)));
    return t;
  }
  function th(txt,align){
    const t=document.createElement('th');
    t.style.cssText='padding:8px 10px;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--v);background:var(--rt);white-space:nowrap;text-align:'+(align||'left');
    t.appendChild(document.createTextNode(txt));
    return t;
  }

  const tbl=document.createElement('table');
  tbl.style.cssText='width:100%;border-collapse:collapse;';

  // THEAD
  const thead=document.createElement('thead');
  const hRow=document.createElement('tr');
  [['Insumo','left'],['Obs','left'],['UN','center'],['QTD Bruta','right'],['QTD Líquida','right'],
   ['Perda','right'],['FC','right'],['% Perda','right'],['Preço kg·L·un','right'],['Custo','right']]
  .forEach(([h,a])=>hRow.appendChild(th(h,a)));
  thead.appendChild(hRow);
  tbl.appendChild(thead);

  // TBODY
  const tbody=document.createElement('tbody');
  (itens||[]).forEach((it,idx)=>{
    const nome=it.lola_insumos?.nome||it.lola_preproducoes?.nome||it.lola_preproducoes_sub?.nome||it.nome_manual||'—';
    const isPP=!it.lola_insumos?.nome;
    const preco=parseFloat(it.custo_unitario)||0;
    const qb=parseFloat(it.qtd_bruta)||0;
    const ql=parseFloat(it.qtd_liquida)||0;
    const perda=Math.max(0,qb-ql);
    const pct=qb>0?Math.round((perda/qb)*100):0;
    const fc=parseFloat(it.fc)||1;
    const tr=document.createElement('tr');
    tr.style.cssText=(idx%2===0?'background:var(--rf)':'background:#fff')+';border-bottom:1px solid var(--rb)';
    // Coluna nome com badge
    const tdNome=document.createElement('td');
    tdNome.style.cssText='padding:8px 10px;font-size:12px';
    const badge=document.createElement('span');
    badge.className='bq '+(isPP?'bce':'bc');
    badge.textContent=isPP?'PP':'Ins';
    tdNome.appendChild(badge);
    tdNome.appendChild(document.createTextNode(' '+nome));
    tr.appendChild(tdNome);
    tr.appendChild(td(it.nome_manual||'','padding:8px 10px;font-size:11px;color:var(--ts)'));
    tr.appendChild(td(it.unidade||'g','padding:8px 10px;font-size:12px;text-align:center'));
    tr.appendChild(td(N(qb,2),'padding:8px 10px;font-size:12px;text-align:right'));
    tr.appendChild(td(N(ql,2),'padding:8px 10px;font-size:12px;text-align:right'));
    tr.appendChild(td(N(perda,2),'padding:8px 10px;font-size:12px;text-align:right;color:var(--ts)'));
    tr.appendChild(td(N(fc,2),'padding:8px 10px;font-size:12px;text-align:right'));
    tr.appendChild(td(pct+'%','padding:8px 10px;font-size:12px;text-align:right;color:'+(pct>20?'var(--v)':'var(--ts)')));
    tr.appendChild(td(R(preco),'padding:8px 10px;font-size:12px;text-align:right'));
    const tdCusto=document.createElement('td');
    tdCusto.style.cssText='padding:8px 10px;font-size:12px;text-align:right;color:var(--v)';
    const strong=document.createElement('strong');
    strong.textContent=R(it.custo_total);
    tdCusto.appendChild(strong);
    tr.appendChild(tdCusto);
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);

  // TFOOT
  const tfoot=document.createElement('tfoot');
  const r1=document.createElement('tr');
  const t1a=document.createElement('td');t1a.colSpan=9;t1a.style.cssText='padding:10px;font-weight:800;font-size:12px;background:#2a6645;color:#fff;text-transform:uppercase;letter-spacing:1px';t1a.textContent='CUSTO TOTAL DA RECEITA';
  const t1b=document.createElement('td');t1b.style.cssText='padding:10px;font-weight:800;font-size:13px;background:#2a6645;color:#fff;text-align:right';t1b.textContent=R(custoTotal);
  r1.appendChild(t1a);r1.appendChild(t1b);
  const r2=document.createElement('tr');
  const t2a=document.createElement('td');t2a.colSpan=9;t2a.style.cssText='padding:10px;font-weight:800;font-size:12px;background:var(--v);color:#fff;text-transform:uppercase;letter-spacing:1px';const _unBaseRod=rendUn==='g'?'KG':rendUn==='ml'?'L':rendUn.toUpperCase();t2a.textContent='CUSTO POR PORÇÃO / '+_unBaseRod;
  const t2b=document.createElement('td');t2b.style.cssText='padding:10px;font-weight:800;font-size:14px;background:var(--v);color:#fff;text-align:right';t2b.textContent=R(custoPorcao);
  r2.appendChild(t2a);r2.appendChild(t2b);
  tfoot.appendChild(r1);tfoot.appendChild(r2);
  tbl.appendChild(tfoot);

  // Resumo cards
  const resumo=div('g3 mb3',[
    div('custo-box',[span('scl','Rendimento'),div('bold tv mt2',N(rendQtd,0)+' '+rendUn)]),
    div('custo-box',[span('scl','Custo total'),div('bold tv mt2',R(custoTotal))]),
    div('custo-box',[span('scl','Custo/'+(rendUn==='g'?'kg':rendUn==='ml'?'L':rendUn)),div('bold tv mt2',R(custoPorcao))]),
  ]);

  const scrollWrap=document.createElement('div');
  scrollWrap.style.overflowX='auto';
  if(!itens||!itens.length){
    const vazio=document.createElement('p');
    vazio.className='tss mt3';
    vazio.textContent='(Nenhum ingrediente vinculado ainda — use ✏️ para adicionar)';
    scrollWrap.appendChild(vazio);
  } else {
    scrollWrap.appendChild(tbl);
  }
  // Seção de histórico
  let histEl=null;
  if(historico&&historico.length){
    histEl=document.createElement('div');
    histEl.style.cssText='margin-top:18px';
    const hTitle=document.createElement('div');
    hTitle.style.cssText='font-size:13px;font-weight:700;color:var(--ts);margin-bottom:10px;display:flex;align-items:center;gap:6px';
    hTitle.textContent='🕒 Histórico de alterações';
    histEl.appendChild(hTitle);
    historico.forEach(h=>{
      const row=document.createElement('div');
      row.style.cssText='padding:10px 14px;background:var(--rf);border-radius:9px;margin-bottom:7px;border-left:3px solid var(--v)';
      const data=new Date(h.editado_em).toLocaleString('pt-BR');
      const quem=document.createElement('div');
      quem.style.cssText='font-size:12px;font-weight:700;color:var(--v)';
      quem.textContent=(h.editado_por||'Não informado')+' · '+data;
      const desc=document.createElement('div');
      desc.style.cssText='font-size:12px;color:var(--tx);margin-top:3px';
      desc.textContent=h.descricao||'Ficha editada';
      row.appendChild(quem);
      row.appendChild(desc);
      histEl.appendChild(row);
    });
  }
  mkModal(titulo,[resumo,scrollWrap,...(histEl?[histEl]:[])],null,'mo moxl');
}



// Converte quantidade na unidade informada para a unidade base do insumo (g ou ml → kg/L)
function calcCustoItem(qtdBruta, fc, unQtd, custo_por_unidade, unCusto){
  const ql=(parseFloat(qtdBruta)||0)/(parseFloat(fc)||1);
  const cu=parseFloat(custo_por_unidade)||0;
  // Se a quantidade está em g/ml e o custo é por kg/L → divide por 1000
  if(['g','ml'].includes(unQtd) && ['kg','L'].includes(unCusto)) return (ql/1000)*cu;
  // Se a quantidade está em kg/L e o custo é por kg/L → direto
  if(['kg','L'].includes(unQtd) && ['kg','L'].includes(unCusto)) return ql*cu;
  // un, cx, pct → direto
  return ql*cu;
}

// ── Onde é usado: busca pré-prods e fichas que contêm um insumo ────────────
async function ondeEUsado(insumo){
  const ov=div('ov');
  const mo=div('mo mol');
  // Header
  const hdr=div('mh',[
    el('h3',null,'🔍 Onde "'+insumo.nome+'" é usado'),
    btn('xb','✕',()=>ov.remove())
  ]);
  mo.appendChild(hdr);
  const mb2=div('mb');
  mb2.appendChild(div('ld',[div('sp'),document.createTextNode('Buscando...')]));
  mo.appendChild(mb2);
  ov.appendChild(mo);
  ov.addEventListener('click',e=>{if(e.target===ov&&!mo.contains(e.target))ov.remove();});
  document.body.appendChild(ov);

  try{
    // Buscar em pré-produções
    const ppItens=await db('lola_preproducoes_itens','GET',null,
      '?select=*,lola_preproducoes!preproducao_id(id,nome,categoria,custo_por_unidade,rendimento_un)&insumo_id=eq.'+insumo.id);
    // Buscar em fichas técnicas
    const ftItens=await db('lola_fichas_tecnicas_itens','GET',null,
      '?select=*,lola_fichas_tecnicas!ficha_id(id,nome,cardapio,custo_por_porcao,preco_venda)&insumo_id=eq.'+insumo.id);

    mb2.innerHTML='';

    // Custo info
    const custoBox=div('custo-box mb3',[
      div('fl_ jb aic',[
        div(null,[
          span('scl',insumo.categoria),
          div('bold tv mt2',R(insumo.custo_por_unidade)+' / '+(insumo.unidade_custo||'kg')),
        ]),
        div('tss','Usado em '+(ppItens.length+ftItens.length)+' receitas'),
      ])
    ]);
    mb2.appendChild(custoBox);

    if(!ppItens.length&&!ftItens.length){
      mb2.appendChild(em('🔍','Este insumo não está vinculado a nenhuma receita ainda'));
    }

    // Pré-produções
    if(ppItens.length){
      const ppTitle=div(null,null,{style:'font-size:13px;font-weight:700;color:var(--ts);margin-bottom:8px;margin-top:4px'});
      ppTitle.textContent='🍳 Pré-produções ('+ppItens.length+')';
      mb2.appendChild(ppTitle);
      const ppTabela=div('tw mb3',mkTable(
        ['Pré-produção','Categoria','Qtd usada','Custo nesta PP'],
        ppItens.map(it=>{
          const pp=it.lola_preproducoes;
          if(!pp)return['-','-','-','-'];
          return[
            el('span','bold',pp.nome),
            bq(UL[pp.categoria]||pp.categoria,'bct'),
            N(it.qtd_bruta,2)+' '+(it.unidade||'g'),
            el('span','bold tv',R(it.custo_total)),
          ];
        }),
        [null,null,'tr','tr']
      ));
      mb2.appendChild(ppTabela);
    }

    // Fichas técnicas
    if(ftItens.length){
      const ftTitle=div(null,null,{style:'font-size:13px;font-weight:700;color:var(--ts);margin-bottom:8px;margin-top:4px'});
      ftTitle.textContent='🍽️ Fichas técnicas ('+ftItens.length+')';
      mb2.appendChild(ftTitle);
      const ftTabela=div('tw mb3',mkTable(
        ['Prato','Cardápio','Qtd usada','Custo nesta ficha','Impacto no prato'],
        ftItens.map(it=>{
          const ft=it.lola_fichas_tecnicas;
          if(!ft)return['-','-','-','-','-'];
          // Impacto = % que este ingrediente representa no custo total do prato
          const impacto=ft.custo_por_porcao>0?((it.custo_total/ft.custo_por_porcao)*100).toFixed(0):'—';
          return[
            el('span','bold',ft.nome),
            bq(UL[ft.cardapio]||ft.cardapio,UB[ft.cardapio]||'bct'),
            N(it.qtd_bruta,2)+' '+(it.unidade||'g'),
            el('span','bold tv',R(it.custo_total)),
            el('span',parseFloat(impacto)>30?'bold ecr':parseFloat(impacto)>15?'bold ebx':'tss',impacto+'%'),
          ];
        }),
        [null,null,'tr','tr','tr']
      ));
      mb2.appendChild(ftTabela);
    }

    // Aviso: se atualizar o preço deste insumo, quantas fichas são afetadas
    if(ppItens.length+ftItens.length>0){
      const aviso=div('al ali mt3',[
        el('span','bold','💡 '),
        document.createTextNode('Se o preço deste insumo mudar, '+
          (ppItens.length+ftItens.length)+' receita'+(ppItens.length+ftItens.length>1?'s serão afetadas':' será afetada')+
          '. Atualize o preço em Insumos → 💰 Atualizar Preços.')
      ]);
      mb2.appendChild(aviso);
    }

  }catch(e){
    mb2.innerHTML='';
    mb2.appendChild(div('tss','Erro ao buscar: '+e.message));
  }

  const mf=div('mf',[btn('btn bg','Fechar',()=>ov.remove())]);
  mo.appendChild(mf);
}


function mkTable(headers,rows,aligns,useRowStyle){
  const thead=el('thead',null,el('tr',null,headers.map((h,hi)=>el('th',aligns&&aligns[hi]||null,h))));
  const tbody=el('tbody',null,rows.map(rowData=>{
    // Suporta tanto array simples quanto {cells,style}
    const cells=useRowStyle&&rowData.cells?rowData.cells:rowData;
    const rowStyle=useRowStyle&&rowData.style?rowData.style:'';
    const tr=el('tr',null,cells.map((c,ci)=>{
      const td=el('td',aligns&&aligns[ci]||null);
      if(c==null)return td;
      if(typeof c==='string'||typeof c==='number')td.appendChild(document.createTextNode(String(c)));
      else td.appendChild(c);
      return td;
    }));
    if(rowStyle)tr.style.cssText=rowStyle;
    return tr;
  }));
  return el('table',null,[thead,tbody]);
}
function mkTabs(keys,active,onChange,labels,noMargin){
  const w=div('tabs');
  if(noMargin)w.style.marginBottom='0';
  keys.forEach((k,i)=>{
    const lb=labels?labels[i]:(UL[k]||k);
    const p=span('tp'+(k===active?' active':''),lb);
    p.addEventListener('click',()=>{w.querySelectorAll('.tp').forEach(x=>x.classList.remove('active'));p.classList.add('active');onChange(k);});
    w.appendChild(p);
  });
  return w;
}
function mkSearch(onChange,ph){
  const inp=el('input',null,null,{placeholder:ph||'Buscar...',style:'border:none;outline:none;font-family:Nunito,sans-serif;font-size:13px;background:transparent;width:100%'});
  inp.addEventListener('input',e=>onChange(e.target.value));
  return div('sb',[document.createTextNode('🔍'),inp]);
}
function fgrp(label,input){const g=div('fg');g.appendChild(el('label','fl',label));g.appendChild(input);return g;}
function finp(id,val,onChange,type){
  const i=el('input','fi',null,{type:type||'text',value:val!=null?String(val):'',id:id||''});
  i.addEventListener('input',e=>onChange(e.target.value));return i;
}
function fsel(id,opts,val,onChange,_,attrs){
  const s=el('select','fs',null,{id:id||'',...(attrs||{})});
  const arr=Array.isArray(opts)?opts.map(o=>typeof o==='string'?{v:o,l:UL[o]||o}:o):opts;
  arr.forEach(o=>{const op=el('option',null,o.l,{value:o.v});if(o.v===String(val)||o.v===val)op.selected=true;s.appendChild(op);});
  s.addEventListener('change',e=>onChange(e.target.value));return s;
}
function mkModal(title,content,onSave,cls){
  const ov=div('ov');
  const mo=div(cls||'mo');
  mo.appendChild(div('mh',[el('h3',null,title),btn('xb','✕',()=>ov.remove())]));
  mo.appendChild(div('mb',content));
  const mf=div('mf',[btn('btn bg','Cancelar',()=>ov.remove())]);
  if(onSave){
    const sb=btn('btn bp','Salvar',async()=>{sb.textContent='Salvando...';sb.disabled=true;try{await onSave();ov.remove();}catch(e){alert('Erro: '+e.message);sb.textContent='Salvar';sb.disabled=false;}});
    mf.appendChild(sb);
  }
  mo.appendChild(mf);
  // Impedir que clicks dentro do modal propaguem para o overlay
  mo.addEventListener('click',e=>e.stopPropagation());
  ov.appendChild(mo);
  ov.addEventListener('click',e=>{
    // Só fecha se clicar exatamente no fundo escuro
    if(e.target===ov)ov.remove();
  });
  document.body.appendChild(ov);
}
