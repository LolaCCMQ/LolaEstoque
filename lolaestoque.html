        '</div>';
      card.addEventListener('click',function(){ if(saida&&saida.id) modalEditarSaida(saida,function(){pgSaidas(c);}); });
      return card;
    }

    function renderLista(){
      listaWrap.innerHTML='';
      var filtrados=_filtroSetor?itens.filter(function(it){return (it.setor||'')===_filtroSetor;}):itens;
      if(!filtrados.length){listaWrap.appendChild(em('📤','Nenhuma saída neste setor'));return;}
      var porData={};
      filtrados.forEach(function(it){var data=(it.lola_saidas&&it.lola_saidas.data_saida)||'';if(!porData[data])porData[data]=[];porData[data].push(it);});
      Object.entries(porData).sort(function(a,b){return b[0].localeCompare(a[0]);}).forEach(function(ent){
        var data=ent[0],dItens=ent[1];
        var dataFmt;
        if(data){var dd=new Date(data+'T12:00:00');var wd=dd.toLocaleDateString('pt-BR',{weekday:'long'});var dm=dd.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}).replace('.','').replace(' de ',' ');dataFmt=wd.charAt(0).toUpperCase()+wd.slice(1)+', '+dm;}else{dataFmt='Sem data';}
        var sep=document.createElement('div');
        sep.style.cssText='display:flex;align-items:center;justify-content:space-between;gap:10px;margin:16px 2px 11px;padding-bottom:7px;border-bottom:2px solid var(--rb)';
        sep.innerHTML='<span style="font-family:Fraunces,serif;font-weight:600;font-size:1.12rem;color:var(--v)">'+_esc(dataFmt)+'</span><span style="flex:0 0 auto;background:#fff;border:1px solid var(--rb);border-radius:20px;padding:3px 11px;font-size:.72rem;font-weight:700;color:var(--tx)">'+dItens.length+' '+(dItens.length===1?'item':'itens')+'</span>';
        listaWrap.appendChild(sep);
        dItens.forEach(function(it){listaWrap.appendChild(mkSaidaCard(it));});
      });
    }

    renderLista();
  }catch(e){c.innerHTML='<p style="color:red;padding:20px">'+e.message+'</p>';}
}

async function modalNovaSaida(onSave){
  // Buscar todos os itens de estoque
  const todosItens=await db('lola_estoque_itens','GET',null,'?ativo=eq.true&order=categoria.asc,nome.asc');

  const f={responsavel:'',destino:'venda',data:new Date().toISOString().split('T')[0],observacoes:''};
  const itensSaida=[]; // {estoque_item_id, nome_item, quantidade, unidade, observacoes, setor}
  let _lastSetor='';
  const listaWrap=div(null);

  function rebuildLista(){
    listaWrap.innerHTML='';
    if(!itensSaida.length){
      listaWrap.appendChild(div('tss mt2','Nenhum item adicionado ainda.'));
      return;
    }
    const tbl=document.createElement('table');
    tbl.style.cssText='width:100%;border-collapse:collapse;margin-top:8px';
    const thead=document.createElement('thead');
    const hRow=document.createElement('tr');
    ['Item','Qtd','Un','Setor','Obs',''].forEach((h,i)=>{
      const th=document.createElement('th');
      th.style.cssText='padding:6px 8px;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--v);background:var(--rt);text-align:'+(i>=1&&i<=2?'right':'left');
      th.textContent=h;hRow.appendChild(th);
    });
    thead.appendChild(hRow);tbl.appendChild(thead);
    const tbody=document.createElement('tbody');
    itensSaida.forEach((it,idx)=>{
      const tr=document.createElement('tr');
      tr.style.cssText=(idx%2===0?'background:var(--rf)':'background:#fff')+';border-bottom:1px solid var(--rb)';

      const tdNome=document.createElement('td');tdNome.style.cssText='padding:6px 8px;font-size:12px;font-weight:600';
      tdNome.textContent=it.nome_item;tr.appendChild(tdNome);

      const tdQtd=document.createElement('td');tdQtd.style.cssText='padding:4px 8px;text-align:right';
      const inpQ=document.createElement('input');inpQ.type='number';inpQ.step='0.5';inpQ.min='0';
      inpQ.value=it.quantidade||'';inpQ.style.cssText='width:70px;padding:4px 6px;border:1.5px solid var(--rb);border-radius:8px;font-size:12px;text-align:right;font-family:Hanken Grotesk,sans-serif';
      inpQ.addEventListener('input',e=>it.quantidade=e.target.value);
      tdQtd.appendChild(inpQ);tr.appendChild(tdQtd);

      const tdUn=document.createElement('td');tdUn.style.cssText='padding:6px 8px;font-size:12px;color:var(--ts);text-align:right';
      tdUn.textContent=it.unidade||'';tr.appendChild(tdUn);

      const tdSetor=document.createElement('td');tdSetor.style.cssText='padding:4px 8px';
      const selSet=document.createElement('select');
      selSet.style.cssText='width:100%;padding:4px 6px;border:1.5px solid var(--rb);border-radius:8px;font-size:11px;font-family:Hanken Grotesk,sans-serif;background:#fff;color:var(--tx)';
      [{v:'',t:'— setor —'}].concat(SAIDA_SETORES.map(x=>({v:x,t:setorLabel(x)}))).forEach(o=>{const op=document.createElement('option');op.value=o.v;op.textContent=o.t;if((it.setor||'')===o.v)op.selected=true;selSet.appendChild(op);});
      selSet.addEventListener('change',e=>{it.setor=e.target.value;if(e.target.value)_lastSetor=e.target.value;});
      tdSetor.appendChild(selSet);tr.appendChild(tdSetor);

      const tdObs=document.createElement('td');tdObs.style.cssText='padding:4px 8px';
      const inpObs=document.createElement('input');inpObs.type='text';inpObs.placeholder='Obs...';
      inpObs.value=it.observacoes||'';inpObs.style.cssText='width:100%;padding:4px 6px;border:1.5px solid var(--rb);border-radius:8px;font-size:11px;font-family:Hanken Grotesk,sans-serif';
      inpObs.addEventListener('input',e=>it.observacoes=e.target.value);
      tdObs.appendChild(inpObs);tr.appendChild(tdObs);

      const tdRm=document.createElement('td');tdRm.style.cssText='padding:4px 8px';
      const rmBtn=btn('btn bd bxs','✕',()=>{itensSaida.splice(idx,1);rebuildLista();});
      tdRm.appendChild(rmBtn);tr.appendChild(tdRm);

      tbody.appendChild(tr);
    });
    tbl.appendChild(tbody);
    listaWrap.appendChild(tbl);
  }

  // Seletor de item
  const selWrap=div('fg2 mt3');
  function _saidaNorm(s){return (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');}
  const buscaItem=el('input','fi',null,{type:'text',placeholder:'🔍 Digite o insumo (ex: vinho, água)...'});
  const resultsWrap=div(null); resultsWrap.style.cssText='margin-top:8px;max-height:300px;overflow-y:auto';
  function renderResultados(q){
    resultsWrap.innerHTML='';
    q=_saidaNorm(q).trim();
    if(!q){ resultsWrap.appendChild(div('tss','Digite acima para buscar um insumo.')); return; }
    const toks=q.split(/\s+/).filter(Boolean);
    const scored=[];
    todosItens.forEach(it=>{ const nn=_saidaNorm(it.nome); if(!toks.every(tk=>nn.indexOf(tk)>=0))return; let sc=2; if(nn.indexOf(q)===0)sc=0; else if(nn.indexOf(' '+q)>=0)sc=1; scored.push({it,sc,nn}); });
    scored.sort((a,b)=> a.sc-b.sc || a.nn.localeCompare(b.nn));
    if(!scored.length){ resultsWrap.appendChild(div('tss','Nenhum insumo encontrado.')); return; }
    scored.slice(0,15).forEach(o=>{ const it=o.it;
      const ja=itensSaida.find(i=>i.estoque_item_id===it.id);
      const row=document.createElement('button'); row.type='button';
      row.style.cssText='display:flex;justify-content:space-between;align-items:center;width:100%;text-align:left;gap:10px;padding:10px 13px;border:1.5px solid var(--rb);border-radius:10px;background:'+(ja?'#f1f1f1':'#fff')+';margin-bottom:6px;cursor:'+(ja?'default':'pointer')+';font-family:Hanken Grotesk,sans-serif;font-size:13px';
      const cat=(typeof CONT_CATS!=='undefined'&&CONT_CATS[it.categoria])||it.categoria||'';
      row.innerHTML='<span style=\"font-weight:700\">'+it.nome+'</span><span style=\"color:var(--ts);font-size:11px;white-space:nowrap\">'+(ja?'✓ já na lista':((it.unidade||'')+(cat?' · '+cat:'')))+'</span>';
      if(!ja) row.addEventListener('click',()=>{ itensSaida.push({estoque_item_id:it.id,nome_item:it.nome,quantidade:'',unidade:it.unidade,observacoes:'',setor:_lastSetor}); rebuildLista(); buscaItem.value=''; renderResultados(''); buscaItem.focus(); });
      resultsWrap.appendChild(row);
    });
  }
  buscaItem.addEventListener('input',e=>renderResultados(e.target.value));
  selWrap.appendChild(fgrp('🔍 Buscar e adicionar insumo',buscaItem));
  selWrap.appendChild(resultsWrap);
  renderResultados('');
  const btnMais=btn('btn bo bsm','\u2795 Adicionar mais itens',()=>{ try{buscaItem.scrollIntoView({behavior:'smooth',block:'center'});}catch(e){} buscaItem.focus(); });

  const inpResp=finp('',f.responsavel,v=>f.responsavel=v);inpResp.placeholder='Seu nome...';
  const inpData=el('input','fi',null,{type:'date',value:f.data});
  inpData.addEventListener('change',e=>f.data=e.target.value);
  const selDestino=fsel('',['venda','evento','descarte','outro'],f.destino,v=>f.destino=v);
  const inpObs=finp('',f.observacoes,v=>f.observacoes=v);inpObs.placeholder='Motivo, observações...';

  mkModal('📤 Nova Saída de Estoque',[
    div('fg3',[
      fgrp('✍️ Responsável',inpResp),
      fgrp('Data',inpData),
      fgrp('Destino',selDestino),
    ]),
    fgrp('Observações',inpObs),
    el('hr','dv'),
    el('strong',null,'Itens retirados',{style:'font-size:13px'}),
    selWrap,
    listaWrap,
    div('mt3 no-print',btnMais),
  ],async()=>{
    if(!f.responsavel.trim()){alert('Informe o responsável.');return;}
    const itensValidos=itensSaida.filter(it=>parseFloat(it.quantidade)>0);
    if(!itensValidos.length){alert('Adicione pelo menos um item com quantidade.');return;}
    const[saida]=await db('lola_saidas','POST',{
      data_saida:f.data,
      responsavel:f.responsavel,
      destino:f.destino,
      observacoes:f.observacoes||null,
    });
    await Promise.all(itensValidos.map(it=>db('lola_saidas_itens','POST',{
      saida_id:saida.id,
      estoque_item_id:it.estoque_item_id,
      nome_item:it.nome_item,
      quantidade:parseFloat(it.quantidade),
      unidade:it.unidade||null,
      setor:it.setor||null,
      observacoes:it.observacoes||null,
    })));
    onSave&&onSave();
  },'mo mol');
  rebuildLista();
}

function drawForn(w,busca){
  w.innerHTML='';
  let f=_fornecedores;
  if(busca)f=f.filter(x=>x.nome.toLowerCase().includes(busca.toLowerCase()));
  if(!f.length){w.appendChild(em('🏪','Nenhum fornecedor encontrado'));return;}
  f.forEach(forn=>{
    const cats=(forn.categorias||[]).map(c=>CONT_CATS[c]||c).join(', ');
    const wp=(forn.whatsapp||forn.telefone||'').replace(/\D/g,'');
    const card=document.createElement('div');
    card.style.cssText='background:#fff;border:1px solid var(--rb);border-radius:16px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 2px rgba(42,26,23,.05)';
    const nomeEl=document.createElement('div');nomeEl.style.cssText='margin-bottom:4px';
    nomeEl.innerHTML='<strong style="font-size:15px">'+forn.nome+'</strong>'+(forn.email?'<div style="font-size:11px;color:var(--ts);margin-top:2px">'+forn.email+'</div>':'');
    card.appendChild(nomeEl);
    if(cats){const catEl=document.createElement('div');catEl.style.cssText='font-size:11px;color:var(--ts);margin-bottom:10px';catEl.textContent=cats;card.appendChild(catEl);}
    const acoes=document.createElement('div');acoes.style.cssText='display:flex;gap:6px;flex-wrap:wrap';
    const bHist=el('button','btn bg bsm',null,{html:'<i class="ph-duotone ph-package"></i> Histórico',onclick:()=>histFornecedor(forn)});
    const bEdit=el('button','btn bg bsm',null,{html:'<i class="ph-duotone ph-pencil-simple"></i> Editar',onclick:()=>modalFornecedor(forn,()=>{
      db('lola_fornecedores','GET',null,'?ativo=eq.true&order=nome.asc').then(d=>{_fornecedores=d;drawForn(w,busca);});
    })});
    const bDel=el('button','btn bd bsm',null,{html:'<i class="ph-duotone ph-trash"></i> Excluir',onclick:async()=>{
      if(!confirm('Excluir "'+forn.nome+'"?'))return;
      await db('lola_fornecedores','PATCH',{ativo:false},'?id=eq.'+forn.id);
      _fornecedores=await db('lola_fornecedores','GET',null,'?ativo=eq.true&order=nome.asc');
      drawForn(w,busca);
    }});

function modalFornecedor(item, onSave){

  // Seleção múltipla de categorias
  const catWrap=div(null);catWrap.style.cssText='display:flex;flex-wrap:wrap;gap:6px;margin-top:4px';
  Object.entries(CONT_CATS).forEach(([k,v])=>{

    pill.style.cssText='padding:5px 12px;border-radius:50px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid var(--rb);transition:all .15s';
    const isSelected=()=>f.categorias.includes(k);
    function updatePill(){
      pill.style.background=isSelected()?'var(--v)':'#fff';
      pill.style.color=isSelected()?'#fff':'var(--ts)';
    }
    pill.textContent=v;
    updatePill();
    pill.addEventListener('click',()=>{
      if(isSelected())f.categorias=f.categorias.filter(c=>c!==k);
      else f.categorias=[...f.categorias,k];
      updatePill();
    });
    catWrap.appendChild(pill);
  });

  mkModal((ed?'Editar':'Novo')+' fornecedor',[
    div('fg2',[
      fgrp('Nome *',finp('',f.nome,v=>f.nome=v)),
      fgrp('Contato (nome)',finp('',f.contato,v=>f.contato=v)),
    ]),
    div('fg2',[
      fgrp('📱 WhatsApp (só números, ex: 5551999990000)',finp('',f.whatsapp,v=>f.whatsapp=v.replace(/\D/g,''))),
      fgrp('Email',finp('',f.email,v=>f.email=v)),
    ]),
    fgrp('Categorias que fornece',catWrap),
    fgrp('Observações',finp('',f.observacoes,v=>f.observacoes=v)),
  ],async()=>{
    if(!f.nome.trim()){alert('Digite o nome do fornecedor.');return;}
    const p={nome:f.nome,contato:f.contato||null,whatsapp:f.whatsapp||null,telefone:f.whatsapp||f.telefone||null,email:f.email||null,categorias:f.categorias,observacoes:f.observacoes||null,ativo:true};
    if(ed)await db('lola_fornecedores','PATCH',p,'?id=eq.'+item.id);
    else await db('lola_fornecedores','POST',p);
    onSave&&onSave();
  });
}

async function renderContArea(){
  const area=$('#cont-area');

  area.appendChild(ld());
  try{
    const itens=await db('lola_estoque_itens','GET',null,'?categoria=eq.'+_contCat+'&ativo=eq.true&order=ordem.asc');
    const contagens=await db('lola_contagens','GET',null,'?order=data_contagem.desc&limit=5');
    area.innerHTML='';
    if(!itens.length){area.appendChild(em('📦','Nenhum item cadastrado para esta categoria'));return;}

    // Cards últimas contagens
    if(contagens.length){
      const hist=div('g3 mb3');
      contagens.slice(0,3).forEach(ct=>{
        const dataFmt=new Date(ct.data_contagem+'T12:00:00').toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'short'});

          e.stopPropagation();
          const resp=ct.responsavel||'';

          if(cn===null)return;
          if(cn.trim().toLowerCase()!==resp.toLowerCase()){alert('Nome incorreto.');return;}
          bDel.textContent='...';bDel.disabled=true;
          await db('lola_contagem_itens','DELETE',null,'?contagem_id=eq.'+ct.id);
          await db('lola_contagens','DELETE',null,'?id=eq.'+ct.id);
          await renderContArea();

        const v=document.createElement('div');v.className='scv';v.style.fontSize='16px';v.textContent=ct.responsavel||'—';
        card.appendChild(v);
        card.appendChild(span('scs','Ver contagem →'));

      });
      area.appendChild(hist);
    }

    // Buscar TODAS as contagens recentes e pegar o último valor de cada item
    // (a contagem mais recente pode não ter todos os itens)
    let ultimosItens={};
    if(contagens.length){
      // Pegar os últimas 10 contagens e para cada item, usar o valor mais recente
      const todasContIds=contagens.map(c=>c.id);
      const uItens=await db('lola_contagem_itens','GET',null,
        '?contagem_id=in.('+todasContIds.join(',')+')'
        +'&select=*,lola_contagens!contagem_id(data_contagem)'
        +'&order=lola_contagens(data_contagem).desc');
      // Para cada item, guardar só o valor mais recente (primeiro da lista)
      uItens.forEach(it=>{
        if(!ultimosItens[it.estoque_item_id]){
          const data=it.lola_contagens?.data_contagem;
          ultimosItens[it.estoque_item_id]={
            qtd:it.qtd_contada,
            pedido:it.pedido,
            data:data?new Date(data+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}):null
          };
        }
      });
    }

    // Alertas
    const abaixo=itens.filter(it=>{const u=ultimosItens[it.id];return u&&parseFloat(u.qtd)<=parseFloat(it.qtd_minima);});
    if(abaixo.length){
      const alertBox=document.createElement('div');
      alertBox.style.cssText='background:#FBEAE7;border:1px solid #F3D3CE;color:#B5302E;border-radius:14px;padding:12px 16px;margin-bottom:14px';

        alertBox.appendChild(r);

    const wrapIt=document.createElement('div');
    itens.forEach(it=>{
      const u=ultimosItens[it.id];
      const qtd=u?parseFloat(u.qtd):null;
      const min=parseFloat(it.qtd_minima)||0;
      let stDot,stLab,stCol;

      else if(qtd<=0){stDot='#B5302E';stLab='Zerado';stCol='#B5302E';}

      else{stDot='#2C7A4B';stLab='OK';stCol='#2C7A4B';}
      const card=div('cont-card');
      const top=div('cont-top');
      top.appendChild(el('span','cont-nome',[it.nome]));
      top.appendChild(el('span','cont-st',null,{html:'<span class="cont-dot" style="background:'+stDot+'"></span> '+stLab,style:'color:'+stCol}));
      card.appendChild(top);

      meta.appendChild(contCell('Última qtd',uq));
      meta.appendChild(contCell('Mínimo',N(min,0)));
      meta.appendChild(contCell('Fornecedor',it.fornecedor||'—'));
      meta.appendChild(el('button','cont-edit',null,{html:'<i class="ph-duotone ph-pencil-simple"></i>',title:'Editar',onclick:()=>modalEditarItemEstoque(it,()=>renderContArea())}));
      card.appendChild(meta);
      wrapIt.appendChild(card);
    });
    area.appendChild(wrapIt);
  }catch(e){area.innerHTML='<p style="color:red">'+e.message+'</p>';}
}

    });

        // Salvar recebimento
        const[receb]=await db('lola_pedidos_recebimentos','POST',{
          pedido_id:p.id,recebido_por:respVal,data_recebimento:dataReceb,status:statusReceb
        });
        // Salvar itens do recebimento
        for(const v of Object.values(recvMap)){
          await db('lola_pedidos_recebimentos_itens','POST',{
            recebimento_id:receb.id,pedido_item_id:v.item.id,
            nome_item:v.item.nome_item,qtd_solicitada:parseFloat(v.item.quantidade)||0,
            qtd_recebida:parseFloat(v.qtdRecebida)||0,unidade:v.item.unidade
          });
        }
        // Calcular novo valor total pela qtd recebida
        const itensParaValor=await db('lola_pedidos_itens','GET',null,'?pedido_id=eq.'+p.id);
        let novoTotal=0;
        for(const v of Object.values(recvMap)){
          const itemPed=itensParaValor.find(x=>x.id===v.item.id);
          const preco=parseFloat(itemPed?.preco_unitario)||0;
          novoTotal+=parseFloat(v.qtdRecebida)*preco;
          // Atualizar quantidade do item pelo recebido
          await db('lola_pedidos_itens','PATCH',{quantidade:parseFloat(v.qtdRecebida)},'?id=eq.'+v.item.id);
        }
        // Atualizar status e valor total do pedido
        await db('lola_pedidos','PATCH',{status:statusReceb,valor_total:novoTotal},'?id=eq.'+p.id);
        p.status=statusReceb;
        _peds=await db('lola_pedidos','GET',null,'?select=*&order=created_at.desc');
        drawPed($('#ped-t'));
        ov.remove();
        // Se tiver divergência, abrir modal de relatório
        if(divergencias.length>0){
          setTimeout(()=>verDivergencias(p,divergencias,dataReceb,respVal),300);
        }else{
          alert('\u{2705} Recebimento registrado! Pedido recebido completo.');
        }
      })
    ]));
  }catch(e){mb.innerHTML='<p style="color:red;padding:20px">'+e.message+'</p>';}
}

function drawPed(w){
  w.innerHTML='';
  const f=pedFiltrados();
  if(!f.length){w.appendChild(em('📋','Nenhum pedido encontrado'));return;}
  const STATUS_COLORS={
    rascunho:'background:#F1EEE9;color:#6B6258',
    em_producao:'background:#E6EEF8;color:#2C5AA0',
    pronto_entrega:'background:#FBF0DD;color:#9A6B1E',
    recebido_completo:'background:#E6F3EA;color:#2C7A4B',
    recebido_divergencia:'background:#FBF0DD;color:#9A6B1E',
    cancelado:'background:#FBEAE7;color:#B5302E',
    solicitado:'background:#E6EEF8;color:#2C5AA0',
    confirmado:'background:#FBF0DD;color:#9A6B1E',
    entregue:'background:#F1E7FA;color:#6B4FA8',
  };
  const STATUS_LBL={em_producao:'Em produção',pronto_entrega:'Pronto para entrega',recebido_completo:'Recebido completo',recebido_divergencia:'Recebido c/ diverg.',cancelado:'Cancelado',solicitado:'Em produção',confirmado:'Pronto para entrega',entregue:'Entregue'};
  const wrap=document.createElement('div');
  f.forEach(p=>{
    const card=div('ped-card');
    const destLabel=p.unidade==='ccmq'?'CCMQ':p.unidade==='mac'?'Mac':(p.destinatario||p.unidade||'—');
    card.appendChild(div('ped-top',[
      div('ped-numwrap',[el('span','ped-num','#'+p.numero_pedido),bq(destLabel,p.unidade==='ccmq'?'bc':p.unidade==='mac'?'bm':'bev')]),
      el('span','ped-val',R(p.valor_total))
    ]));
    card.appendChild(div('ped-meta',[DBR(p.data_pedido)+(p.responsavel?(' · por '+p.responsavel):(p.observacoes?(' · '+p.observacoes):''))]));
    // status
    const st=div('ped-status');
    if(p.status==='rascunho'){
      st.appendChild(el('span',null,null,{html:'<i class="ph-duotone ph-note-pencil"></i> Rascunho',style:'display:inline-flex;align-items:center;gap:6px;background:#F1EEE9;color:#6B6258;font-size:12px;font-weight:700;padding:7px 12px;border-radius:11px'}));
    } else {
      const sel=document.createElement('select');
      function applySelStyle(status){sel.style.cssText='padding:8px 13px;font-size:12px;font-weight:700;border-radius:11px;border:none;cursor:pointer;font-family:Hanken Grotesk,sans-serif;'+(STATUS_COLORS[status]||'');}
      applySelStyle(p.status);
      ['em_producao','pronto_entrega','recebido_completo','recebido_divergencia','cancelado'].forEach(s=>{
        const o=document.createElement('option');o.value=s;o.textContent=STATUS_LBL[s]||s;if(s===p.status)o.selected=true;sel.appendChild(o);
      });
      sel.addEventListener('change',async e=>{await db('lola_pedidos','PATCH',{status:e.target.value},'?id=eq.'+p.id);p.status=e.target.value;applySelStyle(e.target.value);});
      st.appendChild(sel);
    }
    card.appendChild(st);
    // botões (compactos, 1 linha)
    const btns=div('ped-btns');
    const pab=(ic,lb,extra,fn)=>el('button','ped-ab'+(extra?' '+extra:''),null,{html:'<i class="ph-duotone '+ic+'"></i> '+lb,onclick:fn});
    btns.appendChild(pab('ph-eye','Ver','',()=>verPedido(p)));
    btns.appendChild(pab('ph-pencil-simple','Editar','',()=>editarPedido(p)));
    if(p.status==='rascunho'){
      btns.appendChild(pab('ph-paper-plane-tilt','Enviar','send',async()=>{
        if(!confirm('Enviar pedido #'+p.numero_pedido+' para a Central?'))return;
        await db('lola_pedidos','PATCH',{status:'solicitado'},'?id=eq.'+p.id);
        p.status='solicitado';
        _peds=await db('lola_pedidos','GET',null,'?select=*&order=created_at.desc');
        drawPed($('#ped-t'));
      }));
    } else if(p.status==='em_producao'||p.status==='pronto_entrega'||p.status==='solicitado'||p.status==='confirmado'){
      btns.appendChild(pab('ph-tray-arrow-down','Receber','recv',()=>registrarRecebimento(p)));
      btns.appendChild(pab('ph-printer','Imprimir','',()=>imprimirPed(p)));
    } else if(p.status==='recebido_divergencia'){
      btns.appendChild(pab('ph-warning','Diverg.','warn',()=>verDivergencias(p,null,null,null)));
      btns.appendChild(pab('ph-printer','Imprimir','',()=>imprimirPed(p)));
    } else {
      btns.appendChild(pab('ph-printer','Imprimir','',()=>imprimirPed(p)));
    }
    card.appendChild(btns);
    wrap.appendChild(card);
  });
  w.appendChild(wrap);
}

    const bAtualizar=el('button','btn bo bsm',null,{html:'<i class="ph-duotone ph-arrows-clockwise"></i> Atualizar',onclick:recarregarPedidos});
    bAtualizar.id='btn-refresh-ped';
    btnsDir.appendChild(bAtualizar);
    const bNovo=el('button','btn bp',null,{html:'<i class="ph-duotone ph-plus"></i> Novo pedido',onclick:()=>modalNovoPedido()});
    bNovo.style.cssText='padding:10px 22px;font-size:13px;font-weight:800;letter-spacing:.5px;box-shadow:0 3px 10px rgba(170,43,43,.3)';
    btnsDir.appendChild(bNovo);
    barraTopo.appendChild(btnsDir);
    const barraWrap=div('abar no-print');
    const coluna=div(null);
    coluna.style.cssText='display:flex;flex-direction:column;gap:8px;flex:1';
    coluna.appendChild(barraTopo);
    coluna.appendChild(mesDropWrap);
    barraWrap.appendChild(coluna);
    c.appendChild(barraWrap);

    // Resumo financeiro do período
    const resumoEl=div('',null,{id:'ped-resumo'});
    const w=div(null,null,{id:'ped-t'});
    c.appendChild(w);
    c.appendChild(resumoEl);

    function atualizaResumo(){
      const base=_pedMes?_peds.filter(p=>p.data_pedido?.startsWith(_pedMes)):_peds;
      // Contar pedidos RECEBIDOS (completo + com divergencia) no resumo financeiro
      const entregues=base.filter(p=>p.status==='recebido_completo'||p.status==='recebido_divergencia');
      const totCCMQ=entregues.filter(p=>p.unidade==='ccmq').reduce((t,p)=>t+parseFloat(p.valor_total||0),0);
      const totMAC=entregues.filter(p=>p.unidade==='mac').reduce((t,p)=>t+parseFloat(p.valor_total||0),0);
      const totTerc=entregues.filter(p=>p.unidade==='terceiro').reduce((t,p)=>t+parseFloat(p.valor_total||0),0);
      const totGeral=totCCMQ+totMAC+totTerc;
      const label=_pedMes?(()=>{const[ano,mes]=_pedMes.split('-');return new Date(ano,parseInt(mes)-1,1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'});})():'todos os períodos';
      const nCCMQ=entregues.filter(p=>p.unidade==='ccmq').length;
      const nMAC=entregues.filter(p=>p.unidade==='mac').length;
      const nTerc=entregues.filter(p=>p.unidade==='terceiro').length;
      // Pedidos pendentes (para info)
      const nPend=base.filter(p=>p.status==='solicitado'||p.status==='confirmado').length;
      resumoEl.innerHTML='';
      const g=div('g3 mb3',[
        div('sc',[
          span('scl','CCMQ — '+label.toUpperCase()),
          div('scv',R(totCCMQ)),
          span('scs',nCCMQ+' pedido'+(nCCMQ!==1?'s':'')+' recebidos'),
        ]),
        div('sc',[
          span('scl','MAC — '+label.toUpperCase()),
          el('div','scv tvd',R(totMAC)),
          span('scs',nMAC+' pedido'+(nMAC!==1?'s':'')+' recebidos'),
        ]),
        div('sc',[
          span('scl','TERCEIROS — '+label.toUpperCase()),
          el('div','scv',R(totTerc),{style:'color:var(--am)'}),
          span('scs',nTerc+' pedido'+(nTerc!==1?'s':'')+' recebidos'),
        ]),
      ]);
      const infoEl=div(null);
      infoEl.appendChild(el('span','bold',_pedMes?'Total recebido no período:':'Total recebido (geral):',{style:'font-size:14px'}));
      if(nPend>0) infoEl.appendChild(el('span','tss',' · '+nPend+' pedido'+(nPend!==1?'s':'')+' ainda em aberto',{style:'font-size:11px;margin-left:8px'}));
      const tot=div('card mb3 fl_ jb aic',[
        infoEl,
        el('span','bold tv',R(totGeral),{style:'font-size:22px;font-family:Fraunces,serif'}),
      ]);
      tot.style.cursor='pointer';
      tot.title='Clique para ver o resumo por categoria';
      infoEl.appendChild(el('span','tss',' · 🔎 clique para ver por categoria',{style:'font-size:11px;margin-left:6px;color:var(--v);font-weight:700'}));
      tot.addEventListener('click',()=>verResumoCategorias(label,entregues));
      resumoEl.appendChild(g);
      resumoEl.appendChild(tot);
    }

    atualizaResumo();
    drawPed(w);

  }catch(e){c.innerHTML='<p style="color:red;padding:20px">'+e.message+'</p>';}
}

async function verResumoCategorias(label, pedidos){
  const ov=div('ov');const mo=div('mo mol');
  mo.appendChild(div('mh',[el('h3',null,'🔎 Compras por categoria — '+label),btn('xb','✕',()=>ov.remove())]));
  const mb=div('mb');mb.appendChild(ld());mo.appendChild(mb);
  ov.appendChild(mo);
  ov.addEventListener('click',e=>{if(e.target===ov)ov.remove();});
  document.body.appendChild(ov);
  try{
    const ids=(pedidos||[]).map(p=>p.id);
    if(!ids.length){mb.innerHTML='';mb.appendChild(div('tss','Nenhum pedido recebido neste período.'));mo.appendChild(div('mf',[btn('btn bg','Fechar',()=>ov.remove())]));return;}
    const norm=x=>(x||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').trim();
    const [itens,pps,inss]=await Promise.all([
      db('lola_pedidos_itens','GET',null,'?pedido_id=in.('+ids.join(',')+')&select=nome_item,quantidade,preco_unitario'),
      db('lola_preproducoes','GET',null,'?select=nome,cat_custo'),
      db('lola_insumos','GET',null,'?select=nome,categoria'),
    ]);
    const ppMap={};pps.forEach(x=>{ppMap[norm(x.nome)]=x.cat_custo||'';});
    const insMap={};inss.forEach(x=>{insMap[norm(x.nome)]=x.categoria||'';});
    const acc={};const exemplos={};let total=0;
    itens.forEach(it=>{
      const v=(parseFloat(it.quantidade)||0)*(parseFloat(it.preco_unitario)||0);
      const nn=norm(it.nome_item);
      let cat=ppMap[nn];
      if(!cat){ if(insMap[nn]!==undefined) cat=INS_TO_COST[insMap[nn]]||'Temperos e Outros'; }
      if(!cat)cat='Sem categoria';
      acc[cat]=(acc[cat]||0)+v;total+=v;
      if(!exemplos[cat])exemplos[cat]=new Set();
      if(exemplos[cat].size<5)exemplos[cat].add((it.nome_item||'').replace(/^PP /i,''));
    });
    const linhas=Object.entries(acc).sort((a,b)=>b[1]-a[1]);
    mb.innerHTML='';
    mb.appendChild(div('card mb3 fl_ jb aic',[el('strong',null,'Total recebido no período'),el('span','bold tv',R(total),{style:'font-size:20px;font-family:Fraunces,serif'})]));
    linhas.forEach(([cat,val])=>{
      const pct=total>0?(val/total*100):0;
      const wrap=div('card',null,{style:'margin-bottom:8px'});
      wrap.appendChild(div('fl_ jb aic',[
        el('strong',null,(COST_EMOJI[cat]||'')+' '+cat,{style:'font-size:13px'}),
        el('span','bold tv',R(val)+'  ·  '+pct.toFixed(0)+'%',{style:'font-size:13px'}),
      ]));
      const barOuter=div(null,null,{style:'height:7px;background:var(--rf);border-radius:5px;margin-top:6px;overflow:hidden'});
      barOuter.appendChild(div(null,null,{style:'height:100%;width:'+pct.toFixed(1)+'%;background:var(--v);border-radius:5px'}));
      wrap.appendChild(barOuter);
      const ex=[...(exemplos[cat]||[])].join(', ');
      if(ex)wrap.appendChild(div('tss',ex,{style:'margin-top:6px;font-size:11px'}));
      mb.appendChild(wrap);
    });
  }catch(e){mb.innerHTML='<p style="color:red">'+e.message+'</p>';}
  mo.appendChild(div('mf',[btn('btn bg','Fechar',()=>ov.remove())]));
}

async function modalNovoPedido(){
  // Sempre recarregar para ter destinos atualizados
  _pp=await db('lola_preproducoes','GET',null,'?select=id,nome,categoria,rendimento_qtd,rendimento_un,porcao_qtd,porcao_un,custo_total,custo_por_unidade,valor_venda_central,margem_venda,destinos,e_preparo&ativo=eq.true&order=nome.asc');
  _ins=await db('lola_insumos','GET',null,'?select=id,nome,categoria,unidade_compra,unidade_custo,custo_por_unidade,destinos&ativo=eq.true&order=nome.asc');

  const DEST_COR={ccmq:'#AA2B2B',mac:'#166534',eventos:'#c47700'};
  const DEST_LBL={ccmq:'CCMQ',mac:'MAC',eventos:'Evento'};
  const DEST_KEYS=['ccmq','mac','eventos'];

  let _destPed='ccmq';
  let _dataPed=TD();
  let _respPed='';
  let _obsPed='';

  // Mapa de quantidades: id -> {item, quantidade}
  const qtdMap={};

  const ov=div('ov');
  const mo=div('mo moxl');
  mo.addEventListener('click',e=>e.stopPropagation());
  ov.addEventListener('click',e=>{if(e.target===ov)ov.remove();});

  // Header
  mo.appendChild(div('mh',[
    el('h3',null,'🛒 Novo Pedido'),
    btn('xb','✕',()=>ov.remove())
  ]));

  const mb=div('mb');mo.appendChild(mb);

  // Linha 1: Destino + Data
  const inpData=el('input','fi',null,{type:'date',value:_dataPed});
  inpData.addEventListener('change',e=>_dataPed=e.target.value);

  // Abas de destino
  const destTabsWrap=div('tabs mb3');
  function buildDestTabs(){
    destTabsWrap.innerHTML='';
    DEST_KEYS.forEach(k=>{
      const p=span('tp'+(_destPed===k?' active':''),DEST_LBL[k]);
      p.style.cssText+=(';font-weight:800;border:2px solid '+DEST_COR[k]);
      if(_destPed===k) p.style.background=DEST_COR[k]+';color:#fff';
      p.addEventListener('click',()=>{_destPed=k;buildDestTabs();buildItens();});
      destTabsWrap.appendChild(p);
    });
  }
  buildDestTabs();

  mb.appendChild(div('fg2 mb3',[
    fgrp('Destino',destTabsWrap),
    fgrp('Data',inpData),
  ]));

  mb.appendChild(el('hr','dv'));

  // Campo de busca
  const buscaInp=el('input','fi',null,{placeholder:'🔍 Buscar item...',autocomplete:'off'});
  buscaInp.style.cssText='width:100%;margin-bottom:8px';
  buscaInp.addEventListener('input',e=>{_buscaNovoPed=e.target.value.toLowerCase();buildItens();});
  mb.appendChild(buscaInp);

  // Área de itens
  const itensArea=div(null);
  mb.appendChild(itensArea);

  let _buscaNovoPed='';

  function buildItens(){
    itensArea.innerHTML='';

    // Pedido à central: pré-preparos + marcados destino "central"; insumos da unidade + destino "central"
    const ppDest=_pp.filter(x=>(x.e_preparo||(x.destinos||[]).includes('central'))&&
      (!_buscaNovoPed||x.nome.toLowerCase().includes(_buscaNovoPed)));
    const insDest=_ins.filter(x=>((x.destinos||[]).includes(_destPed)||(x.destinos||[]).includes('central'))&&
      (!_buscaNovoPed||x.nome.toLowerCase().includes(_buscaNovoPed)));

    const conteudo=div(null);

    if(!ppDest.length&&!insDest.length){
      conteudo.appendChild(div('tss mt3 mb3','Nenhum item categorizado para '+DEST_LBL[_destPed]+' ainda. Use o botão 🏷️ nas pré-produções e insumos para categorizar.'));
      itensArea.appendChild(conteudo);
      return;
    }

    function mkGrupo(titulo, lista, getPreco, getUnidade, getId, getNome){
      if(!lista.length) return;
      const g=div(null);
      g.style.cssText='margin-bottom:16px';
      const gt=document.createElement('div');
      gt.style.cssText='font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--v);margin-bottom:8px;padding-bottom:4px;border-bottom:1.5px solid var(--rb)';
      gt.textContent=titulo;
      g.appendChild(gt);

      lista.forEach(item=>{
        const id=getId(item);
        if(!qtdMap[id]) qtdMap[id]={item,quantidade:'',preco:getPreco(item),unidade:getUnidade(item),nome:getNome(item)};

        const row=document.createElement('div');
        row.style.cssText='display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;margin-bottom:4px;background:var(--rf);border:1px solid var(--rb)';

        // Nome + preço
        const info=document.createElement('div');info.style.cssText='flex:1;min-width:0';
        const n=document.createElement('div');n.style.cssText='font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis';
        n.textContent=getNome(item);
        const p2=document.createElement('div');p2.style.cssText='font-size:11px;color:var(--ts)';
        p2.textContent=R(getPreco(item))+'/'+getUnidade(item);
        info.appendChild(n);info.appendChild(p2);row.appendChild(info);

        // Input quantidade
        const inp=document.createElement('input');
        inp.type='number';inp.min='0';inp.step='0.5';
        inp.placeholder='0';
        inp.value=qtdMap[id].quantidade||'';
        inp.setAttribute('inputmode','decimal');
        inp.style.cssText='width:80px;padding:8px;border:2px solid var(--rb);border-radius:10px;font-size:15px;text-align:center;font-family:Hanken Grotesk,sans-serif;font-weight:700;-webkit-appearance:none';
        inp.addEventListener('input',e=>{
          qtdMap[id].quantidade=parseFloat(e.target.value)||0;
          inp.style.borderColor=parseFloat(e.target.value)>0?'var(--v)':'var(--rb)';
          calcTotal();
        });
        if(qtdMap[id].quantidade>0) inp.style.borderColor='var(--v)';

        // Unidade
        const un=document.createElement('div');
        un.style.cssText='font-size:11px;color:var(--ts);width:30px;text-align:left;font-weight:600';
        un.textContent=getUnidade(item);
        row.appendChild(info);row.appendChild(inp);row.appendChild(un);
        g.appendChild(row);
      });
      conteudo.appendChild(g);
    }

    // Grupo pré-produções
    mkGrupo('🍳 Pré-produções',ppDest,
      x=>{
        const ru=x.rendimento_un||'un';
        const porcaoQtd=parseFloat(x.porcao_qtd)||0;
        const porcaoUn=x.porcao_un||'';
        if(porcaoQtd>0&&porcaoUn&&porcaoUn!==ru){
          const numP=(parseFloat(x.rendimento_qtd)||1)/porcaoQtd;
          return (parseFloat(x.custo_total||0)/numP)/(parseFloat(x.margem_venda||70)/100);
        }
        return parseFloat(x.valor_venda_central)||0;
      },
      x=>{
        const ru=x.rendimento_un||'un';
        const porcaoQtd=parseFloat(x.porcao_qtd)||0;
        const porcaoUn=x.porcao_un||'';
        if(porcaoQtd>0&&porcaoUn&&porcaoUn!==ru) return porcaoUn==='un'?'porção':porcaoUn;
        return ru==='g'?'kg':ru==='ml'?'L':ru;
      },
      x=>'pp_'+x.id,
      x=>x.nome
    );

    // Grupo insumos
    mkGrupo('🧂 Insumos',insDest,
      x=>{
        const uc=x.unidade_custo||'kg';
        const uCompra=x.unidade_compra||uc;
        if(uCompra==='g'&&uc==='kg') return x.custo_por_unidade/1000;
        if(uCompra==='ml'&&uc==='L') return x.custo_por_unidade/1000;
        return parseFloat(x.custo_por_unidade)||0;
      },
      x=>x.unidade_compra||x.unidade_custo||'un',
      x=>'ins_'+x.id,
      x=>x.nome
    );

    itensArea.appendChild(conteudo);
    calcTotal();
  }

  // Total
  const totalEl=div('custo-box mt3 mb3');
  mb.appendChild(totalEl);

  function calcTotal(){
    const total=Object.values(qtdMap).reduce((t,v)=>t+(v.quantidade||0)*v.preco,0);
    totalEl.innerHTML='';
    const itensComQtd=Object.values(qtdMap).filter(v=>v.quantidade>0);
    if(itensComQtd.length){
      itensComQtd.forEach(v=>{
        const sub=(v.quantidade||0)*v.preco;
        const row=div('fl_ jb aic',null,{style:'font-size:12px;padding:3px 0;border-bottom:1px solid var(--rf)'});
        const nl=document.createElement('span');nl.textContent=v.nome+' × '+v.quantidade+' '+v.unidade;
        const sl=document.createElement('span');sl.style.cssText='font-weight:700;color:var(--v)';sl.textContent=R(sub);
        row.appendChild(nl);row.appendChild(sl);
        totalEl.appendChild(row);
      });
    }
    const totRow=div('fl_ jb aic mt2');
    const tl=document.createElement('strong');tl.textContent='TOTAL';
    const tv=document.createElement('span');tv.style.cssText='font-size:20px;font-weight:800;color:var(--v)';tv.textContent=R(total);
    totRow.appendChild(tl);totRow.appendChild(tv);
    totalEl.appendChild(totRow);
  }

  // Rodapé: responsável + obs
  mb.appendChild(el('hr','dv'));
  const inpResp=el('input','fi',null,{type:'text',placeholder:'Seu nome (obrigatório)'});
  inpResp.addEventListener('input',e=>{_respPed=e.target.value;inpResp.style.borderColor=e.target.value.trim()?'var(--vd)':'var(--rb)';});
  const inpObs=el('input','fi',null,{type:'text',placeholder:'Observações...'});
  inpObs.addEventListener('input',e=>_obsPed=e.target.value);
  mb.appendChild(div('fg2 mt2',[fgrp('✍️ Responsável',inpResp),fgrp('Observações',inpObs)]));

  // Footer
  const mf=div('mf');
  mf.appendChild(btn('btn bg','Cancelar',()=>ov.remove()));
  const saveBtn=btn('btn bp','Salvar rascunho',async()=>{
    if(!_respPed.trim()){inpResp.style.borderColor='#dc2626';inpResp.focus();return;}
    const itensValidos=Object.values(qtdMap).filter(v=>v.quantidade>0);
    if(!itensValidos.length){alert('Adicione pelo menos um item com quantidade.');return;}
    saveBtn.textContent='Salvando...';saveBtn.disabled=true;
    try{
      const total=itensValidos.reduce((t,v)=>t+(v.quantidade||0)*v.preco,0);
      const[ped]=await db('lola_pedidos','POST',{
        unidade:_destPed,status:'rascunho',
        data_pedido:_dataPed||TD(),
        valor_total:total,
        observacoes:_obsPed||null,
        responsavel:_respPed,
      });
      for(const v of itensValidos){
        await db('lola_pedidos_itens','POST',{
          pedido_id:ped.id,
          nome_item:v.nome,
          quantidade:v.quantidade,
          unidade:v.unidade,
          preco_unitario:v.preco,
        });
      }
      _peds=await db('lola_pedidos','GET',null,'?select=*&order=created_at.desc');
      drawPed($('#ped-t'));
      ov.remove();
    }catch(e){alert('Erro: '+e.message);saveBtn.textContent='Salvar rascunho';saveBtn.disabled=false;}
  });
  mf.appendChild(saveBtn);
  mo.appendChild(mf);
  ov.appendChild(mo);
  document.body.appendChild(ov);
  buildItens();
}

async function editarPedido(ped){
  try{
    if(!_pp.length)_pp=await db('lola_preproducoes','GET',null,'?select=*&ativo=eq.true&order=nome.asc');
    if(!_ins.length)_ins=await db('lola_insumos','GET',null,'?select=*&ativo=eq.true&order=nome.asc');

    const existentes=await db('lola_pedidos_itens','GET',null,'?select=*&pedido_id=eq.'+ped.id);
    // Construir lista de itens editáveis
    const itens=existentes.map(it=>({
      nome:it.nome_item||'',
      unidade:it.unidade||'',
      preco:parseFloat(it.preco_unitario)||0,
      quantidade:parseFloat(it.quantidade)||0,
    }));

    let destino=ped.unidade||'ccmq';
    const ov=div('ov');
    const mo=div('mo moxl');
    mo.appendChild(div('mh',[
      el('h3',null,'✏️ Editar Pedido #'+ped.numero_pedido),
      btn('xb','✕',()=>ov.remove())
    ]));
    const mb=div('mb');
    mo.appendChild(mb);

    // Cabeçalho
    const destSel=fsel('',['ccmq','mac','terceiro'],destino,v=>{destino=v;});
    let dataPedido=ped.data_pedido||TD();
    const inpData=el('input','fi',null,{type:'date',value:dataPedido});
    inpData.addEventListener('change',e=>dataPedido=e.target.value);
    mb.appendChild(div('fg2 mb3',[
      fgrp('Destino',destSel),
      fgrp('Data',inpData),
    ]));

    mb.appendChild(el('hr','dv'));
    mb.appendChild(el('strong',null,'Itens do pedido',{style:'font-size:13px;display:block;margin:10px 0'}));

    // Tabela de itens
    const tblWrap=div('tw mb3');
    mb.appendChild(tblWrap);

    function rebuildTabela(){
      tblWrap.innerHTML='';
      if(!itens.length){
        tblWrap.appendChild(div('tss mt2','Nenhum item. Adicione abaixo.'));
        calcTotal();return;
      }
      const tbl=document.createElement('table');
      tbl.style.width='100%';tbl.style.borderCollapse='collapse';
      // thead
      const thead=document.createElement('thead');
      const htr=document.createElement('tr');
      ['Item','Un','Preço','Qtd','Subtotal',''].forEach((h,i)=>{
        const th=document.createElement('th');
        th.style.cssText='padding:7px 10px;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--v);background:var(--rt);text-align:'+(i>=2&&i<=4?'right':'left');
        th.textContent=h;htr.appendChild(th);
      });
      thead.appendChild(htr);tbl.appendChild(thead);
      // tbody
      const tbody=document.createElement('tbody');
      itens.forEach((it,idx)=>{
        const tr=document.createElement('tr');
        tr.style.cssText=(idx%2===0?'background:var(--rf)':'background:#fff')+';border-bottom:1px solid var(--rb)';

        function mkTd(txt,align,bold){
          const td=document.createElement('td');
          td.style.cssText='padding:7px 10px;font-size:12px;text-align:'+(align||'left')+(bold?';font-weight:700':'');
          td.textContent=txt||'';return td;
        }
        tr.appendChild(mkTd(it.nome,'left',true));
        tr.appendChild(mkTd(it.unidade));
        tr.appendChild(mkTd(R(it.preco),'right'));

        // Input quantidade
        const tdQtd=document.createElement('td');tdQtd.style.cssText='padding:4px 10px';
        const inpQ=document.createElement('input');inpQ.type='number';inpQ.min='0';inpQ.step='0.01';
        inpQ.value=it.quantidade;
        inpQ.style.cssText='width:75px;padding:5px 7px;border:1.5px solid var(--rb);border-radius:8px;font-size:12px;text-align:right;font-family:Hanken Grotesk,sans-serif';
        inpQ.addEventListener('input',e=>{it.quantidade=parseFloat(e.target.value)||0;calcTotal();
          subTd.textContent=R(it.quantidade*it.preco);
          subTd.style.color=it.quantidade>0?'var(--v)':'var(--ts)';
        });
        tdQtd.appendChild(inpQ);tr.appendChild(tdQtd);

        // Subtotal
        const subTd=document.createElement('td');
        subTd.style.cssText='padding:7px 10px;font-size:12px;text-align:right;font-weight:700;color:'+(it.quantidade>0?'var(--v)':'var(--ts)');
        subTd.textContent=R(it.quantidade*it.preco);tr.appendChild(subTd);

        // Remover
        const tdRm=document.createElement('td');tdRm.style.cssText='padding:4px 10px;text-align:right';
        const rmBtn=btn('btn bd bxs','✕',()=>{itens.splice(idx,1);rebuildTabela();});
        tdRm.appendChild(rmBtn);tr.appendChild(tdRm);

        tbody.appendChild(tr);
      });
      tbl.appendChild(tbody);tblWrap.appendChild(tbl);
      calcTotal();
    }

    // Total
    const totalEl=div('custo-box mb3');
    mb.appendChild(totalEl);
    function calcTotal(){
      const total=itens.reduce((t,i)=>t+(i.quantidade*i.preco),0);
      totalEl.innerHTML='<div class="fl_ jb aic"><strong>TOTAL</strong><span class="bold tv" style="font-size:18px">'+R(total)+'</span></div>';
    }

    // Adicionar novo item
    mb.appendChild(el('strong',null,'+ Adicionar item',{style:'font-size:12px;color:var(--ts);display:block;margin-bottom:8px'}));
    let tipoAdd='preprods';
    const tabsAdd=div('tabs mb2');
    const optsWrap=div(null);

    function buildOpts(){
      optsWrap.innerHTML='';
      // Montar lista completa de itens para autocomplete
      let listaTotal=[];
      if(tipoAdd==='preprods'){
         listaTotal=_pp.map(x=>{
           const ru=x.rendimento_un||'un';
           const porcaoQtd=parseFloat(x.porcao_qtd)||0;
           const porcaoUn=x.porcao_un||'';
           if(porcaoQtd>0 && porcaoUn && porcaoUn!==ru){
             const rendQtd=parseFloat(x.rendimento_qtd)||1;
             const numPorcoes=rendQtd/porcaoQtd;
             const custoPorcao=parseFloat(x.custo_total||0)/numPorcoes;
             const vendaPorcao=custoPorcao/(1-(parseFloat(x.margem_venda||70)/100));
             const unLabel=porcaoUn==='un'?'porção':porcaoUn;
             return {nome:x.nome,unidade:unLabel,preco:vendaPorcao,tipo:'prep',cat:x.categoria,
                     info:'('+porcaoQtd+ru+'/porção — '+numPorcoes.toFixed(1)+' porções)'};
           }
           const unidade=ru==='g'?'kg':ru==='ml'?'L':ru;
           return {nome:x.nome,unidade,preco:x.valor_venda_central,cat:x.categoria};
         }).sort((a,b)=>a.nome.localeCompare(b.nome,'pt'));
      } else {
        listaTotal=_ins.map(x=>{
          const uc=x.unidade_custo||'kg';
          const uCompra=x.unidade_compra||uc;
          let precoPedido;
          if(uCompra==='g'&&uc==='kg') precoPedido=x.custo_por_unidade/1000;
          else if(uCompra==='ml'&&uc==='L') precoPedido=x.custo_por_unidade/1000;
          else precoPedido=x.custo_por_unidade;
          return {nome:x.nome,unidade:uCompra,preco:precoPedido,cat:x.categoria||''};
        }).sort((a,b)=>a.nome.localeCompare(b.nome,'pt'));
      }

      // Input de busca
      const searchWrap=div(null);searchWrap.style.cssText='position:relative';
      const inp=el('input','fi',null,{placeholder:'Digite para buscar...',autocomplete:'off'});
      inp.style.cssText='width:100%';
      const dropdown=div(null);
      dropdown.style.cssText='position:absolute;top:100%;left:0;right:0;background:#fff;border:1.5px solid var(--rb);border-radius:10px;max-height:220px;overflow-y:auto;z-index:999;display:none;box-shadow:0 8px 24px rgba(170,43,43,.12)';
      let selectedItem=null;

      function renderDropdown(q){
        dropdown.innerHTML='';
        const filtrado=q?listaTotal.filter(x=>x.nome.toLowerCase().includes(q.toLowerCase())):listaTotal.slice(0,20);
        if(!filtrado.length){dropdown.style.display='none';return;}
        filtrado.forEach(x=>{
          const row=document.createElement('div');
          row.style.cssText='padding:9px 14px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--rf);display:flex;justify-content:space-between;align-items:center';
          row.innerHTML='<span style="font-weight:600">'+x.nome+'</span><span style="font-size:11px;color:var(--ts)">'+R(x.preco)+'/'+x.unidade+'</span>';
          row.addEventListener('mousedown',e=>{
            e.preventDefault();
            selectedItem=x;
            inp.value=x.nome+' — '+R(x.preco)+'/'+x.unidade;
            dropdown.style.display='none';
          });
          row.addEventListener('mouseover',()=>row.style.background='var(--rf)');
          row.addEventListener('mouseout',()=>row.style.background='');
          dropdown.appendChild(row);
        });
        dropdown.style.display='block';
      }

      inp.addEventListener('input',e=>renderDropdown(e.target.value));
      inp.addEventListener('focus',()=>renderDropdown(inp.value));
      inp.addEventListener('blur',()=>setTimeout(()=>dropdown.style.display='none',150));
      searchWrap.appendChild(inp);searchWrap.appendChild(dropdown);

      const addBtn=btn('btn bp','+ Adicionar',()=>{
        if(!selectedItem){alert('Selecione um item da lista.');return;}
        itens.push({...selectedItem,quantidade:0});
        rebuildTabela();
        inp.value='';selectedItem=null;dropdown.style.display='none';
      });
      addBtn.style.cssText='white-space:nowrap;flex-shrink:0';

      const row=div('fl_ gap2 mt2 aic');
      row.style.alignItems='flex-start';
      row.appendChild(searchWrap);row.appendChild(addBtn);
      optsWrap.appendChild(row);
    }

    ['Pré-produções','Insumos'].forEach((lb,i)=>{
      const k=['preprods','insumos'][i];
      const p=span('tp'+(tipoAdd===k?' active':''),lb);
      p.addEventListener('click',()=>{tipoAdd=k;tabsAdd.querySelectorAll('.tp').forEach(x=>x.classList.remove('active'));p.classList.add('active');buildOpts();});
      tabsAdd.appendChild(p);
    });
    mb.appendChild(tabsAdd);mb.appendChild(optsWrap);
    buildOpts();

    // Footer
    const obsInp=finp('',ped.observacoes||'',v=>ped.observacoes=v);
    mb.appendChild(div('mt3',[fgrp('Observações',obsInp)]));

    const mf=div('mf');
    mf.appendChild(btn('btn bg','Cancelar',()=>ov.remove()));
    const saveBtn=btn('btn bp','Salvar',async()=>{
      const itensValidos=itens.filter(i=>i.quantidade>0);
      if(!itensValidos.length){alert('Adicione pelo menos um item com quantidade.');return;}
      saveBtn.textContent='Salvando...';saveBtn.disabled=true;
      try{
        const total=itensValidos.reduce((t,i)=>t+(i.quantidade*i.preco),0);
        await db('lola_pedidos','PATCH',{unidade:destino,data_pedido:dataPedido,valor_total:total,observacoes:ped.observacoes||null},'?id=eq.'+ped.id);
        // Inserir novos itens primeiro, só apagar os antigos se tudo der certo
        const novosItens=[];
        for(const it of itensValidos){
          const[novo]=await db('lola_pedidos_itens','POST',{pedido_id:ped.id,nome_item:it.nome,quantidade:it.quantidade,unidade:it.unidade,preco_unitario:it.preco});
          novosItens.push(novo);
        }
        // Só apagar os antigos se todos os novos foram inseridos com sucesso
        if(novosItens.length===itensValidos.length){
          // Apagar apenas os itens antigos (não os recém inseridos)
          const novosIds=novosItens.map(n=>n.id);
          const antigosItens=existentes.filter(e=>!novosIds.includes(e.id));
          for(const antigo of antigosItens){
            await db('lola_pedidos_itens','DELETE',null,'?id=eq.'+antigo.id);
          }
        }
        _peds=await db('lola_pedidos','GET',null,'?select=*&order=created_at.desc');
        // Reconstruir tabs de meses com os dados atualizados
        const mesesNovos=[...new Set(_peds.map(p=>p.data_pedido?.substring(0,7)).filter(Boolean))].sort().reverse();
        const mesTabs=$('#mes-tabs-ped');
        if(mesTabs){
          mesTabs.innerHTML='';
          const all=span('tp'+(!_pedMes?' active':''),'Todos os meses');
          all.addEventListener('click',()=>{_pedMes='';buildMesTabs();atualizaResumo();drawPed($('#ped-t'));});
          mesTabs.appendChild(all);
          mesesNovos.forEach(m=>{
            const[ano,mes]=m.split('-');
            const label=new Date(ano,parseInt(mes)-1,1).toLocaleDateString('pt-BR',{month:'short',year:'2-digit'});
            const p=span('tp'+(_pedMes===m?' active':''),label.charAt(0).toUpperCase()+label.slice(1));
            p.addEventListener('click',()=>{_pedMes=m;buildMesTabs();atualizaResumo();drawPed($('#ped-t'));});
            mesTabs.appendChild(p);
          });
        }
        drawPed($('#ped-t'));
        ov.remove();
      }catch(e){alert('Erro ao salvar: '+e.message);saveBtn.textContent='Salvar';saveBtn.disabled=false;}
    });
    mf.appendChild(saveBtn);
    mo.appendChild(mf);

    ov.appendChild(mo);
    ov.addEventListener('click',e=>{if(e.target===ov&&!mo.contains(e.target))ov.remove();});
    document.body.appendChild(ov);

    rebuildTabela();

  }catch(e){alert('Erro ao abrir pedido: '+e.message);}
}

}

      <div><strong>Pedido Nº:</strong> #${ped.numero_pedido}</div>

    </div>
    <table style="width:100%;border-collapse:collapse;margin-bottom:18px">
      <thead><tr style="background:#AA2B2B;color:#fff">
        <th style="padding:10px 11px;text-align:left;font-size:11px;letter-spacing:1px">PRODUTO</th>
        <th style="padding:10px 11px;text-align:center;font-size:11px">UN.</th>

        <th style="padding:10px 11px;text-align:right;font-size:11px">PREÇO UN.</th>

          <td style="padding:12px;text-align:right;font-weight:900;font-size:20px;color:#AA2B2B">${R(itens.reduce((s,x)=>s+(parseFloat(x.quantidade)||0)*(parseFloat(x.preco_unitario)||0),0))}</td>
        </tr>

// ── fichaTable: modal com formato planilha ─────────────────────────────────
function fichaTable(itens,rendQtd,rendUn,custoTotal,custoPorcao,titulo,historico,fotos){
  // Construção imperativa para evitar bugs com null/string em children
  function td(txt,style,children){
    const t=document.createElement('td');
    t.style.cssText=style||'padding:8px 10px;font-size:12px';
    if(children){children.forEach(c=>t.appendChild(c));}
    else if(txt!=null)t.appendChild(document.createTextNode(String(txt)));
    return t;
  }
  function th(txt,align){
    const t=document.createElement('th');
    t.style.cssText='padding:8px 10px;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--v);background:var(--rt);white-space:nowrap;text-align:'+(align||'left');
    t.appendChild(document.createTextNode(txt));
    return t;
  }

  const tbl=document.createElement('table');
  tbl.style.cssText='width:100%;border-collapse:collapse;';

  // THEAD
  const thead=document.createElement('thead');
  const hRow=document.createElement('tr');
  [['Insumo','left'],['Obs','left'],['UN','center'],['Qtd Líq.','right'],['Qtd Bruta','right'],
   ['Perda','right'],['FC','right'],['% Perda','right'],['Preço kg·L·un','right'],['Custo','right']]
  .forEach(([h,a])=>hRow.appendChild(th(h,a)));
  thead.appendChild(hRow);
  tbl.appendChild(thead);

  // TBODY
  const tbody=document.createElement('tbody');
  (itens||[]).forEach((it,idx)=>{
    const nome=it.lola_insumos?.nome||it.lola_preproducoes?.nome||it.lola_preproducoes_sub?.nome||it.nome_manual||'—';
    const isPP=!it.lola_insumos?.nome;
    const preco=parseFloat(it.custo_unitario)||0;
    const qb=parseFloat(it.qtd_bruta)||0;
    const bruto=(qb)*(parseFloat(it.fc)||1);
    const perda=Math.max(0,bruto-qb);
    const pct=bruto>0?Math.round((perda/bruto)*100):0;
    const fc=parseFloat(it.fc)||1;
    const tr=document.createElement('tr');
    tr.style.cssText=(idx%2===0?'background:var(--rf)':'background:#fff')+';border-bottom:1px solid var(--rb)';
    // Coluna nome com badge
    const tdNome=document.createElement('td');
    tdNome.style.cssText='padding:8px 10px;font-size:12px';
    const badge=document.createElement('span');
    badge.className='bq '+(isPP?'bce':'bc');
    badge.textContent=isPP?'PP':'Ins';
    tdNome.appendChild(badge);
    tdNome.appendChild(document.createTextNode(' '+nome));
    tr.appendChild(tdNome);
    tr.appendChild(td(it.nome_manual||'','padding:8px 10px;font-size:11px;color:var(--ts)'));
    tr.appendChild(td(it.unidade||'g','padding:8px 10px;font-size:12px;text-align:center'));
    tr.appendChild(td(N(qb,2),'padding:8px 10px;font-size:12px;text-align:right'));
    tr.appendChild(td(N(bruto,2),'padding:8px 10px;font-size:12px;text-align:right'));
    tr.appendChild(td(N(perda,2),'padding:8px 10px;font-size:12px;text-align:right;color:var(--ts)'));
    tr.appendChild(td(N(fc,2),'padding:8px 10px;font-size:12px;text-align:right'));
    tr.appendChild(td(pct+'%','padding:8px 10px;font-size:12px;text-align:right;color:'+(pct>20?'var(--v)':'var(--ts)')));
    tr.appendChild(td(R(preco),'padding:8px 10px;font-size:12px;text-align:right'));
    const tdCusto=document.createElement('td');
    tdCusto.style.cssText='padding:8px 10px;font-size:12px;text-align:right;color:var(--v)';
    const strong=document.createElement('strong');
    strong.textContent=R(it.custo_total);
    tdCusto.appendChild(strong);
    tr.appendChild(tdCusto);
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);

  // TFOOT
  const tfoot=document.createElement('tfoot');
  const r1=document.createElement('tr');
  const t1a=document.createElement('td');t1a.colSpan=9;t1a.style.cssText='padding:10px;font-weight:800;font-size:12px;background:#2a6645;color:#fff;text-transform:uppercase;letter-spacing:1px';t1a.textContent='CUSTO TOTAL DA RECEITA';
  const t1b=document.createElement('td');t1b.style.cssText='padding:10px;font-weight:800;font-size:13px;background:#2a6645;color:#fff;text-align:right';t1b.textContent=R(custoTotal);
  r1.appendChild(t1a);r1.appendChild(t1b);
  const r2=document.createElement('tr');
  const t2a=document.createElement('td');t2a.colSpan=9;t2a.style.cssText='padding:10px;font-weight:800;font-size:12px;background:var(--v);color:#fff;text-transform:uppercase;letter-spacing:1px';const _unBaseRod=rendUn==='g'?'KG':rendUn==='ml'?'L':rendUn.toUpperCase();t2a.textContent='CUSTO POR PORÇÃO / '+_unBaseRod;
  const t2b=document.createElement('td');t2b.style.cssText='padding:10px;font-weight:800;font-size:14px;background:var(--v);color:#fff;text-align:right';t2b.textContent=R(custoPorcao);
  r2.appendChild(t2a);r2.appendChild(t2b);
  tfoot.appendChild(r1);tfoot.appendChild(r2);
  tbl.appendChild(tfoot);

  // Resumo cards
  const resumo=div('g3 mb3',[
    div('custo-box',[span('scl','Rendimento'),div('bold tv mt2',N(rendQtd,0)+' '+rendUn)]),
    div('custo-box',[span('scl','Custo total'),div('bold tv mt2',R(custoTotal))]),
    div('custo-box',[span('scl','Custo/'+(rendUn==='g'?'kg':rendUn==='ml'?'L':rendUn)),div('bold tv mt2',R(custoPorcao))]),
  ]);

  const scrollWrap=document.createElement('div');
  scrollWrap.style.overflowX='auto';
  if(!itens||!itens.length){
    const vazio=document.createElement('p');
    vazio.className='tss mt3';
    vazio.textContent='(Nenhum ingrediente vinculado ainda — use ✏️ para adicionar)';
    scrollWrap.appendChild(vazio);
  } else {
    scrollWrap.appendChild(tbl);
  }
  // Seção de histórico
  let histEl=null;
  if(historico&&historico.length){
    histEl=document.createElement('div');
    histEl.style.cssText='margin-top:18px';
    const hTitle=document.createElement('div');
    hTitle.style.cssText='font-size:13px;font-weight:700;color:var(--ts);margin-bottom:10px;display:flex;align-items:center;gap:6px';
    hTitle.textContent='🕒 Histórico de alterações';
    histEl.appendChild(hTitle);
    historico.forEach(h=>{
      const row=document.createElement('div');
      row.style.cssText='padding:10px 14px;background:var(--rf);border-radius:9px;margin-bottom:7px;border-left:3px solid var(--v)';
      const data=new Date(h.editado_em).toLocaleString('pt-BR');
      const quem=document.createElement('div');
      quem.style.cssText='font-size:12px;font-weight:700;color:var(--v)';
      quem.textContent=(h.editado_por||'Não informado')+' · '+data;
      const desc=document.createElement('div');
      desc.style.cssText='font-size:12px;color:var(--tx);margin-top:3px';
      desc.textContent=h.descricao||'Ficha editada';
      row.appendChild(quem);
      row.appendChild(desc);
      histEl.appendChild(row);
    });
  }
  let fotosEl=null;
  if(fotos&&fotos.length){
    fotosEl=document.createElement('div');
    fotosEl.style.cssText='display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px';
    fotos.forEach(function(src){ var im=document.createElement('img'); im.src=src; im.style.cssText='width:120px;height:120px;object-fit:cover;border-radius:10px;border:1.5px solid var(--rb);cursor:pointer'; im.addEventListener('click',function(){window.open(src,'_blank');}); fotosEl.appendChild(im); });
  }
  mkModal(titulo,[resumo,...(fotosEl?[fotosEl]:[]),scrollWrap,...(histEl?[histEl]:[])],null,'mo moxl');
}



// Converte quantidade na unidade informada para a unidade base do insumo (g ou ml → kg/L)
function calcCustoItem(qtdBruta, fc, unQtd, custo_por_unidade, unCusto){
  const ql=(parseFloat(qtdBruta)||0)*(parseFloat(fc)||1);
  const cu=parseFloat(custo_por_unidade)||0;
  // Se a quantidade está em g/ml e o custo é por kg/L → divide por 1000
  if(['g','ml'].includes(unQtd) && ['kg','L'].includes(unCusto)) return (ql/1000)*cu;
  // Se a quantidade está em kg/L e o custo é por kg/L → direto
  if(['kg','L'].includes(unQtd) && ['kg','L'].includes(unCusto)) return ql*cu;
  // un, cx, pct → direto
  return ql*cu;
}

function mkTable(headers,rows,aligns,useRowStyle){
  const thead=el('thead',null,el('tr',null,headers.map((h,hi)=>el('th',aligns&&aligns[hi]||null,h))));
  const tbody=el('tbody',null,rows.map(rowData=>{
    // Suporta tanto array simples quanto {cells,style}
    const cells=useRowStyle&&rowData.cells?rowData.cells:rowData;
    const rowStyle=useRowStyle&&rowData.style?rowData.style:'';
    const tr=el('tr',null,cells.map((c,ci)=>{
      const td=el('td',aligns&&aligns[ci]||null);
      if(headers&&headers[ci]!=null)td.setAttribute('data-label',String(headers[ci]));
      if(c==null)return td;
      if(typeof c==='string'||typeof c==='number')td.appendChild(document.createTextNode(String(c)));
      else td.appendChild(c);
      return td;
    }));
    if(rowStyle)tr.style.cssText=rowStyle;
    return tr;
  }));
  return el('table',null,[thead,tbody]);
}

/* ── BAIXAR / IMPORTAR PLANILHA DE PREÇOS (1x/mês) ── */
function _mesAtual(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
async function _getInsumos(){
  if(_ins&&_ins.length)return _ins;
  _ins=await db('lola_insumos','GET',null,'?select=*&ativo=eq.true&order=categoria.asc,nome.asc');
  return _ins;
}
function _parseNum(v){
  if(v===null||v===undefined||v==='')return null;
  if(typeof v==='number')return isNaN(v)?null:v;
  var s=String(v).replace(/[R$\s]/g,'');
  if(s.indexOf(',')>-1&&s.indexOf('.')>-1){s=s.replace(/\./g,'').replace(',','.');}
  else if(s.indexOf(',')>-1){s=s.replace(',','.');}
  var n=parseFloat(s);return isNaN(n)?null:n;
}
async function exportInsumosXlsx(){
  try{
    if(typeof XLSX==='undefined'){alert('A planilha ainda está carregando. Tente de novo em alguns segundos.');return;}
    var ins=await _getInsumos();
    if(!ins.length){alert('Nenhum insumo para exportar.');return;}
    var rows=ins.map(function(i){return {
      ID:i.id,

function importInsumosXlsx(){
  if(typeof XLSX==='undefined'){alert('A planilha ainda está carregando. Tente de novo em alguns segundos.');return;}
  var inp=document.createElement('input');
  inp.type='file';inp.accept='.xlsx,.xls';
  inp.addEventListener('change',function(){
    var file=inp.files&&inp.files[0];if(!file)return;
    var rd=new FileReader();
    rd.onload=async function(ev){
      try{
        var wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array'});
        var ws=wb.Sheets[wb.SheetNames[0]];
        var rows=XLSX.utils.sheet_to_json(ws,{defval:''});
        await _getInsumos();
        var byId={};_ins.forEach(function(i){byId[String(i.id)]=i;});
        var byNome={};_ins.forEach(function(i){byNome[(i.nome||'').trim().toLowerCase()]=i;});
        var changes=[];
        rows.forEach(function(r){
          var custoRaw=r['Custo por unidade (R$)'];
          if(custoRaw===undefined||custoRaw===''){for(var k in r){if(/custo/i.test(k)){custoRaw=r[k];break;}}}
          var novo=_parseNum(custoRaw);
          if(novo===null)return;
          var ins=(r.ID!==undefined&&r.ID!=='')?byId[String(r.ID).trim()]:null;
          if(!ins&&r.Nome)ins=byNome[String(r.Nome).trim().toLowerCase()];
          if(!ins)return;
          var atual=Number(ins.custo_por_unidade||0);
          if(Math.abs(novo-atual)>0.0001)changes.push({ins:ins,old:atual,novo:novo});
        });
        if(!changes.length){alert('Nenhuma mudança de preço encontrada na planilha.');return;}
        _confirmImport(changes);
      }catch(e){alert('Não consegui ler a planilha: '+e.message);}
    };
    rd.readAsArrayBuffer(file);
  });
  inp.click();
}
function _confirmImport(changes){
  var lista=div(null,changes.slice(0,40).map(function(c){

    ],{style:'padding:8px 12px;background:var(--rf);border-radius:9px;gap:10px'});
  }));
  var extra=changes.length>40?div('tss mt2','... e mais '+(changes.length-40)+' insumos.'):null;
  mkModal('⬆️ Importar preços ('+changes.length+' mudanças)',[
    div('al ali','Confira as alterações. Ao salvar, o custo desses insumos é atualizado e o histórico registrado.'),
    lista,extra
  ],async function(){
    for(var idx=0;idx<changes.length;idx++){
      var c=changes[idx];var i=c.ins;

      var novoValorPago=un==='g/ml'?c.novo*(qtd/1000):c.novo*qtd;

    }
    _ins=await db('lola_insumos','GET',null,'?select=*&ativo=eq.true&order=categoria.asc,nome.asc');
    window._drawIns&&window._drawIns(document.getElementById('ins-t'));

  },'mo mol');
}

/* ── CONFERÊNCIA DE PREÇOS ── */
var _CONF=null,_confF='all';
function _cesc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(ch){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch];});}
function _confNorm(s){
  s=String(s||'').toLowerCase();
  try{s=s.normalize('NFD').replace(/[̀-ͯ]/g,'');}catch(e){}
  s=s.replace(/_/g,' ').replace(/[^a-z0-9 ]/g,' ');
  var stop={kg:1,kgs:1,g:1,gr:1,grs:1,grama:1,gramas:1,un:1,und:1,unid:1,unidade:1,unidades:1,l:1,lt:1,litro:1,litros:1,ml:1,molho:1,maco:1,caixa:1,cx:1,pacote:1,pct:1,pc:1,dz:1,duzia:1};
  var toks=s.split(/\s+/).filter(function(t){return t && !stop[t] && !/^\d+$/.test(t);});
  return toks.join(' ').trim();
}
function _confUn(u){
  u=String(u||'').toLowerCase().trim();
  if(/kg|kilo|quilo/.test(u))return 'kg';
  if(/litro|^l$|^lt$/.test(u))return 'L';
  if(/ml|mililit/.test(u))return 'ml';
  if(/^g$|grama|^gr/.test(u))return 'g';
  if(/unid|^un$|^und|^un\.?$/.test(u))return 'un';
  if(/caixa|^cx/.test(u))return 'cx';
  if(/pacote|^pct/.test(u))return 'pct';
  if(/maco|maço|molho/.test(u))return 'un';
  if(/duzia|d[uú]zia|^dz/.test(u))return 'dz';
  return u||'';
}
function _confParse(wb){
  var best={items:[]};
  wb.SheetNames.forEach(function(sn){
    var ws=wb.Sheets[sn]; if(!ws)return;
    var aoa=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
    var nameCol=-1,priceCol=-1,unitCol=-1,hdr=-1;
    for(var r=0;r<Math.min(aoa.length,20);r++){
      var row=aoa[r]||[],nc=-1,pc=-1,uc=-1,ci;
      for(ci=0;ci<row.length;ci++){if(nc<0 && /(descri|nome|insumo|produto|item)/.test(String(row[ci]||'').toLowerCase()))nc=ci;}
      for(ci=0;ci<row.length;ci++){if(pc<0 && ci!==nc && /(custo|pre[çc]o|valor)/.test(String(row[ci]||'').toLowerCase()))pc=ci;}
      for(ci=0;ci<row.length;ci++){if(uc<0 && ci!==nc && ci!==pc && /(unid|un\.|medida|base)/.test(String(row[ci]||'').toLowerCase()))uc=ci;}
      if(pc>=0 && nc>=0 && pc!==nc){nameCol=nc;priceCol=pc;unitCol=uc;hdr=r;break;}
    }
    var items=[];
    if(hdr>=0){
      for(var r2=hdr+1;r2<aoa.length;r2++){
        var row2=aoa[r2]||[];
        var price=_parseNum(row2[priceCol]);
        var nome=String(row2[nameCol]||'').trim();
        if(price===null||!nome)continue;
        if(/descri|nome do insumo|produto/i.test(nome))continue;
        items.push({nome:nome,custo:price,un:unitCol>=0?String(row2[unitCol]||'').trim():''});
      }
    }
    if(items.length>best.items.length)best={items:items,sheet:sn};
  });
  return best;
}
function _confBuild(items){
  var byKey={};
  items.forEach(function(it){var k=_confNorm(it.nome);if(k && !(k in byKey))byKey[k]=it;});
  var rows=(_ins||[]).map(function(i){
    var atual=Number(i.custo_por_unidade||0),atualUn=_confUn(i.unidade_custo||'');
    var it=byKey[_confNorm(i.nome)];if(it)it._used=true;
    var status,sheetPrice=null,sheetUn='',newPrice='',newUn=atualUn;
    if(it){
      sheetPrice=it.custo;sheetUn=_confUn(it.un);
      if(sheetUn && atualUn && sheetUn!==atualUn){status='unit';newPrice='';}
      else{newPrice=sheetPrice;status=(sheetPrice>atual+0.005)?'up':(sheetPrice<atual-0.005)?'down':'eq';}
    }else{status='none';}
    return {id:i.id,nome:i.nome,cat:i.categoria||'',atual:atual,atualUn:atualUn,sheetPrice:sheetPrice,sheetUn:sheetUn,status:status,newPrice:newPrice,newUn:newUn,apply:(status==='up'||status==='down')};
  });
  var unmatched=items.filter(function(it){return !it._used;}).map(function(it){return it.nome;});
  return {when:new Date().toISOString(),rows:rows,unmatched:unmatched};
}
function _confUpload(c){
  if(typeof XLSX==='undefined'){alert('A planilha ainda está carregando. Tente de novo em alguns segundos.');return;}
  var inp=document.createElement('input');inp.type='file';inp.accept='.xlsx,.xls';
  inp.addEventListener('change',function(){
    var file=inp.files&&inp.files[0];if(!file)return;
    var rd=new FileReader();
    rd.onload=async function(ev){
      try{
        var wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array'});
        var parsed=_confParse(wb);
        if(!parsed.items.length){alert('Não encontrei colunas de descrição e custo na planilha. Confira se há uma coluna com o nome do insumo e outra com o custo/preço.');return;}
        await _getInsumos();
        _CONF=_confBuild(parsed.items);_confF='all';
        try{localStorage.setItem('lola_conf_precos',JSON.stringify(_CONF));}catch(e){}
        pgConferencia(c);
      }catch(e){alert('Não consegui ler a planilha: '+e.message);}
    };
    rd.readAsArrayBuffer(file);
  });
  inp.click();
}
function _confSync(c){
  if(!_CONF)return;var root=c||document;
  root.querySelectorAll('.cf-ap').forEach(function(e){var g=+e.dataset.gi;if(_CONF.rows[g])_CONF.rows[g].apply=e.checked;});
  root.querySelectorAll('.cf-pr').forEach(function(e){var g=+e.dataset.gi;if(_CONF.rows[g])_CONF.rows[g].newPrice=e.value;});
  root.querySelectorAll('.cf-un').forEach(function(e){var g=+e.dataset.gi;if(_CONF.rows[g])_CONF.rows[g].newUn=e.value;});
  try{localStorage.setItem('lola_conf_precos',JSON.stringify(_CONF));}catch(e){}
}
function _confBadge(r){
  if(r.status==='none')return '<span style="flex:0 0 auto;background:#FBF0DD;color:#9A6B1E;font-weight:800;font-size:.7rem;padding:4px 9px;border-radius:20px">sem corresp.</span>';
  if(r.status==='unit')return '<span style="flex:0 0 auto;background:#FBF0DD;color:#9A6B1E;font-weight:800;font-size:.7rem;padding:4px 9px;border-radius:20px">rever un.</span>';
  if(r.status==='eq')return '<span style="flex:0 0 auto;background:#F1EFE8;color:#6B6258;font-weight:800;font-size:.74rem;padding:4px 9px;border-radius:20px">=</span>';
  var pct=r.atual>0?Math.round((r.sheetPrice-r.atual)/r.atual*100):100;
  if(r.status==='up')return '<span style="flex:0 0 auto;background:#FBEAE7;color:#B5302E;font-weight:800;font-size:.74rem;padding:4px 9px;border-radius:20px">↑ +'+pct+'%</span>';
  return '<span style="flex:0 0 auto;background:#E6F3EA;color:#2C7A4B;font-weight:800;font-size:.74rem;padding:4px 9px;border-radius:20px">↓ '+pct+'%</span>';
}
function _confFillList(list){
  list.innerHTML='';
  var rows=_CONF.rows.filter(function(r){return _confF==='all'||r.status===_confF;});
  if(!rows.length){list.innerHTML='<div style="padding:18px;text-align:center;color:var(--ts)">Nada nesta categoria.</div>';return;}
  list.innerHTML=rows.map(function(r){
    var gi=_CONF.rows.indexOf(r);
    var bl=(r.status==='up')?'border-left:4px solid #B5302E;':(r.status==='down')?'border-left:4px solid #2C7A4B;':(r.status==='unit'||r.status==='none')?'border-left:4px solid #9A6B1E;':'';
    var warn=(r.status==='unit')?'<div style="margin-top:8px;font-size:.72rem;color:#9A6B1E;background:#FBF0DD;border-radius:9px;padding:6px 9px"><i class="ph-duotone ph-warning"></i> Unidade na planilha: <b>'+_cesc(r.sheetUn||'?')+'</b> ≠ atual: <b>'+_cesc(r.atualUn||'?')+'</b> — confira preço e unidade. R$ '+R(r.sheetPrice).replace('R$','').trim()+' veio na planilha.</div>':'';
    return '<div style="background:#fff;border:1px solid var(--rb);'+bl+'border-radius:16px;padding:13px 14px;margin-bottom:11px">'+
      '<div style="display:flex;align-items:flex-start;gap:10px">'+
        '<label style="flex:0 0 auto;cursor:pointer;margin-top:1px"><input type="checkbox" class="cf-ap" data-gi="'+gi+'" '+(r.apply?'checked':'')+' style="width:20px;height:20px;accent-color:var(--v)"></label>'+
        '<div style="flex:1;min-width:0"><div style="font-weight:700;font-size:.96rem;color:var(--tx);line-height:1.15">'+_cesc(r.nome)+'</div><div style="font-size:.72rem;color:var(--ts)">'+_cesc(r.cat)+'</div></div>'+
        _confBadge(r)+
      '</div>'+
      '<div style="display:flex;align-items:flex-end;gap:9px;margin-top:11px">'+
        '<div style="flex:1;background:#FBF7F1;border:1px solid var(--rb);border-radius:11px;padding:7px 10px"><div style="font-size:.58rem;font-weight:700;text-transform:uppercase;color:#B79A8E">Atual</div><div style="font-weight:700;font-size:.9rem;white-space:nowrap">'+R(r.atual)+' /'+_cesc(r.atualUn||'')+'</div></div>'+
        '<i class="ph-duotone ph-arrow-right" style="color:var(--ts);font-size:1.1rem;margin-bottom:7px"></i>'+
        '<div style="flex:1.25;background:#fff;border:1.5px solid var(--v);border-radius:11px;padding:6px 9px"><div style="font-size:.58rem;font-weight:700;text-transform:uppercase;color:#B79A8E">Novo /un</div>'+
          '<div style="display:flex;align-items:center"><input class="cf-pr" data-gi="'+gi+'" inputmode="decimal" value="'+((r.newPrice===''||r.newPrice==null)?'':r.newPrice)+'" placeholder="'+(r.status==='none'?'—':'')+'" style="width:58%;border:0;background:transparent;font-weight:700;font-size:.92rem;color:var(--v);padding:0"><input class="cf-un" data-gi="'+gi+'" value="'+_cesc(r.newUn||'')+'" style="width:42%;border:0;border-left:1px solid var(--rb);background:transparent;font-weight:600;font-size:.78rem;color:var(--tx);padding:2px 0 2px 6px"></div>'+
        '</div>'+
      '</div>'+warn+
    '</div>';
  }).join('');
}
function _confRender(c){
  var rows=_CONF.rows,cnt={up:0,down:0,eq:0,unit:0,none:0};
  rows.forEach(function(r){cnt[r.status]=(cnt[r.status]||0)+1;});
  var res=document.createElement('div');res.style.cssText='display:flex;gap:8px;margin-bottom:13px;flex-wrap:wrap';
  function rc(n,l,col){return '<div style="flex:1;min-width:72px;background:#fff;border:1px solid var(--rb);border-radius:13px;padding:10px 6px;text-align:center"><div style="font-family:Fraunces,serif;font-weight:600;font-size:1.4rem;line-height:1;color:'+col+'">'+n+'</div><div style="font-size:.6rem;font-weight:700;text-transform:uppercase;color:var(--ts);margin-top:3px">'+l+'</div></div>';}
  res.innerHTML=rc(cnt.up,'↑ Subiram','#B5302E')+rc(cnt.down,'↓ Baixaram','#2C7A4B')+rc(cnt.eq,'= Iguais','#6B6258')+rc(cnt.unit+cnt.none,'A revisar','#9A6B1E');
  c.appendChild(res);
  var defs=[['all','Todos',rows.length],['up','↑ Subiram',cnt.up],['down','↓ Baixaram',cnt.down],['unit','Rever unidade',cnt.unit],['none','Sem corresp.',cnt.none],['eq','Iguais',cnt.eq]];
  var chips=document.createElement('div');chips.className='no-print';chips.style.cssText='display:flex;gap:7px;overflow-x:auto;padding-bottom:12px';
  defs.forEach(function(d){var b=document.createElement('button');b.type='button';var on=_confF===d[0];b.style.cssText='flex:0 0 auto;background:'+(on?'var(--v)':'#fff')+';color:'+(on?'#fff':'var(--tx)')+';border:1.5px solid '+(on?'var(--v)':'var(--rb)')+';border-radius:50px;padding:7px 13px;font-weight:700;font-size:.78rem;white-space:nowrap;cursor:pointer';b.textContent=d[1]+' '+d[2];b.addEventListener('click',function(){_confSync(c);_confF=d[0];pgConferencia(c);});chips.appendChild(b);});
  c.appendChild(chips);
  var list=document.createElement('div');list.id='confList';c.appendChild(list);
  _confFillList(list);
  var ab=document.createElement('div');ab.style.cssText='position:sticky;bottom:0;margin-top:6px;padding:10px 0 4px';
  var apBtn=el('button','btn bp',null,{html:'<i class="ph-duotone ph-check"></i> Aplicar selecionados',onclick:function(){_confApply(c);}});apBtn.style.cssText='width:100%;padding:13px;font-weight:800';
  ab.appendChild(apBtn);c.appendChild(ab);
}
async function _confApply(c){
  _confSync(c);
  var valid=[];
  _CONF.rows.forEach(function(r){if(r.apply){var n=_parseNum(r.newPrice);if(n!=null&&n>=0)valid.push({r:r,novo:n});}});
  if(!valid.length){alert('Marque ao menos um item com preço novo válido.');return;}
  if(!confirm('Aplicar '+valid.length+' preço(s)? O custo será atualizado e o histórico registrado.'))return;
  var ok=0;
  for(var i=0;i<valid.length;i++){
    var r=valid[i].r,novo=valid[i].novo;
    try{
      await db('lola_insumos_historico','POST',{insumo_id:r.id,custo_anterior:r.atual,custo_novo:novo,alterado_por:ME||null});
      var patch={custo_por_unidade:novo,valor_pago:novo,preco_atualizado_em:new Date().toISOString(),preco_atualizado_por:ME||null};
      var nu=_confUn(r.newUn);
      if(nu && nu!==r.atualUn){patch.unidade_custo=nu;patch.unidade_compra=nu;}
      await db('lola_insumos','PATCH',patch,'?id=eq.'+r.id);
      r.atual=novo;if(nu&&nu!==r.atualUn)r.atualUn=nu;r.status='eq';r.apply=false;ok++;
    }catch(e){}
  }
  _ins=await db('lola_insumos','GET',null,'?select=*&ativo=eq.true&order=categoria.asc,nome.asc');
  try{localStorage.setItem('lola_conf_precos',JSON.stringify(_CONF));}catch(e){}
  alert('✅ '+ok+' preço(s) atualizados!');
  pgConferencia(c);
}
function pgConferencia(c){
  c.innerHTML='';
  if(!_CONF){try{var s=localStorage.getItem('lola_conf_precos');if(s)_CONF=JSON.parse(s);}catch(e){}}
  var bar=div('no-print');bar.style.cssText='display:flex;gap:9px;flex-wrap:wrap;align-items:center;margin:6px 0 14px';
  bar.appendChild(el('button','btn bp',null,{html:'<i class="ph-duotone ph-upload-simple"></i> '+(_CONF?'Subir outra planilha':'Subir planilha de preços'),onclick:function(){_confUpload(c);}}));
  if(_CONF){
    bar.appendChild(el('button','btn bo bsm',null,{html:'<i class="ph-duotone ph-trash"></i> Limpar',onclick:function(){if(!confirm('Limpar a conferência atual?'))return;_CONF=null;try{localStorage.removeItem('lola_conf_precos');}catch(e){}pgConferencia(c);}}));
    var inf=span('tss','Conferência de '+(_CONF.when?new Date(_CONF.when).toLocaleString('pt-BR'):''));bar.appendChild(inf);
  }
  c.appendChild(bar);
  if(!_CONF){
    var hint=div(null);hint.style.cssText='background:#fff;border:1.5px dashed var(--v);border-radius:14px;padding:18px;color:var(--ts);font-size:13px;line-height:1.6';
    hint.innerHTML='Suba a planilha de preços do mês (.xlsx). O sistema casa por <b>nome do insumo</b>, mostra <b>preço atual × preço novo</b> e a <b>unidade</b>, indica se <b>subiu/baixou</b> e deixa você conferir e editar item a item antes de aplicar. As colunas (Descrição / Custo / Unidade) são detectadas automaticamente.';
    c.appendChild(hint);return;
  }
  _confRender(c);
}
