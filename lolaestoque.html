<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estoque — Lola Bar</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/duotone/style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--v:#A82A2A;--ve:#7E1E1F;--rf:#FBF7F1;--rb:#ECE3D9;--rt:#F5E9E6;--rm:#B79A8E;--tx:#2A1A17;--ts:#5A463E;--vd:#2C7A4B;--am:#9A6B1E;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hanken Grotesk',sans-serif;background:var(--rf);color:var(--tx);min-height:100vh;}
/* TOPBAR */
.topbar{background:#fff;border-bottom:2px solid var(--rb);padding:0 24px;height:72px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(170,43,43,.09);}
.logo-area{display:flex;align-items:center;gap:14px;}
.logo-svg-wrap{height:52px;display:flex;align-items:center;}
.logo-svg-wrap svg{height:52px;width:auto;}
.logo-div{width:1.5px;height:34px;background:var(--rb);}
.logo-app{font-size:11px;font-weight:800;color:var(--ts);letter-spacing:2px;text-transform:uppercase;}
.topbar-date{font-size:12px;font-weight:600;color:var(--ts);}
/* LAYOUT */
.app-body{display:flex;min-height:calc(100vh - 72px);}
.sidebar{width:210px;background:#fff;border-right:1.5px solid var(--rb);position:sticky;top:60px;height:calc(100vh - 60px);overflow-y:auto;flex-shrink:0;padding:10px 0 20px;}
.ns{padding:12px 16px 4px;font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--rm);}
.ni{display:flex;align-items:center;gap:9px;padding:9px 16px;cursor:pointer;color:var(--ts);font-size:13px;font-weight:600;border-left:3px solid transparent;transition:all .15s;}
.ni:hover{background:var(--rf);color:var(--v);}
.ni.active{background:var(--rt);color:var(--v);border-left-color:var(--v);font-weight:700;}
.ni i{font-size:18px;flex-shrink:0;}
.main{flex:1;padding:22px 22px;overflow-x:hidden;}
.ph{margin-bottom:18px;}
.ph h2{font-family:'Fraunces',serif;font-size:23px;font-weight:700;color:var(--v);}
.ph p{font-size:12px;color:var(--ts);margin-top:2px;}
/* Cabeçalho padrão Lola v2 (transparente sobre o creme) */
.bhead{background:transparent;color:var(--tx);padding:12px 15px 12px;border-radius:0;margin:-22px -22px 16px;border-bottom:1px solid #EFE6DC;}
.bhead-row{display:flex;align-items:center;gap:10px;}
.bhead-menu,.bhead-ic{width:40px;height:40px;flex-shrink:0;background:#fff;border:1px solid var(--rb);border-radius:13px;color:var(--v);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:19px;padding:0;position:relative;}
.bhead-menu i{font-size:20px;}
.bhead-mid{flex:1;min-width:0;}
.bhead-title{font-family:'Fraunces',serif;font-weight:600;font-size:20px;color:var(--v);line-height:1.05;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bhead-sub{color:#8A7A72;font-size:12px;font-weight:600;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
/* CARDS */
.card{background:#fff;border:1.5px solid var(--rb);border-radius:14px;padding:18px;}
.sc{background:#fff;border:1.5px solid var(--rb);border-radius:14px;padding:18px 20px;}
.sci{font-size:26px;margin-bottom:5px;color:var(--v);line-height:1;}
.scl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--ts);}
.scv{font-family:'Fraunces',serif;font-size:30px;font-weight:700;color:var(--v);margin-top:3px;}
.scs{font-size:11px;color:var(--ts);margin-top:1px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px;}
/* INSUMO CARD (v2) */
.ins-card{background:#fff;border:1px solid var(--rb);border-radius:16px;padding:13px 14px;margin-bottom:10px;box-shadow:0 1px 2px rgba(42,26,23,.05);}
.ins-top{display:flex;align-items:flex-start;gap:10px;}
.ins-info{flex:1;min-width:0;}
.ins-nome{font-size:15px;font-weight:700;color:var(--tx);}
.ins-meta{display:flex;gap:8px;align-items:center;margin-top:4px;flex-wrap:wrap;}
.ins-un{font-size:11px;color:#8A7A72;}
.ins-custo{text-align:right;flex-shrink:0;}
.ins-custo-lb{font-size:10px;color:#8A7A72;text-transform:uppercase;letter-spacing:1px;}
.ins-custo-v{font-family:'Fraunces',serif;font-size:18px;font-weight:600;color:var(--v);}
.ins-upd{display:flex;align-items:center;gap:5px;margin-top:9px;padding-top:9px;border-top:1px solid #F3EBE2;font-size:11px;color:#8A7A72;}
.ins-upd b{color:var(--ts);font-weight:700;}
.ins-upd i{font-size:14px;flex-shrink:0;}
.ins-upd-none{color:#B79A8E;}
.ins-btns{display:flex;gap:6px;margin-top:10px;justify-content:flex-end;}
.ins-ab{flex:0 0 auto;width:46px;height:36px;background:#F7F1EA;border:1px solid var(--rb);border-radius:11px;color:var(--v);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.ins-ab.del{background:#FBEAE7;border-color:#F3D3CE;color:#B5302E;}
.ins-ab.warn{background:#FBF0DD;border-color:#F1DFB8;color:#9A6B1E;}
/* CONTAGEM item card (v2) */
.cont-card{background:#fff;border:1px solid var(--rb);border-radius:16px;padding:12px 14px;margin-bottom:9px;box-shadow:0 1px 2px rgba(42,26,23,.05);}
.cont-top{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.cont-nome{font-size:14px;font-weight:700;color:var(--tx);}
.cont-st{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;white-space:nowrap;}
.cont-dot{width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0;}
.cont-meta{display:flex;gap:14px;flex-wrap:wrap;align-items:center;margin-top:8px;}
.cont-cl{font-size:9px;color:#8A7A72;text-transform:uppercase;letter-spacing:.5px;}
.cont-cv{font-size:13px;font-weight:700;color:var(--tx);}
.cont-edit{margin-left:auto;width:40px;height:34px;background:#F7F1EA;border:1px solid var(--rb);border-radius:10px;color:var(--v);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
@media(max-width:768px){
  .ins-btns{justify-content:stretch;}
  .ins-ab{flex:1 1 0;width:auto;height:38px;}
}
/* PEDIDO CARD (v2) */
.ped-card{background:#fff;border:1px solid var(--rb);border-radius:16px;padding:13px 14px;margin-bottom:10px;box-shadow:0 1px 2px rgba(42,26,23,.05);}
.ped-top{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.ped-numwrap{display:flex;align-items:center;gap:8px;min-width:0;}
.ped-num{font-family:'Fraunces',serif;font-weight:600;font-size:16px;color:var(--v);}
.ped-val{font-family:'Fraunces',serif;font-size:17px;font-weight:600;color:var(--v);white-space:nowrap;}
.ped-meta{font-size:12px;color:#8A7A72;margin-top:3px;}
.ped-status{margin-top:10px;}
.ped-btns{display:flex;gap:6px;margin-top:11px;justify-content:flex-end;flex-wrap:wrap;}
.ped-ab{height:34px;padding:0 14px;background:#F7F1EA;border:1px solid var(--rb);border-radius:10px;color:var(--v);font-size:12px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;gap:5px;white-space:nowrap;cursor:pointer;font-family:'Hanken Grotesk',sans-serif;}
.ped-ab i{font-size:15px;flex-shrink:0;}
.ped-ab.recv{background:#E6F3EA;border-color:#C9E6D4;color:#2C7A4B;}
.ped-ab.send{background:var(--v);border-color:var(--v);color:#fff;}
.ped-ab.warn{background:#FBF0DD;border-color:#F1DFB8;color:#9A6B1E;}
@media(max-width:768px){
  .ped-btns{flex-wrap:nowrap;gap:5px;justify-content:stretch;}
  .ped-ab{flex:1 1 0;min-width:0;padding:0;font-size:11px;overflow:hidden;}
  .ped-ab i{font-size:14px;}
}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:50px;border:none;cursor:pointer;font-family:'Hanken Grotesk',sans-serif;font-size:12.5px;font-weight:700;transition:all .15s;white-space:nowrap;}
.bp{background:var(--v);color:#fff;} .bp:hover{background:var(--ve);}
.bo{background:transparent;color:var(--v);border:2px solid var(--v);} .bo:hover{background:var(--rt);}
.bg{background:var(--rt);color:var(--v);} .bg:hover{background:var(--rb);}
.bd{background:#fee2e2;color:#dc2626;border:1px solid #fca5a5;}
.bv{background:var(--vd);color:#fff;} .bv:hover{background:#1f5235;}
.bsm{padding:5px 12px;font-size:11.5px;} .bxs{padding:3px 8px;font-size:11px;}
/* TABS */
.tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:16px;}
.tp{padding:0 16px;border-radius:50px;cursor:pointer;font-size:12px;font-weight:700;border:2px solid var(--rb);background:#fff;color:var(--ts);transition:all .15s;height:36px;display:inline-flex;align-items:center;}
.tp:hover{border-color:var(--v);color:var(--v);} .tp.active{background:var(--v);color:#fff;border-color:var(--v);}
/* TABLE */
.tw{background:#fff;border:1.5px solid var(--rb);border-radius:14px;overflow:hidden;}
table{width:100%;border-collapse:collapse;}
thead th{padding:10px 14px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--v);background:var(--rt);font-weight:800;border-bottom:1.5px solid var(--rb);white-space:nowrap;}
thead th.tr{text-align:right;}
.tbl-saidas{table-layout:fixed;}
.tbl-saidas th,.tbl-saidas td{white-space:normal;overflow:hidden;text-overflow:ellipsis;padding-top:15px;padding-bottom:15px;}
.tbl-saidas th:nth-child(1),.tbl-saidas td:nth-child(1){width:16%}
.tbl-saidas th:nth-child(2),.tbl-saidas td:nth-child(2){width:17%}
.tbl-saidas th:nth-child(3),.tbl-saidas td:nth-child(3){width:7%}
.tbl-saidas th:nth-child(4),.tbl-saidas td:nth-child(4){width:6%}
.tbl-saidas th:nth-child(5),.tbl-saidas td:nth-child(5){width:13%}
.tbl-saidas th:nth-child(6),.tbl-saidas td:nth-child(6){width:13%}
.tbl-saidas th:nth-child(7),.tbl-saidas td:nth-child(7){width:16%}
.tbl-saidas th:nth-child(8),.tbl-saidas td:nth-child(8){width:12%}
tbody tr{border-bottom:1px solid var(--rf);transition:background .1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--rf);}
td{padding:10px 14px;font-size:13px;vertical-align:middle;white-space:nowrap;}
td .sub{font-size:10px;color:var(--ts);margin-top:2px;}
.tr{text-align:right;}
/* BADGES */
.bq{display:inline-flex;align-items:center;padding:2px 10px;border-radius:50px;font-size:10px;font-weight:700;}
.bc{background:#FBE4E0;color:#C0392B;} .bm{background:#E6F3EA;color:#2C7A4B;}
.bce{background:#E6EEF8;color:#2C5AA0;} .bev{background:#F1E7FA;color:#6B4FA8;}
.bpd{background:#fef3c7;color:#92400e;} .bco{background:#dbeafe;color:#1d4ed8;}
.brsc{background:#f1f5f9;color:#64748b;font-weight:700;border:1px solid #cbd5e1;}
.bsol{background:#dcfce7;color:#166534;font-weight:800;}
.bconf{background:#dbeafe;color:#1d4ed8;font-weight:800;}
.bent{background:#f3e8ff;color:#7c3aed;font-weight:800;}
.bca{background:#fee2e2;color:#dc2626;font-weight:800;}
.brec{background:#dcfce7;color:#166534;font-weight:800;}
.bdiv{background:#fef3c7;color:#92400e;font-weight:800;}
.bprod{background:#dbeafe;color:#1d4ed8;font-weight:800;}
.bpronto{background:#fef3c7;color:#92400e;font-weight:800;}
.ben{background:#dcfce7;color:#166534;}
.bct{background:var(--rt);color:var(--v);}
/* FORM */
.fg{margin-bottom:12px;}
.fl{display:block;font-size:11px;font-weight:700;color:var(--ts);margin-bottom:4px;}
.fi,.fs,.fta{width:100%;padding:8px 12px;border:1.5px solid var(--rb);border-radius:9px;font-family:'Hanken Grotesk',sans-serif;font-size:13px;background:#fff;color:var(--tx);outline:none;transition:border-color .15s;}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--v);}
.fta{min-height:68px;resize:vertical;}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;}
.fg4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:11px;}
/* MODAL */
.ov{position:fixed;inset:0;background:rgba(44,26,26,.52);display:flex;align-items:center;justify-content:center;z-index:300;backdrop-filter:blur(4px);}
.mo{background:#fff;border-radius:18px;width:96%;max-width:560px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 50px rgba(170,43,43,.2);border:1.5px solid var(--rb);}
.mol{max-width:720px;} .moxl{max-width:900px;}
.mh{padding:18px 22px 14px;border-bottom:1.5px solid var(--rb);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;border-radius:18px 18px 0 0;z-index:1;}
.mh h3{font-family:'Fraunces',serif;font-size:18px;font-weight:700;color:var(--v);}
.mb{padding:18px 22px;}
.mf{padding:12px 22px 18px;display:flex;gap:8px;justify-content:flex-end;border-top:1px solid var(--rf);}
.xb{background:var(--rt);border:none;cursor:pointer;color:var(--v);font-size:14px;padding:5px 9px;border-radius:50px;font-weight:700;}
/* SEARCH */
.sb{display:flex;align-items:center;gap:7px;background:#fff;border:1.5px solid var(--rb);border-radius:50px;padding:6px 14px;min-width:200px;height:36px;}
.sb input{border:none;outline:none;font-family:'Hanken Grotesk',sans-serif;font-size:12px;background:transparent;width:100%;}
/* ALERTS */
.al{padding:10px 14px;border-radius:9px;font-size:12px;font-weight:600;margin-bottom:14px;}
.ali{background:var(--rt);color:var(--v);border:1.5px solid var(--rb);}
.alw{background:#FBF0DD;color:#9A6B1E;border:1px solid #F1DFB8;}
.alo{background:#E6F3EA;color:#2C7A4B;border:1px solid #C9E6D4;}
/* LOADING / EMPTY */
.ld{display:flex;align-items:center;justify-content:center;height:180px;color:var(--ts);font-size:13px;gap:9px;font-weight:600;}
.sp{width:20px;height:20px;border:2.5px solid var(--rb);border-top-color:var(--v);border-radius:50%;animation:sp .8s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
.em{text-align:center;padding:44px 20px;color:var(--ts);}
.em-ic{font-size:38px;margin-bottom:12px;opacity:.5;}
.em p{font-size:13px;font-weight:600;}
/* UTILS */
.fl_{display:flex;} .aic{align-items:center;} .jb{justify-content:space-between;}
.gap2{gap:8px;} .gap3{gap:10px;}
.mt2{margin-top:8px;} .mt3{margin-top:12px;} .mt4{margin-top:16px;}
.mb3{margin-bottom:12px;} .mb4{margin-bottom:16px;}
.bold{font-weight:700;} .tv{color:var(--v);} .tvd{color:var(--vd);} .tss{color:var(--ts);font-size:12px;}
.dv{border:none;border-top:1px solid var(--rf);margin:14px 0;}
.ir{background:#fff;border:1px solid var(--rb);border-radius:13px;padding:12px 13px;margin-bottom:10px;}
.ir-head{display:flex;align-items:center;gap:8px;margin-bottom:11px;}
.ir-head>select{flex:1!important;min-width:0!important;width:auto!important;}
.ir-head>.bd{width:30px!important;height:30px!important;min-width:30px;padding:0!important;border-radius:50%!important;flex-shrink:0;font-size:13px;display:flex;align-items:center;justify-content:center;}
.ir-grid{display:grid;grid-template-columns:1fr 1.1fr 0.7fr;gap:9px;margin-bottom:10px;}
.ir-f{display:flex;flex-direction:column;gap:3px;min-width:0;}
.ir-f>input,.ir-f>select{width:100%!important;min-width:0!important;flex:none!important;text-align:center;}
.ir-lb{font-size:10px;font-weight:800;letter-spacing:.6px;color:#9a6a6a;text-transform:uppercase;}
.ir-cost{display:flex;align-items:center;justify-content:space-between;border-top:1px solid #f6e6e6;padding-top:9px;}
.ir-cost>*:last-child{font-size:16px!important;font-weight:800;color:var(--v)!important;min-width:0!important;text-align:right!important;}
.abar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.eok{color:var(--vd);font-weight:700;} .ebx{color:var(--am);font-weight:700;} .ecr{color:#dc2626;font-weight:700;}
.custo-box{background:var(--rf);border:1.5px solid var(--rb);border-radius:10px;padding:12px 16px;margin-top:12px;}
@media print{.sidebar,.topbar,.no-print{display:none!important;}.main{margin:0!important;padding:0!important;}body{background:#fff;}body>*:not(.ov){display:none!important;}.ov{position:static!important;display:block!important;background:none!important;padding:0!important;overflow:visible!important;}.ov .mo{position:static!important;box-shadow:none!important;border:none!important;max-width:none!important;width:auto!important;max-height:none!important;height:auto!important;overflow:visible!important;margin:0!important;display:block!important;}.ov .mb{overflow:visible!important;max-height:none!important;height:auto!important;}.ov .xb,.ov .mf{display:none!important;}}

/* ── MOBILE ─────────────────────────────────────────────── */
.ham{display:none;background:none;border:none;cursor:pointer;padding:8px;color:var(--v)}
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:199}
@media(max-width:768px){
  .shell{flex-direction:column}
  .sidebar{
    position:fixed;top:0;left:0;bottom:0;width:260px;z-index:200;
    transform:translateX(-100%);transition:transform .25s ease;
    box-shadow:4px 0 20px rgba(0,0,0,.15);
  }
  .sidebar.open{transform:translateX(0)}
  .mob-overlay.open{display:block}
  .ham{display:flex;align-items:center;justify-content:center}
  .topbar{padding:0 12px;height:52px;gap:8px}
  .topbar .logo{height:30px}
  .topbar h1{font-size:14px}
  html,body{overflow-x:hidden!important;max-width:100vw}
  .mo,.moxl,.mol{max-width:96vw!important}
  .mo .mb,.mol .mb{overflow-x:hidden}
  .main{margin-left:0!important;padding:12px!important;min-height:100vh}
  .abar{flex-wrap:wrap;gap:8px}
  .tabs{flex-wrap:wrap;gap:4px}
  .tp{font-size:11px;padding:0 10px;height:28px}
  .tw{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{min-width:500px}
  .mo{width:95vw!important;max-width:95vw!important;margin:10px auto}
  .moxl{width:95vw!important;max-width:95vw!important}
  .fg2,.fg3{grid-template-columns:1fr!important}
  .g3{grid-template-columns:1fr!important}
  .custo-box{padding:10px 12px}
  h2{font-size:20px}
  .bhead{margin:-12px -12px 14px;padding:12px 13px 12px}
  .bhead-title{font-size:19px}
}
/* Recebimento: rodape e corpo do modal rolavel */
.recv-modal .mh{flex:0 0 auto}
.recv-modal .mb{flex:1 1 auto;min-height:0;overflow-y:auto}
.recv-modal .mf{flex:0 0 auto}
/* Pedidos: resumo compacto e abaixo da lista */
#ped-resumo{margin-top:16px}
#ped-resumo .scv{font-size:17px!important}
#ped-resumo .sc{padding:10px 14px!important}
#ped-resumo .scl{font-size:9px!important}
/* Recebimento: tabela cabe no celular */
@media (max-width:560px){
  .recv-modal table{table-layout:fixed;width:100%}
  .recv-modal th,.recv-modal td{padding:6px 4px!important;font-size:11px!important}
  .recv-modal th{letter-spacing:0!important;font-size:9px!important}
  .recv-modal td:first-child,.recv-modal th:first-child{white-space:normal!important;word-break:break-word}
  .recv-modal th:nth-child(2),.recv-modal td:nth-child(2){width:48px}
  .recv-modal th:nth-child(3),.recv-modal td:nth-child(3){width:50px}
  .recv-modal th:nth-child(4),.recv-modal td:nth-child(4){width:58px}
  .recv-modal th:nth-child(5),.recv-modal td:nth-child(5){width:42px}
  .recv-modal td input[type=number]{width:100%!important;box-sizing:border-box;padding:5px 4px!important;font-size:12px!important}
}
/* Modais: no celular a tabela vira card (regra Lola: 1 linha = 1 card) */

function mkStat(ic,lb,val,sub,col){

async function pgIns(c){
  c.appendChild(ld());
  try{
    _ins=await db('lola_insumos','GET',null,'?select=*&ativo=eq.true&order=categoria.asc,nome.asc');
    c.innerHTML='';
    // filtros de categoria
    const CATS_ORDER=['Bebidas Alcoólicas','Bebidas Não Alcoólicas','Cervejas','Vinhos','Carnes e Pescados','Hortifruti','Insumos Alimentos','Limpeza','Pães'];
    const cats=CATS_ORDER.filter(c=>_ins.some(i=>i.categoria===c));
    let filtCat='Todos';let filtBusca='';
    const tabW=div('tabs');
    function mkCatTabs(){
      tabW.innerHTML='';
      ['Todos',...cats].forEach(cat=>{
        const LABELS={'Bebidas Alcoólicas':'Alcoólicas','Bebidas Não Alcoólicas':'Não Alcoólicas','Cervejas':'Cervejas','Vinhos':'Vinhos','Carnes e Pescados':'Carnes','Hortifruti':'Hortifruti','Insumos Alimentos':'Alimentos','Limpeza':'Limpeza','Pães':'Pães'};
        const p=span('tp'+(cat===filtCat?' active':''),cat==='Todos'?'Todos':(LABELS[cat]||cat));
        p.addEventListener('click',()=>{filtCat=cat;mkCatTabs();drawIns($('#ins-t'));});
        tabW.appendChild(p);
      });
    }
    mkCatTabs();
    c.appendChild(tabW);
    c.appendChild(div('abar no-print',[
      mkSearch(q=>{filtBusca=q;drawIns($('#ins-t'));},'Buscar insumo...'),
      div('fl_ gap2',[
        el('button','btn bo bsm',null,{html:'<i class="ph-duotone ph-download-simple"></i> Baixar planilha',onclick:()=>exportInsumosXlsx()}),
        el('button','btn bo bsm',null,{html:'<i class="ph-duotone ph-upload-simple"></i> Conferir preços',onclick:()=>nav('conferencia')}),
        el('button','btn bo bsm',null,{html:'<i class="ph-duotone ph-currency-dollar"></i> Atualizar preços',onclick:()=>modalPrecos()}),
        el('button','btn bp bsm',null,{html:'<i class="ph-duotone ph-plus"></i> Novo insumo',onclick:()=>modalIns()}),
      ],{style:'flex-wrap:wrap'})
    ]));
    const w=div(null,null,{id:'ins-t'});c.appendChild(w);
    function drawIns(w){
      w.innerHTML='';
      let f=_ins;
      if(filtCat!=='Todos')f=f.filter(i=>i.categoria===filtCat);
      if(filtBusca)f=f.filter(i=>i.nome.toLowerCase().includes(filtBusca.toLowerCase()));
      if(!f.length){w.appendChild(em('🧂','Nenhum insumo encontrado'));return;}
      // agrupar por categoria se estiver em "Todos"
      if(filtCat==='Todos'){
        const grupos={};f.forEach(i=>{if(!grupos[i.categoria])grupos[i.categoria]=[];grupos[i.categoria].push(i);});
        Object.entries(grupos).forEach(([cat,itens])=>{
          w.appendChild(div('mt3 mb3',el('span','bct bold',cat,{style:'font-size:11px;letter-spacing:1px;'})));
          w.appendChild(mkInsTable(itens));
        });
      }else{
        w.appendChild(mkInsTable(f));
      }
    }
    window._drawIns=drawIns;
    drawIns(w);
  }catch(e){c.innerHTML='<p style="color:red;padding:20px">'+e.message+'</p>';}
}

function mkInsTable(itens){
  const wrap=document.createElement('div');
  itens.forEach(i=>{
    const unCusto=i.unidade_custo||'kg';
    const card=div('ins-card');
    // topo: info + custo
    const top=div('ins-top');
    const info=div('ins-info');
    info.appendChild(div('ins-nome',[i.nome]));
    const meta=div('ins-meta');
    meta.appendChild(bq(i.categoria.split(' ')[0],'bct'));
    meta.appendChild(span('ins-un','por '+unCusto));
    info.appendChild(meta);
    top.appendChild(info);
    const vcusto=div('ins-custo');
    vcusto.innerHTML='<div class="ins-custo-lb">Custo/'+unCusto+'</div><div class="ins-custo-v">'+R(i.custo_por_unidade)+'</div>';
    top.appendChild(vcusto);
    card.appendChild(top);
    // linha "pre\u00E7o atualizado em / por"
    const upd=div('ins-upd');
    const ic=document.createElement('i');ic.className='ph-duotone ph-clock-counter-clockwise';upd.appendChild(ic);
    if(i.preco_atualizado_em){
      const d=new Date(i.preco_atualizado_em).toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
      upd.appendChild(document.createTextNode(' Pre\u00E7o atualizado '+d));
      if(i.preco_atualizado_por){upd.appendChild(document.createTextNode(' por '));const b=document.createElement('b');b.textContent=i.preco_atualizado_por;upd.appendChild(b);}
    }else{
      upd.classList.add('ins-upd-none');
      upd.appendChild(document.createTextNode(' Sem atualiza\u00E7\u00E3o de pre\u00E7o registrada'));
    }
    card.appendChild(upd);
    // bot\u00F5es (Phosphor)
    const btns=div('ins-btns');
    btns.appendChild(el('button','ins-ab',null,{html:'<i class="ph-duotone ph-magnifying-glass"></i>',title:'Onde \u00E9 usado',onclick:()=>ondeEUsado(i)}));
    btns.appendChild(el('button','ins-ab',null,{html:'<i class="ph-duotone ph-chart-line"></i>',title:'Hist\u00F3rico de pre\u00E7o',onclick:()=>modalHistoricoPreco(i)}));
    btns.appendChild(el('button','ins-ab',null,{html:'<i class="ph-duotone ph-pencil-simple"></i>',title:'Editar',onclick:()=>modalIns(i)}));
    btns.appendChild(el('button','ins-ab del',null,{html:'<i class="ph-duotone ph-trash"></i>',title:'Excluir',onclick:async()=>{
      if(!confirm('Excluir "'+i.nome+'"?'))return;
      await db('lola_insumos','PATCH',{ativo:false},'?id=eq.'+i.id);
      _ins=_ins.filter(x=>x.id!==i.id);
      window._drawIns&&window._drawIns(document.getElementById('ins-t'));
    }}));
    card.appendChild(btns);wrap.appendChild(card);
  });
  return wrap;
}

function modalIns(item){
  const ed=!!item;
  // Compatibilidade: converter unidade_compra antiga 'g/ml' para unidade real
  const _unCompraReal=(()=>{
    const uc=item?.unidade_compra;
    if(!uc||uc==='g/ml') return (item?.unidade_custo==='L'?'ml':'g');
    if(uc==='un') return 'un';
    return uc; // já é valor real (g, ml, kg, L, etc)
  })();
  let f={
    categoria:item?.categoria||'Hortifruti',
    nome:item?.nome||'',
    unidade_compra:_unCompraReal,
    unidade_custo:item?.unidade_custo||'kg',
    qtd_comprada:item?.qtd_comprada||1000,
    valor_pago:item?.valor_pago||'',
    custo_por_unidade:item?.custo_por_unidade||0
  };

  // Unidades disponíveis para compra (a que aparece na embalagem)
  const UNS_COMPRA_GM=['g','ml']; // peso/volume pequeno
  const UNS_COMPRA_BIG=['kg','L']; // peso/volume grande
  const UNS_ESPECIAIS=['un','cx','pct','maço','dz'];
  const todasUns=[...UNS_COMPRA_GM,...UNS_COMPRA_BIG,...UNS_ESPECIAIS];

  // Unidade de custo depende do tipo
  function unsCusto(){
    if(f.unidade_compra==='g') return ['g','kg'];
    if(f.unidade_compra==='ml') return ['ml','L'];
    if(f.unidade_compra==='kg') return ['kg','g'];
    if(f.unidade_compra==='L') return ['L','ml'];
    if(['g/ml'].includes(f.unidade_compra)) return ['kg','L','g','ml'];
    return ['un','cx','pct','maço','dz','kg','g','ml','L'];
  }

  function calcCusto(){
    const vp=parseFloat(f.valor_pago)||0;
    const qc=parseFloat(f.qtd_comprada)||1;
    const uc=f.unidade_custo||'kg';
    const ucompra=f.unidade_compra||'g';
    // compra em g ou ml → custo em kg/L: multiplica por 1000
    if(['g','ml'].includes(ucompra)){
      if(['kg','L'].includes(uc)) return (vp/qc)*1000;
      return vp/qc;
    }
    // compra em kg → custo em kg: direto
    if(ucompra==='kg') return vp/qc;
    // compra em L → custo em L: direto
    if(ucompra==='L') return vp/qc;
    // un, cx, pct, maço, dz → direto
    return vp/qc;
  }

  const custoEl=div('custo-box mt2');
  // Campo de conversão: aparece quando unidade de compra ≠ unidade de uso
  // Ex: compra em "maço" mas usa em "g" → precisa saber quantas gramas tem 1 maço
  let f_conversao=parseFloat(item?.conversao_qtd)||0; // qtd da unidade de uso por 1 unidade de compra
  const conversaoWrap=div(null);
  conversaoWrap.style.marginBottom='8px';

  function precisaConversao(){
    const compra=f.unidade_compra||'';
    const uso=f.unidade_custo||'';
    // Se são unidades do mesmo sistema (g↔kg, ml↔L) não precisa conversão manual
    const mesmoPeso=['g','kg'].includes(compra)&&['g','kg'].includes(uso);
    const mesmoVol=['ml','L'].includes(compra)&&['ml','L'].includes(uso);
    const mesmoUn=compra===uso;
    return !mesmoPeso&&!mesmoVol&&!mesmoUn;
  }

  function atualizaConversaoWrap(){
    // Usar display em vez de innerHTML para não quebrar event listeners
    if(!precisaConversao()){conversaoWrap.style.display='none';return;}
    conversaoWrap.style.display='';
    if(conversaoWrap.querySelector('input'))return; // já foi renderizado
    conversaoWrap.style.display='';
    const compra=f.unidade_compra||'un';
    const uso=f.unidade_custo||'g';
    const inpConv=el('input','fi',null,{type:'number',step:'0.1',min:'0',
      value:f_conversao||'',placeholder:'Ex: 150'});
    inpConv.addEventListener('input',e=>{f_conversao=parseFloat(e.target.value)||0;atualizaCusto();});
    const msg=div('al ali');
    msg.style.cssText='margin-top:6px;font-size:12px';
    msg.textContent='Quantos '+uso+' tem em 1 '+compra+'? (necessário para calcular o custo por '+uso+')';
    conversaoWrap.appendChild(fgrp('📐 Conversão: '+uso+' por 1 '+compra,inpConv));
    conversaoWrap.appendChild(msg);
  }

  function calcCustoComConversao(){
    const vp=parseFloat(f.valor_pago)||0;
    const qc=parseFloat(f.qtd_comprada)||1;
    const uc=f.unidade_custo||'kg';
    const ucompra=f.unidade_compra||'g';
    // Mesmo sistema: g↔kg
    if(['g','kg'].includes(ucompra)&&['g','kg'].includes(uc)){
      if(ucompra==='g'&&uc==='kg') return (vp/qc)*1000;
      if(ucompra==='kg'&&uc==='g') return (vp/qc)/1000;
      return vp/qc;
    }
    // Mesmo sistema: ml↔L
    if(['ml','L'].includes(ucompra)&&['ml','L'].includes(uc)){
      if(ucompra==='ml'&&uc==='L') return (vp/qc)*1000;
      if(ucompra==='L'&&uc==='ml') return (vp/qc)/1000;
      return vp/qc;
    }
    // Conversão manual: ex maço → g, un → ml
    if(precisaConversao()&&f_conversao>0){
      // 1 maço = f_conversao g → custo por g = valor_por_maço / f_conversao
      const custoPorEmbalagem=vp/qc;
      return custoPorEmbalagem/f_conversao;
    }
    // Mesmo (un, cx, etc)
    return vp/qc;
  }

  function atualizaCusto(){
    const c=calcCustoComConversao();
    f.custo_por_unidade=c;
    custoEl.innerHTML='';
    const temConversao=precisaConversao();
    const valido=!temConversao||(temConversao&&f_conversao>0);
    if(temConversao&&!f_conversao){
      custoEl.appendChild(div('al alw','⚠️ Informe a conversão acima para calcular o custo corretamente.'));
    } else {
      custoEl.appendChild(div('fl_ jb aic',[
        span('tss','Custo por '+f.unidade_custo+' (unidade que usamos):'),
        el('span','bold tv',R(c)+' / '+f.unidade_custo),
      ]));
    }
    // Atualizar opções de unidade de custo
    selCusto.innerHTML='';
    unsCusto().forEach(u=>{
      const o=el('option',null,u,{value:u});
      if(u===f.unidade_custo)o.selected=true;
      selCusto.appendChild(o);
    });
    atualizaConversaoWrap();
  }

  const cats=['Bebidas Alcoólicas','Bebidas Não Alcoólicas','Cervejas','Vinhos','Carnes e Pescados','Hortifruti','Insumos Alimentos','Limpeza','Pães'];

  const UNS_USO=['kg','g','L','ml','un','cx','pct','maço','dz'];
  const selCustoU=fsel('',UNS_USO,f.unidade_custo,v=>{f.unidade_custo=v;refLbl();});
  const inpCustoD=finp('',(f.custo_por_unidade!=null&&f.custo_por_unidade!==0)?f.custo_por_unidade:'',v=>{f.custo_por_unidade=v;},'number');
  const lblCustoU=document.createElement('div');lblCustoU.style.cssText='font-size:12px;color:var(--ts);margin-top:2px';
  function refLbl(){lblCustoU.textContent='Custo por '+(f.unidade_custo||'un')+' — a unidade que usamos nas receitas.';}
  refLbl();

  mkModal(ed?'Editar insumo':'Novo insumo',[
    div('fg2',[
      fgrp('Categoria',fsel('',cats,f.categoria,v=>f.categoria=v)),
      fgrp('Nome do insumo',finp('',f.nome,v=>f.nome=v)),
    ]),
    div('fg2',[
      fgrp('Unidade que usamos',selCustoU),
      fgrp('Custo por unidade (R$)',inpCustoD),
    ]),
    lblCustoU,
  ],async()=>{
    const _custo=parseFloat(String(f.custo_por_unidade).replace(',','.'))||0;
    const p={
      categoria:f.categoria,nome:f.nome,
      unidade_compra:f.unidade_custo,
      unidade_custo:f.unidade_custo,
      qtd_comprada:1,
      valor_pago:_custo,
      custo_por_unidade:_custo
    };
    const _precoMudou=!ed || Math.abs(_custo-(parseFloat(item&&item.custo_por_unidade)||0))>0.0001;
    if(_precoMudou){p.preco_atualizado_em=new Date().toISOString();p.preco_atualizado_por=ME||null;}
    if(ed){
      if(_precoMudou)await db('lola_insumos_historico','POST',{insumo_id:item.id,custo_anterior:item.custo_por_unidade,custo_novo:_custo,alterado_por:ME||null});
      await db('lola_insumos','PATCH',p,'?id=eq.'+item.id);
    }
    else await db('lola_insumos','POST',p);
    _ins=await db('lola_insumos','GET',null,'?select=*&ativo=eq.true&order=categoria.asc,nome.asc');
    window._drawIns&&window._drawIns($('#ins-t'));
  });
}


async function verHistoricoPreco(ins){
  const ov=div('ov');const mo=div('mo mol');
  mo.appendChild(div('mh',[
    el('h3',null,'📈 Histórico de preços — '+ins.nome),
    btn('xb','✕',()=>ov.remove())
  ]));
  const mb=div('mb');mb.appendChild(ld());
  mo.appendChild(mb);
  ov.appendChild(mo);
  mo.addEventListener('click',e=>e.stopPropagation());
  ov.addEventListener('click',e=>{if(e.target===ov)ov.remove();});
  document.body.appendChild(ov);

  try{
    const hist=await db('lola_insumos_historico','GET',null,
      '?insumo_id=eq.'+ins.id+'&order=alterado_em.asc&select=*');

    mb.innerHTML='';

    const unCusto=ins.unidade_custo||'kg';

    // Card resumo atual
    mb.appendChild(div('g3 mb3',[
      div('custo-box',[span('scl','Preço atual'),div('bold tv mt2',R(ins.custo_por_unidade)+'/'+unCusto)]),
      div('custo-box',[span('scl','Atualizações'),div('bold mt2',hist.length+' registro'+(hist.length!==1?'s':''))]),
      div('custo-box',[span('scl','Primeira vez'),div('bold mt2',hist.length?new Date(hist[0].alterado_em).toLocaleDateString('pt-BR',{month:'short',year:'2-digit'}):'—')]),
    ]));

    if(!hist.length){
      mb.appendChild(div('tss mt3 tc','Nenhum histórico de alteração registrado ainda. Os preços serão registrados automaticamente a cada atualização mensal.'));
      mo.appendChild(div('mf',[btn('btn bg','Fechar',()=>ov.remove())]));
      return;
    }

    // Montar dados com ponto atual
    const dados=[...hist.map(h=>({
      data:new Date(h.alterado_em),
      preco:parseFloat(h.custo_por_unidade_novo||h.custo_novo||0),
      editor:h.alterado_por||'',
    })),{data:new Date(),preco:parseFloat(ins.custo_por_unidade),editor:'atual'}];

    // Calcular variação
    if(dados.length>=2){
      const primeiro=dados[0].preco;
      const ultimo=dados[dados.length-1].preco;
      const var_pct=((ultimo-primeiro)/primeiro*100).toFixed(1);
      const cor=var_pct>0?'#dc2626':var_pct<0?'#166534':'var(--ts)';
      const seta=var_pct>0?'↑':var_pct<0?'↓':'→';
      const varEl=div('al ali mb3');
      varEl.style.cssText='padding:10px 16px;border-radius:10px;background:'+(var_pct>0?'#fee2e2':var_pct<0?'#dcfce7':'var(--rf)');
      varEl.innerHTML='<span style="font-weight:700;color:'+cor+'">'+seta+' '+Math.abs(var_pct)+'% desde o início</span> <span style="font-size:12px;color:var(--ts)">· de '+R(primeiro)+' para '+R(ultimo)+'/'+unCusto+'</span>';
      mb.appendChild(varEl);
    }

    // Gráfico SVG simples
    const precos=dados.map(d=>d.preco);
    const minP=Math.min(...precos)*0.9;
    const maxP=Math.max(...precos)*1.1||1;
    const W=480,H=160,PAD=40;
    const iW=W-PAD*2,iH=H-PAD;

    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('viewBox','0 0 '+W+' '+H);
    svg.style.cssText='width:100%;height:auto;display:block;margin-bottom:16px';

    // Linhas de grade
    [0,0.25,0.5,0.75,1].forEach(p=>{
      const y=PAD/2+iH*(1-p);
      const line=document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1',PAD);line.setAttribute('x2',W-PAD);
      line.setAttribute('y1',y);line.setAttribute('y2',y);
      line.setAttribute('stroke','#f0e0e0');line.setAttribute('stroke-width','1');
      svg.appendChild(line);
      const val=minP+(maxP-minP)*p;
      const txt=document.createElementNS('http://www.w3.org/2000/svg','text');
      txt.setAttribute('x',PAD-4);txt.setAttribute('y',y+4);
      txt.setAttribute('text-anchor','end');txt.setAttribute('font-size','9');
      txt.setAttribute('fill','#999');txt.textContent='R$'+val.toFixed(0);
      svg.appendChild(txt);
    });

    // Pontos e linha
    const pts=dados.map((d,i)=>{
      const x=PAD+iW*(i/(dados.length-1||1));
      const y=PAD/2+iH*(1-(d.preco-minP)/(maxP-minP||1));
      return {x,y,d};
    });

    // Linha
    if(pts.length>1){
      const path=document.createElementNS('http://www.w3.org/2000/svg','polyline');
      path.setAttribute('points',pts.map(p=>p.x+','+p.y).join(' '));
      path.setAttribute('fill','none');path.setAttribute('stroke','#AA2B2B');
      path.setAttribute('stroke-width','2.5');path.setAttribute('stroke-linejoin','round');
      svg.appendChild(path);
      // Área
      const area=document.createElementNS('http://www.w3.org/2000/svg','polygon');
      const areaPoints=[...pts.map(p=>p.x+','+p.y),
        (W-PAD)+','+(PAD/2+iH), PAD+','+(PAD/2+iH)].join(' ');
      area.setAttribute('points',areaPoints);
      area.setAttribute('fill','rgba(170,43,43,0.08)');
      svg.appendChild(area);
    }

    // Pontos e labels
    pts.forEach((pt,i)=>{
      const circle=document.createElementNS('http://www.w3.org/2000/svg','circle');
      circle.setAttribute('cx',pt.x);circle.setAttribute('cy',pt.y);
      circle.setAttribute('r','4');circle.setAttribute('fill','#AA2B2B');
      svg.appendChild(circle);
      // Label de preço
      const txt=document.createElementNS('http://www.w3.org/2000/svg','text');
      txt.setAttribute('x',pt.x);txt.setAttribute('y',pt.y-8);
      txt.setAttribute('text-anchor','middle');txt.setAttribute('font-size','9');
      txt.setAttribute('fill','#AA2B2B');txt.setAttribute('font-weight','bold');
      txt.textContent='R$'+pt.d.preco.toFixed(2);
      svg.appendChild(txt);
      // Label de data
      if(i===0||i===pts.length-1||pts.length<=6){
        const dtxt=document.createElementNS('http://www.w3.org/2000/svg','text');
        dtxt.setAttribute('x',pt.x);dtxt.setAttribute('y',H-4);
        dtxt.setAttribute('text-anchor','middle');dtxt.setAttribute('font-size','8');
        dtxt.setAttribute('fill','#999');
        dtxt.textContent=pt.d.editor==='atual'?'hoje':pt.d.data.toLocaleDateString('pt-BR',{month:'short',year:'2-digit'});
        svg.appendChild(dtxt);
      }
    });

    const svgWrap=div('custo-box mb3');svgWrap.appendChild(svg);
    mb.appendChild(svgWrap);

    // Tabela de histórico
    mb.appendChild(el('strong',null,'Histórico detalhado',{style:'font-size:12px;display:block;margin-bottom:8px'}));
    const tblWrap=div('tw');
    const tbl=document.createElement('table');tbl.style.cssText='width:100%;border-collapse:collapse';
    const thead=document.createElement('thead');const htr=document.createElement('tr');
    ['Data','Preço anterior','Novo preço','Variação','Editado por'].forEach((h,i)=>{
      const th=document.createElement('th');
      th.style.cssText='padding:6px 10px;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--v);background:var(--rt);text-align:'+(i>=1&&i<=3?'right':'left');
      th.textContent=h;htr.appendChild(th);
    });
    thead.appendChild(htr);tbl.appendChild(thead);
    const tbody=document.createElement('tbody');
    hist.forEach((h,i)=>{
      const tr=document.createElement('tr');
      tr.style.cssText=(i%2===0?'background:var(--rf)':'background:#fff')+';border-bottom:1px solid var(--rb)';
      const novoP=parseFloat(h.custo_por_unidade_novo||h.custo_novo||0);
      const anteP=parseFloat(h.custo_por_unidade_anterior||h.custo_anterior||0);
      const vPct=anteP>0?((novoP-anteP)/anteP*100).toFixed(1):null;
      const cor=vPct>0?'#dc2626':vPct<0?'#166534':'var(--ts)';
      [
        new Date(h.alterado_em).toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'2-digit'}),
        R(anteP)+'/'+unCusto,
        R(novoP)+'/'+unCusto,
        vPct!==null?(vPct>0?'↑ +':vPct<0?'↓ ':'→ ')+Math.abs(vPct)+'%':'—',
        h.alterado_por||'—',
      ].forEach((val,ci)=>{
        const td=document.createElement('td');
        td.style.cssText='padding:7px 10px;font-size:12px;text-align:'+(ci>=1&&ci<=3?'right':'left')+(ci===3?';font-weight:700;color:'+cor:'');
        td.textContent=val;tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
    tbl.appendChild(tbody);tblWrap.appendChild(tbl);
    mb.appendChild(tblWrap);

  }catch(e){mb.innerHTML='<p style="color:red;padding:20px">'+e.message+'</p>';}

  mo.appendChild(div('mf',[btn('btn bg','Fechar',()=>ov.remove())]));
}

function modalPrecos(){

    });
  }

  // Barra de busca
  const srchInp=el('input','fi',null,{placeholder:'Buscar insumo...',style:'margin-bottom:8px'});
  srchInp.addEventListener('input',e=>{_filtBusca=e.target.value;mkRows(rowsWrap);});

  // Tabs de categoria
  const catTabs=div('tabs',null,{style:'margin-bottom:12px'});
  cats.forEach(cat=>{
    const p=span('tp'+(cat===_filtCat?' active':''),cat==='Todos'?'Todos':cat.split(' ')[0]);

      p.classList.add('active');
      mkRows(rowsWrap);
    });
    catTabs.appendChild(p);
  });

  const rowsWrap=div(null);
  mkRows(rowsWrap);

  const rows=_ins.map(i=>{
    const lbl=i.unidade_custo||'kg';
    const inp=el('input','fi',null,{type:'number',step:'0.01',value:N(i.custo_por_unidade,4),'data-id':i.id,'data-un':i.unidade_compra,'data-qtd':i.qtd_comprada,style:'width:110px;text-align:right'});
    return div('fl_ jb aic mt2',[
      div(null,[el('div','bold',i.nome,{style:'font-size:13px'}),span('tss',i.categoria+' · atual: '+R(i.custo_por_unidade)+' /'+lbl)]),
      div('fl_ aic gap2',[span('tss','R$/'+lbl+':'),inp])
    ],{style:'padding:8px 12px;background:var(--rf);border-radius:9px;gap:10px'});
  });
  mkModal('💰 Atualização mensal de preços',[
    div('al ali','Digite o novo custo por kg/L ou por unidade. Só altere o que mudou.'),
    srchInp,
    catTabs,
    rowsWrap
  ],async()=>{
    for(const i of _ins){
      const inp=document.querySelector('[data-id="'+i.id+'"]');
      if(!inp)continue;
      const novoCusto=parseFloat(inp.value);
      if(Math.abs(novoCusto-parseFloat(i.custo_por_unidade))>0.0001){
        const un=inp.dataset.un;
        const qtd=parseFloat(inp.dataset.qtd)||1000;
        const novoValorPago=un==='g/ml'?novoCusto*(qtd/1000):novoCusto*qtd;
        await db('lola_insumos_historico','POST',{insumo_id:i.id,custo_anterior:i.custo_por_unidade,custo_novo:novoCusto,alterado_por:ME||null});
        await db('lola_insumos','PATCH',{custo_por_unidade:novoCusto,valor_pago:novoValorPago,preco_atualizado_em:new Date().toISOString(),preco_atualizado_por:ME||null},'?id=eq.'+i.id);
      }
    }
    _ins=await db('lola_insumos','GET',null,'?select=*&ativo=eq.true&order=categoria.asc,nome.asc');
    window._drawIns&&window._drawIns($('#ins-t'));
    alert('✅ Preços atualizados!');
  },'mo mol');
}

async function modalPrep(item){
  const ed=!!item;
  let margInp;
  let f={nome:item?.nome||'',categoria:item?.categoria||_ppTab,cat_custo:item?.cat_custo||'',rendimento_qtd:item?.rendimento_qtd||1000,rendimento_un:item?.rendimento_un||'g',custo_total:item?.custo_total||0,custo_por_unidade:item?.custo_por_unidade||0,valor_venda_central:item?.valor_venda_central||0,margem_venda:item?.margem_venda||70,porcao_qtd:item?.porcao_qtd||null,porcao_un:item?.porcao_un||null,modo_preparo:item?.modo_preparo||'',observacoes:item?.observacoes||''};
  const ings=[];
  const iw=div(null);
  let rendInp; f._rendManual=!!(ed&&item&&item.rendimento_qtd);
  function ingSumBase(){var dim=_dimUn(f.rendimento_un);var s=0;ings.forEach(function(ig){var q=parseFloat(ig.qtd_bruta||ig.qtd_liquida||0)||0;var u=ig.unidade||'g';if(_dimUn(u)!==dim)return;s+=(dim==='outro')?q:_baseUn(q,u);});return s;}
  function sumInRendUn(){var b=ingSumBase();var u=f.rendimento_un;return (u==='kg'||u==='L')?b/1000:b;}

  // Carregar ingredientes existentes se editando
  if(ed && item?.id){
    try{
      const existentes=await db('lola_preproducoes_itens','GET',null,
        '?select=*,lola_insumos(id,nome,custo_por_unidade,unidade_custo,unidade_compra),lola_preproducoes_sub:sub_preproducao_id(id,nome,custo_por_unidade,rendimento_un)&preproducao_id=eq.'+item.id);
      existentes.forEach(it=>{
        const isIns=!!it.lola_insumos;
        const src=isIns?it.lola_insumos:it.lola_preproducoes_sub;
        if(!src)return;
        ings.push({
          tipo:isIns?'insumo':'prep',
          id:src.id,
          unidade:it.unidade||'g',
          qtd_bruta:it.qtd_bruta,
          qtd_liquida:it.qtd_liquida,
          fc:it.fc||1,
          custo_unitario:it.custo_unitario,
          custo_total:it.custo_total,
        });
      });
    }catch(e){console.error('Erro ao carregar itens PP:',e);}
  }

  function calcTotais(){
    const ct=ings.reduce((t,ig)=>{
      if(!ig.id&&!ig.nome_manual)return t;
      return t+parseFloat(ig.custo_total||0);
    },0);
    f.custo_total=ct;
    if(!f._rendManual){var _s=sumInRendUn();if(_s>0){f.rendimento_qtd=Math.round(_s*1000)/1000;if(rendInp)rendInp.value=f.rendimento_qtd;}}
    const qtd=parseFloat(f.rendimento_qtd)||1;
    // Calcular custo na unidade base correta
    // g → custo por kg (×1000/qtd), ml → custo por L (×1000/qtd)
    // kg, L, un, porção → custo direto (÷qtd)
    const unBase=f.rendimento_un==='g'?'kg':f.rendimento_un==='ml'?'L':f.rendimento_un;
    f.custo_por_unidade=(['g','ml'].includes(f.rendimento_un))?(ct/qtd)*1000:ct/qtd;
    const m=parseFloat(f.margem_venda)||70;
    f.valor_venda_central=f.custo_por_unidade/(m/100);
    const numPorcoes2=parseFloat(f.porcao_qtd)>0?(parseFloat(f.rendimento_qtd)/parseFloat(f.porcao_qtd)):null;
    const custoPorcao2=numPorcoes2?ct/numPorcoes2:null;
    custoResEl.innerHTML=somaIngredientesHTML(ings)+'<div class="fl_ jb mb3"><span>Custo total</span><strong>'+R(ct)+'</strong></div>'+
      '<div class="fl_ jb mb3"><span>Rendimento total</span><strong>'+N(qtd,0)+' '+f.rendimento_un+'</strong></div>'+
      (numPorcoes2?'<div class="fl_ jb mb3"><span>Porções ('+N(f.porcao_qtd,0)+' '+f.porcao_un+')</span><strong>'+numPorcoes2.toFixed(1)+'</strong></div>':'')+
      (custoPorcao2?'<div class="fl_ jb mb3"><span>Custo/porção</span><strong class="tv">'+R(custoPorcao2)+'</strong></div>':'')+'<div class="fl_ jb mb3"><span>Custo/'+unBase+'</span><strong class="tv">'+R(f.custo_por_unidade)+'</strong></div>'+
      '<div class="fl_ jb"><span>Valor venda central ('+m+'% CMV)</span><strong>'+R(f.valor_venda_central)+'</strong></div>';
  }

  // Lista unificada: insumos + sub-pré-prods em ordem alfabética
  function mkOptsUnificadaPP(){
    const ins=_ins.map(i=>{
      const uc=i.unidade_custo||'kg';
      let unUso;
      if(i.unidade_compra==='g/ml') unUso=uc==='L'?'ml':'g';
      else if(['g','ml'].includes(i.unidade_compra)) unUso=i.unidade_compra;
      else if(i.unidade_compra==='kg') unUso='g';
      else if(i.unidade_compra==='L') unUso='ml';
      else unUso=i.unidade_compra||'un';
      return {v:'ins:'+i.id,l:i.nome,custo:i.custo_por_unidade,un:unUso,tipo:'insumo',srcId:i.id};
    });
    // pré-prods exceto a própria (evitar referência circular)
    const pps=_pp.filter(p=>p.id!==item?.id).map(p=>({v:'pp:'+p.id,l:'[PP] '+p.nome,custo:p.custo_por_unidade,un:p.rendimento_un,tipo:'prep',srcId:p.id}));
    return [...ins,...pps].sort((a,b)=>a.l.localeCompare(b.l,'pt'));
  }

  function rebuildI(){
    iw.innerHTML='';
    const optsAll=mkOptsUnificadaPP();
    ings.forEach((ig,idx)=>{
      const tipoBadge=span('bq '+(ig.tipo==='prep'?'bce':'bc'),ig.tipo==='prep'?'PP':'Ins');
      tipoBadge.style.cssText='font-size:10px;padding:2px 8px;border-radius:50px;font-weight:700;white-space:nowrap;flex-shrink:0';

      const sel=el('select','fi',null,{style:'flex:2;min-width:0'});
      sel.appendChild(el('option',null,'— selecione —',{value:''}));
      optsAll.forEach(o=>{
        const opt=el('option',null,o.l,{value:o.v});
        const curVal=(ig.tipo==='insumo'?'ins:':'pp:')+ig.id;
        if(o.v===curVal)opt.selected=true;
        sel.appendChild(opt);
      });
      const unOpts2=(()=>{
        // Para sub-pré-produções, incluir a unidade de rendimento delas
        if(ig.tipo==='prep'){
          const pp=_pp.find(p=>p.id===ig.id);
          const unPP=pp?.rendimento_un||ig.unidade||'g';
          const base=['g','ml','kg','L','un','porção'];
          return [unPP,...base.filter(u=>u!==unPP)];
        }
        if(['g','ml'].includes(ig.unidade)) return ['g','ml','kg','L'];
        if(['kg','L'].includes(ig.unidade)) return ['kg','L','g','ml'];
        return ['un','cx','pct','maço'];
      })();
      const unSel2=el('select','fi',null,{style:'width:58px;flex-shrink:0;padding:6px 4px;font-size:12px'});
      unOpts2.forEach(u=>{const o=el('option',null,u,{value:u});if(u===ig.unidade)o.selected=true;unSel2.appendChild(o);});
      unSel2.addEventListener('change',e=>{ig.unidade=e.target.value;calcItem(idx);});

      sel.addEventListener('change',e=>{
        const val=e.target.value;
        if(!val){ig.id='';ig.custo_unitario=0;ig.custo_total=0;ig.unidade='g';ig.tipo='insumo';rebuildI();return;}
        const opt=optsAll.find(o=>o.v===val);
        if(!opt)return;
        ig.tipo=opt.tipo;ig.id=opt.srcId;ig.custo_unitario=opt.custo;ig.unidade=opt.un;
        tipoBadge.textContent=ig.tipo==='prep'?'PP':'Ins';
        tipoBadge.className='bq '+(ig.tipo==='prep'?'bce':'bc');
        tipoBadge.style.cssText='font-size:10px;padding:2px 8px;border-radius:50px;font-weight:700;white-space:nowrap;flex-shrink:0';
        unSel2.innerHTML='';
        const newU=(['g','ml'].includes(ig.unidade)?['g','ml','kg','L']:['kg','L'].includes(ig.unidade)?['kg','L']:['un','cx','pct']);
        newU.forEach(u=>{const o=el('option',null,u,{value:u});if(u===ig.unidade)o.selected=true;unSel2.appendChild(o);});
        calcItem(idx);
      });

      const qbI=finp('',ig.qtd_bruta!=null&&ig.qtd_bruta!==''?String(ig.qtd_bruta).replace('.',','):'',v=>{ig.qtd_bruta=(v||'').replace(',','.');calcItem(idx);},'text');qbI.setAttribute('inputmode','decimal');
      qbI.style.cssText='width:80px;flex-shrink:0';qbI.placeholder='Qtd';
      const fcI=finp('',ig.fc!=null?String(ig.fc).replace('.',','):1,v=>{ig.fc=(v||'').replace(',','.');calcItem(idx);},'text');fcI.setAttribute('inputmode','decimal');
      fcI.style.cssText='width:72px;flex-shrink:0;text-align:center';
      const ctEl=span('bold tv',R(ig.custo_total||0));
      ctEl.style.cssText='font-size:12px;white-space:nowrap;min-width:65px;text-align:right;flex-shrink:0';

      function calcItem(i){
        const src=ings[i];
        const ql=(parseFloat(src.qtd_bruta)||0)/(parseFloat(src.fc)||1);
        src.qtd_liquida=ql;
        const srcObj=src.tipo==='insumo'?_ins.find(x=>x.id===src.id):_pp.find(x=>x.id===src.id);
        let unCusto;
        if(src.tipo==='insumo'){
          unCusto=srcObj?.unidade_custo||'kg';
        } else {
          const rendUn=srcObj?.rendimento_un||'g';
          unCusto=rendUn==='g'?'kg':rendUn==='ml'?'L':rendUn;
        }
        src.custo_total=calcCustoItem(src.qtd_bruta,src.fc,src.unidade||'g',src.custo_unitario,unCusto);
        ctEl.textContent=R(src.custo_total);
        calcTotais();
      }

      const rm=btn('btn bd bxs','✕',()=>{ings.splice(idx,1);rebuildI();calcTotais();});
      iw.appendChild(div('ir',[
        div('ir-head',[tipoBadge,sel,rm]),
        div('ir-grid',[
          div('ir-f',[span('ir-lb','Qtd'),qbI]),
          div('ir-f',[span('ir-lb','Unidade'),unSel2]),
          div('ir-f',[span('ir-lb','FC'),fcI]),
        ]),
        div('ir-cost',[span('ir-lb','Custo'),ctEl]),
      ]));
    });
  }
  rebuildI();

  const custoResEl=div('custo-box');
  calcTotais();

  // Campo de autoria
  const _autorPP={v:item?.editado_por||''};
  const nomeEdit=finp('',_autorPP.v,v=>{_autorPP.v=v;});
  nomeEdit.placeholder='Seu nome...';
  // Seletor de destinos PP
  const DESTS_PP_OPT=[
    {k:'ccmq',label:'CCMQ',cor:'#AA2B2B'},
    {k:'mac',label:'MAC',cor:'#166634'},
    {k:'central',label:'Central',cor:'#1d4ed8'},
    {k:'eventos',label:'Eventos',cor:'#c47700'},
  ];
  const _selDestsPP=new Set(item?.destinos||[]);
  const destBtnsWrap=div(null,null,{style:'display:flex;gap:8px;flex-wrap:wrap;margin-top:4px'});
  DESTS_PP_OPT.forEach(d=>{
    const b=document.createElement('button');b.type='button';
    function renderB(){
      const sel=_selDestsPP.has(d.k);
      b.style.cssText='padding:6px 14px;border-radius:50px;border:2px solid '+d.cor+';cursor:pointer;font-family:Hanken Grotesk,sans-serif;font-size:12px;font-weight:700;'+(sel?'background:'+d.cor+';color:#fff':'background:#fff;color:'+d.cor);
      b.textContent=(sel?'✓ ':'')+d.label;
    }
    renderB();
    b.addEventListener('click',()=>{_selDestsPP.has(d.k)?_selDestsPP.delete(d.k):_selDestsPP.add(d.k);renderB();});
    destBtnsWrap.appendChild(b);
  });

  // Checkbox pré-preparo
  let _isPre=!!(item?.e_preparo);
  const preChkWrap=document.createElement('label');
  preChkWrap.style.cssText='display:flex;align-items:center;gap:10px;cursor:pointer;font-size:13px;font-weight:700;padding:10px 14px;background:var(--rt);border-radius:10px;border:1.5px solid var(--rb);margin-top:0';
  const chkInp=document.createElement('input');chkInp.type='checkbox';chkInp.checked=_isPre;
  chkInp.style.cssText='width:18px;height:18px;accent-color:var(--v);cursor:pointer;flex-shrink:0';

let _ftTab='todos',_ftBusca='';


function editarDestinos(ficha, onSave){
  const DESTS=[
    {k:'ccmq',label:'CCMQ',cor:'#AA2B2B'},
    {k:'mac',label:'MAC',cor:'#166534'},
    {k:'eventos',label:'Eventos',cor:'#c47700'},
  ];
  const selecionados=new Set(ficha.destinos||[]);
  const btns=div('fl_ gap2 mt2');
  DESTS.forEach(d=>{
    const b=document.createElement('button');
    b.type='button';
    function render(){
      const sel=selecionados.has(d.k);
      b.style.cssText='padding:8px 16px;border-radius:50px;border:2px solid '+d.cor+';cursor:pointer;font-family:Hanken Grotesk,sans-serif;font-size:13px;font-weight:700;transition:all .15s;'+(sel?'background:'+d.cor+';color:#fff':'background:#fff;color:'+d.cor);
      b.textContent=(sel?'✓ ':'')+d.label;
    }
    render();
    b.addEventListener('click',()=>{
      selecionados.has(d.k)?selecionados.delete(d.k):selecionados.add(d.k);
      render();
    });
    btns.appendChild(b);
  });
  mkModal('🏷️ Destinos de '+ficha.nome,[
    div('tss mb2','Selecione onde esta ficha é utilizada:'),
    btns,
  ],async()=>{
    await db('lola_fichas_tecnicas','PATCH',{destinos:[...selecionados]},'?id=eq.'+ficha.id);
    ficha.destinos=[...selecionados];
    onSave&&onSave();
  });
}

function modalRevisarFicha(tipo,item){
  const tabela=tipo==='ft'?'lola_fichas_tecnicas':'lola_preproducoes';
  const reload=tipo==='ft'?
    ()=>db(tabela,'GET',null,'?select=*&ativo=eq.true&order=nome.asc').then(d=>{_ft=d;drawFT($('#ft-t'));}) :
    ()=>db(tabela,'GET',null,'?select=*&ativo=eq.true&order=nome.asc').then(d=>{_pp=d;drawPP($('#pp-t'));});
  if(item.revisar){
    const ov=div('ov');const mo=div('mo');
    mo.addEventListener('click',e=>e.stopPropagation());
    ov.addEventListener('click',e=>{if(e.target===ov)ov.remove();});
    mo.appendChild(div('mh',[el('h3',null,'\u26A0\uFE0F Pendente de revis\u00E3o \u2014 '+item.nome),btn('xb','\u2715',()=>ov.remove())]));
    const mb=div('mb');
    const motEl=document.createElement('div');
    motEl.style.cssText='background:#fef3c7;border:1.5px solid #fcd34d;border-radius:10px;padding:12px 14px;font-size:13px;color:#92400e;margin-bottom:16px';
    motEl.innerHTML='<strong>Motivo:</strong> '+(item.revisar_motivo||'N\u00E3o informado');
    mb.appendChild(motEl);
    mo.appendChild(mb);
    mo.appendChild(div('mf',[
      btn('btn bg','Fechar',()=>ov.remove()),
      btn('btn bv','Marcar como revisado',async()=>{
        await db(tabela,'PATCH',{revisar:false,revisar_motivo:null},'?id=eq.'+item.id);
        item.revisar=false;item.revisar_motivo=null;
        ov.remove();reload();
      }),
    ]));
    ov.appendChild(mo);document.body.appendChild(ov);
  } else {
    const motivo={v:''};
    const inpMot=document.createElement('textarea');
    inpMot.className='fi';inpMot.rows=3;
    inpMot.placeholder='Descreva o motivo da revis\u00E3o (obrigat\u00F3rio)...';
    inpMot.style.cssText='width:100%;resize:vertical;min-height:80px';
    inpMot.addEventListener('input',e=>motivo.v=e.target.value);
    mkModal('\u26A0\uFE0F Marcar para revis\u00E3o \u2014 '+item.nome,[
      div('al ali mb3','Explique o motivo. Isso ficar\u00E1 vis\u00EDvel para toda a equipe.'),
      fgrp('Motivo da revis\u00E3o',inpMot),
    ],async()=>{
      if(!motivo.v.trim()){alert('O motivo \u00E9 obrigat\u00F3rio.');throw new Error('vazio');}
      await db(tabela,'PATCH',{revisar:true,revisar_motivo:motivo.v.trim()},'?id=eq.'+item.id);
      item.revisar=true;item.revisar_motivo=motivo.v.trim();
      reload();
    });
  }
}

function drawFT(w){
  w.innerHTML='';
  let f=_ftTab==='todos'?[..._ft]:
    _ftTab==='pre'?_ft.filter(x=>x.categoria==='pre'||x.categoria==='pre-producao'):
    _ftTab.indexOf('beb_')===0?_ft.filter(x=>x.cardapio===_ftTab.slice(4)&&x.categoria==='bebida'):
    _ft.filter(x=>x.cardapio===_ftTab&&x.categoria!=='bebida');
  if(_ftBusca) f=f.filter(x=>x.nome.toLowerCase().includes(_ftBusca.toLowerCase()));

  const alertas=f.filter(x=>{
    if(!x.preco_venda||x.preco_venda<=0)return false;
    return x.custo_por_porcao/x.preco_venda*100>30;
  });
  if(alertas.length&&!_ftBusca){
    const alertBox=div('al',null,{style:'background:#FBEAE7;border:1px solid #F3D3CE;color:#B5302E;border-radius:14px;padding:12px 16px;margin-bottom:14px'});
    alertBox.appendChild(el('div','bold','Revisar ficha técnica - CMV acima de 30%:',{style:'margin-bottom:8px;font-size:13px'}));
    alertas.forEach(x=>{
      const cmv=(x.custo_por_porcao/x.preco_venda*100).toFixed(0);
      alertBox.appendChild(div('fl_ jb aic',[
        span(null,x.nome,{style:'font-size:12px;font-weight:600'}),
        span(null,'custo '+R(x.custo_por_porcao)+' venda '+R(x.preco_venda)+' CMV '+cmv+'%',{style:'font-size:11px;opacity:.8'})
      ],{style:'padding:4px 0;border-bottom:1px solid #fca5a580'}));
    });
    w.appendChild(alertBox);
  }
  if(!f.length){w.appendChild(em('ficha',_ftBusca?'Nenhuma ficha encontrada':'Nenhuma ficha aqui'));return;}

  const DEST_COR={ccmq:'#C0392B',mac:'#2C7A4B',central:'#2C5AA0',eventos:'#9A6B1E'};
  const DEST_LBL={ccmq:'CCMQ',mac:'MAC',central:'Central',eventos:'Evento'};

  f.forEach(x=>{
    const semPreco=!x.preco_venda||x.preco_venda<=0;
    const cmv=semPreco?null:(x.custo_por_porcao/x.preco_venda*100);
    const dataEd=x.editado_em?new Date(x.editado_em).toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}):null;

    const card=document.createElement('div');
    card.style.cssText='background:#fff;border:1px solid var(--rb);border-radius:16px;padding:13px 14px;margin-bottom:10px;box-shadow:0 1px 2px rgba(42,26,23,.05)'+((!semPreco&&cmv>30)?';border-color:#F3D3CE;background:#FFF7F6':'');

    // Linha 1: nome + badge revisar
    const l1=document.createElement('div');l1.style.cssText='display:flex;align-items:flex-start;gap:8px;margin-bottom:6px';
    const nomeWrap=document.createElement('div');nomeWrap.style.cssText='flex:1;min-width:0';
    const nomeStrong=document.createElement('strong');nomeStrong.style.cssText='font-size:14px;display:block';nomeStrong.textContent=x.nome;
    nomeWrap.appendChild(nomeStrong);
    if(x.revisar){
      const rv=document.createElement('span');rv.style.cssText='display:inline-flex;align-items:center;gap:3px;margin-top:3px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;background:#FBF0DD;color:#9A6B1E;border:1px solid #F1DFB8;cursor:pointer';
      rv.innerHTML='<i class="ph-duotone ph-warning"></i> revisar';rv.title=x.revisar_motivo||'';
      rv.addEventListener('click',e=>{e.stopPropagation();modalRevisarFicha('ft',x);});
      nomeWrap.appendChild(rv);
    }
    // Selos de destino
    if((x.destinos||[]).length){
      const selosRow=document.createElement('div');selosRow.style.cssText='display:flex;gap:4px;flex-wrap:wrap;margin-top:4px';
      (x.destinos||[]).forEach(d=>{
        const s=document.createElement('span');
        s.style.cssText='font-size:10px;font-weight:800;padding:2px 8px;border-radius:50px;color:#fff;background:'+(DEST_COR[d]||'#888');
        s.textContent=DEST_LBL[d]||d;selosRow.appendChild(s);
      });
      nomeWrap.appendChild(selosRow);
    }
    l1.appendChild(nomeWrap);

    card.appendChild(l1);

    // Linha 2: custos
    const l2=document.createElement('div');l2.style.cssText='display:flex;gap:16px;flex-wrap:wrap;margin-bottom:8px';
    function mkInfo(lbl,val,cor){
      const d=document.createElement('div');
      const lt=document.createElement('div');lt.style.cssText='font-size:10px;color:var(--ts);text-transform:uppercase;letter-spacing:1px';lt.textContent=lbl;
      const vt=document.createElement('div');vt.style.cssText='font-size:13px;font-weight:700'+(cor?';color:'+cor:'');vt.textContent=val;
      d.appendChild(lt);d.appendChild(vt);return d;
    }
    l2.appendChild(mkInfo('Custo/porção',R(x.custo_por_porcao),'var(--v)'));
    if(!semPreco){

      const mgLbl=document.createElement('div');mgLbl.style.cssText='font-size:10px;color:var(--ts);text-transform:uppercase;letter-spacing:1px';mgLbl.textContent='CMV';
      const mgVal=mkCMV(x.preco_venda,x.custo_por_porcao);

    card.appendChild(l2);

    // Linha 3: botões (Phosphor, v2 — pequenos à direita no desktop, iguais no celular)
    const btns=div('ins-btns');
    const bMk=el('button','ins-ab'+(x.revisar?' warn':''),null,{html:'<i class="ph-duotone ph-warning"></i>',title:x.revisar?(x.revisar_motivo||'Revisar'):'Marcar para revisar',onclick:()=>modalRevisarFicha('ft',x)});
    btns.appendChild(bMk);
    btns.appendChild(el('button','ins-ab',null,{html:'<i class="ph-duotone ph-eye"></i>',title:'Ver',onclick:()=>verFichaFT(x)}));
    btns.appendChild(el('button','ins-ab',null,{html:'<i class="ph-duotone ph-pencil-simple"></i>',title:'Editar',onclick:()=>modalFicha(x)}));
    const del=el('button','ins-ab del',null,{html:'<i class="ph-duotone ph-trash"></i>',title:'Excluir',onclick:async()=>{
      if(!confirm('Excluir '+x.nome+'?'))return;
      await db('lola_fichas_tecnicas','PATCH',{ativo:false},'?id=eq.'+x.id);
      _ft=await db('lola_fichas_tecnicas','GET',null,'?select=*&ativo=eq.true&order=nome.asc');
      drawFT($('#ft-t'));
    }});
    btns.appendChild(del);
    card.appendChild(btns);
    if(x.capa){
      card.style.display='flex'; card.style.alignItems='stretch'; card.style.gap='12px';
      var _content=document.createElement('div'); _content.style.cssText='flex:1;min-width:0';
      while(card.firstChild){ _content.appendChild(card.firstChild); }
      var _ph=document.createElement('img'); _ph.src=x.capa; _ph.style.cssText='flex-shrink:0;width:92px;height:92px;object-fit:cover;border-radius:12px;border:1.5px solid var(--rb);cursor:pointer;align-self:center'; _ph.addEventListener('click',function(){window.open(x.capa,'_blank');});
      card.appendChild(_content); card.appendChild(_ph);
    }
    w.appendChild(card);
  });
}

function mkCMV(preco_venda, custo){
  if(!preco_venda||preco_venda<=0) return span('tss','sem preço');
  const cmv=custo/preco_venda*100;
  const cmvStr=cmv.toFixed(0)+'%';
  if(cmv>30){
    return div('fl_ aic gap2',[
      el('span',null,null,{style:'width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0;background:#B5302E'}),
      el('span','bold',cmvStr,{style:'color:#B5302E'}),
      span('tss','revisar ficha',{style:'font-size:10px;background:#FBEAE7;color:#B5302E;padding:1px 8px;border-radius:99px'})
    ]);
  }
  return div('fl_ aic gap2',[
    el('span',null,null,{style:'width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0;background:#2C7A4B'}),
    el('span','bold',cmvStr,{style:'color:var(--vd)'}),
  ]);
}

      b.textContent=(sel?'✓ ':'')+d.label;
    }
    render();
    b.addEventListener('click',()=>{selecionados.has(d.k)?selecionados.delete(d.k):selecionados.add(d.k);render();});
    wrap.appendChild(b);
  });

}

function _resizeImg(file, cb){
  try{
    var r=new FileReader();
    r.onload=function(){
      var img=new Image();
      img.onload=function(){
        var w=img.width,h=img.height,max=1100;
        if(w>max||h>max){ if(w>h){h=Math.round(h*max/w);w=max;} else {w=Math.round(w*max/h);h=max;} }
        var c=document.createElement('canvas'); c.width=w; c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        cb(c.toDataURL('image/jpeg',0.72));
      };
      img.src=r.result;
    };
    r.readAsDataURL(file);
  }catch(e){console.error('resize',e);}
}
function _thumbFromDataUrl(dataUrl, max, cb){
  try{
    var img=new Image();
    img.onload=function(){
      var w=img.width,h=img.height;
      if(w>max||h>max){ if(w>h){h=Math.round(h*max/w);w=max;} else {w=Math.round(w*max/h);h=max;} }
      var c=document.createElement('canvas'); c.width=w;c.height=h; c.getContext('2d').drawImage(img,0,0,w,h);
      cb(c.toDataURL('image/jpeg',0.6));
    };
    img.onerror=function(){cb('');};
    img.src=dataUrl;
  }catch(e){cb('');}
}
function _thumbP(dataUrl,max){ return new Promise(function(res){ _thumbFromDataUrl(dataUrl,max,res); }); }
function buildFotosWidget(fotos){
  var wrap=document.createElement('div');
  var thumbs=document.createElement('div');
  thumbs.style.cssText='display:flex;gap:8px;flex-wrap:wrap;margin-top:8px';
  function render(){
    thumbs.innerHTML='';
    fotos.forEach(function(src,idx){
      var box=document.createElement('div'); box.style.cssText='position:relative;width:84px;height:84px;border-radius:10px;overflow:hidden;border:1.5px solid var(--rb)';
      var im=document.createElement('img'); im.src=src; im.style.cssText='width:100%;height:100%;object-fit:cover;cursor:pointer'; im.addEventListener('click',function(){window.open(src,'_blank');});
      var rm=document.createElement('button'); rm.type='button'; rm.textContent='✕'; rm.style.cssText='position:absolute;top:2px;right:2px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:20px;height:20px;cursor:pointer;font-size:11px;line-height:1';
      rm.addEventListener('click',function(){fotos.splice(idx,1);render();});
      box.appendChild(im); box.appendChild(rm); thumbs.appendChild(box);
    });
  }
  var fileInp=document.createElement('input'); fileInp.type='file'; fileInp.accept='image/*'; fileInp.multiple=true; fileInp.style.display='none';
  fileInp.addEventListener('change',function(){
    var files=Array.prototype.slice.call(this.files); this.value='';
    files.forEach(function(f){ _resizeImg(f,function(d){ fotos.push(d); render(); }); });
  });
  var addBtn=btn('btn bg bsm','📷 Adicionar foto',function(){fileInp.click();});
  wrap.appendChild(addBtn); wrap.appendChild(fileInp); wrap.appendChild(thumbs);
  render();
  return wrap;
}

async function modalFicha(item){

      const existentes=await db('lola_fichas_tecnicas_itens','GET',null,

      existentes.forEach(it=>{
        const isIns=!!it.lola_insumos;
        ings.push({
          tipo:isIns?'insumo':'prep',

          qtd_liquida:it.qtd_liquida,

          unidade:it.unidade,
        });
      });
    }catch(e){console.error('Erro ao carregar itens da ficha:',e);}
  }

  function calcTotais(){
    const ct=ings.length>0?ings.reduce((t,ig)=>t+parseFloat(ig.custo_total||0),0):custoTotalFixo;
    const qtd=parseFloat(f.rendimento_qtd||1);
    const cpp=ings.length>0?ct/qtd:custoPorcaoFixo;
    const pv=parseFloat(f.preco_venda)||0;
    const cmv=pv>0?(cpp/pv*100):null;
    const meta=parseFloat(f.meta_cmv)||33;
    _precoSug=meta>0?cpp/(meta/100):0;
    const cmvCor=cmv==null?'':(cmv<=30?'var(--vd)':'#dc2626');

      (cmv!=null?'<div class="fl_ jb mb3"><span>CMV atual</span><strong style="color:'+cmvCor+'">'+cmv.toFixed(0)+'%</strong></div>':'')+
      '<div class="fl_ jb"><span>Preço sugerido (CMV '+meta+'%)</span><strong class="tv">'+R(_precoSug)+'</strong></div>';
  }

  // Lista unificada: insumos + pré-prods em ordem alfabética com prefixo
  function mkOptsUnificada(){
    const ins=_ins.map(i=>{
      // Determinar unidade de uso baseada na unidade_compra e unidade_custo
      const uc=i.unidade_custo||'kg';
      let unUso;
      if(i.unidade_compra==='g/ml') unUso=uc==='L'?'ml':'g';
      else if(['g','ml'].includes(i.unidade_compra)) unUso=i.unidade_compra;
      else if(i.unidade_compra==='kg') unUso='g';   // compra em kg → usa em g nas receitas
      else if(i.unidade_compra==='L') unUso='ml';   // compra em L → usa em ml nas receitas
      else unUso=i.unidade_compra||'un';             // un, cx, etc
      return {v:'ins:'+i.id,l:i.nome,custo:i.custo_por_unidade,un:unUso,tipo:'insumo',srcId:i.id};
    });
    const pps=_pp.map(p=>({v:'pp:'+p.id,l:'[PP] '+p.nome,custo:p.custo_por_unidade,un:p.rendimento_un,tipo:'prep',srcId:p.id}));
    return [...ins,...pps].sort((a,b)=>a.l.localeCompare(b.l,'pt'));

        calcItem(idx);

      // Unidade selecionável — baseada na unidade do insumo/prep
      const unOpts=(()=>{
        // Para pré-produções, incluir a unidade de rendimento delas
        if(ig.tipo==='prep'){

      })();

      unSel.addEventListener('change',e=>{ig.unidade=e.target.value;calcItem(idx);});

      const qbI=finp('',ig.qtd_bruta!=null&&ig.qtd_bruta!==''?String(ig.qtd_bruta).replace('.',','):'',v=>{ig.qtd_bruta=(v||'').replace(',','.');calcItem(idx);},'text');qbI.setAttribute('inputmode','decimal');

                        ['kg','L'].includes(ig.unidade)?['kg','L','g','ml']:['un','cx','pct','maço']);
        newOpts.forEach(u=>{const o=el('option',null,u,{value:u});if(u===ig.unidade)o.selected=true;unSel.appendChild(o);});

      function calcItem(i){

        // Buscar unidade de custo do insumo/prep para converter corretamente

        let unCusto;

async function iniciarCont(c){
  const[nv]=await db('lola_contagens','POST',{unidade:_conUN,data_contagem:TD(),status:'rascunho'});
  const qtds={};_cat.forEach(x=>qtds[x.id]=0);
  c.innerHTML='';
  c.appendChild(div('al alw mb3',['Contagem em andamento — '+DBR(TD())+' — '+UL[_conUN]+'. Preencha as quantidades encontradas.']));
  const tbody=el('tbody');
  _cat.forEach(item=>{
    const min=item.lola_estoque_minimo?.find(e=>e.unidade===_conUN)?.quantidade_minima||0;
    const inp=el('input','fi',null,{type:'number',step:'0.01',min:'0',value:'0',style:'width:100px'});
    const stEl=el('td','eok','OK');
    const pdEl=el('td','tss','—');
    inp.addEventListener('input',()=>{
      const q=parseFloat(inp.value)||0;qtds[item.id]=q;
      if(q>=min){stEl.textContent='OK';stEl.className='td eok';}
      else if(q>=min*.5){stEl.textContent='Baixo';stEl.className='td ebx';}
      else{stEl.textContent='Crítico';stEl.className='td ecr';}
      const p=Math.max(0,min-q);
      pdEl.textContent=p>0?'+'+p+' '+item.unidade:'—';
      pdEl.style.color=p>0?'var(--v)':'var(--ts)';
    });
    const tr=el('tr');
    [el('td',null,[el('strong',null,item.nome)]),el('td',null,item.unidade),el('td',null,String(min)),el('td',null,[inp]),stEl,pdEl].forEach(td=>tr.appendChild(td));
    tbody.appendChild(tr);
  });
  c.appendChild(div('tw mb3',el('table',null,[
    el('thead',null,el('tr',null,[['Produto','Un.','Mínimo','Encontrado','Status','Pedir'].map(t=>el('th',null,t))])),
    tbody
  ])));
  c.appendChild(div('fl_ jb aic no-print',[
    btn('btn bg','Cancelar',()=>nav('contagem')),
    btn('btn bv','✓ Finalizar e gerar pedido',()=>finCont(nv.id,qtds,c)),
  ]));
}

async function finCont(cid,qtds,c){
  const iP=_cat.map(item=>{
    const min=item.lola_estoque_minimo?.find(e=>e.unidade===_conUN)?.quantidade_minima||0;
    return{catId:item.id,qtd:Math.max(0,min-(parseFloat(qtds[item.id])||0)),item};
  }).filter(i=>i.qtd>0);
  for(const[catId,qtd]of Object.entries(qtds)){
    const ci=_cat.find(x=>x.id===catId);
    const min=ci?.lola_estoque_minimo?.find(e=>e.unidade===_conUN)?.quantidade_minima||0;
    await db('lola_contagem_itens','POST',{contagem_id:cid,catalogo_id:catId,quantidade_encontrada:parseFloat(qtd)||0,quantidade_minima:min});
  }
  await db('lola_contagens','PATCH',{status:'finalizado'},'?id=eq.'+cid);
  if(iP.length>0){
    const vt=iP.reduce((t,i)=>{const pr=_conUN==='ccmq'?i.item.preco_ccmq:i.item.preco_mac;return t+(i.qtd*pr);},0);
    const[ped]=await db('lola_pedidos','POST',{unidade:_conUN,status:'solicitado',data_pedido:TD(),valor_total:vt});
    for(const i of iP){const pr=_conUN==='ccmq'?i.item.preco_ccmq:i.item.preco_mac;await db('lola_pedidos_itens','POST',{pedido_id:ped.id,catalogo_id:i.catId,nome_item:i.item.nome,quantidade:i.qtd,unidade:i.item.unidade,preco_unitario:pr});}
    alert('✅ Contagem finalizada!\nPedido gerado com '+iP.length+' itens.\nTotal: '+R(vt));
  }else{alert('✅ Estoque OK — nenhum pedido gerado.');}
  nav('pedidos');
}

async function gerarPedidoDeContagem(contagemId){
  // Buscar itens da contagem que têm pedido > 0
  const itens=await db('lola_contagem_itens','GET',null,
    '?contagem_id=eq.'+contagemId+'&pedido=gt.0&select=*,lola_estoque_itens!estoque_item_id(nome,unidade,categoria,fornecedor)');
  if(!itens.length){alert('Nenhum item com pedido nesta contagem.');return;}

  // Agrupar por categoria
  const grupos={};
  itens.forEach(it=>{
    const cat=it.lola_estoque_itens?.categoria||'outros';
    if(!grupos[cat])grupos[cat]=[];
    grupos[cat].push(it);
  });

  // Montar modal de revisão
  const ov=div('ov');const mo=div('mo mol');
  mo.appendChild(div('mh',[el('h3',null,'📋 Pedido gerado da contagem'),btn('xb','✕',()=>ov.remove())]));
  const mb2=div('mb');

  const totalItens=itens.length;
  mb2.appendChild(div('custo-box mb3',[
    span('scl','Total de itens a pedir'),
    div('bold tv mt2',totalItens+' itens em '+Object.keys(grupos).length+' categorias'),
  ]));

  Object.entries(grupos).forEach(([cat,gItens])=>{
    const t=document.createElement('div');
    t.style.cssText='font-size:13px;font-weight:700;color:var(--ts);margin:12px 0 6px;padding-bottom:4px;border-bottom:1.5px solid var(--rb)';
    t.textContent=(CONT_CATS[cat]||cat)+' ('+gItens.length+' itens)';
    mb2.appendChild(t);
    mb2.appendChild(div('tw mb2',mkTable(
      ['Produto','Un','Qtd pedido','Fornecedor'],
      gItens.map(it=>[
        el('strong',null,it.lola_estoque_itens?.nome||'—'),
        it.lola_estoque_itens?.unidade||'—',
        el('span','bold tv',N(it.pedido,1)),
        el('span','tss',it.lola_estoque_itens?.fornecedor||'—'),
      ]),
      [null,'tr','tr',null]
    )));
  });

  const mf=div('mf',[
    btn('btn bg','Fechar',()=>ov.remove()),
    btn('btn bp','🖨️ Imprimir lista',()=>{
      const w=window.open('','_blank');
      const rows=itens.map(it=>'<tr><td>'+it.lola_estoque_itens?.nome+'</td><td>'+it.lola_estoque_itens?.unidade+'</td><td>'+N(it.pedido,1)+'</td><td>'+(it.lola_estoque_itens?.fornecedor||'')+'</td></tr>').join('');
      w.document.write('<html><body style="font-family:sans-serif"><h2>Lista de Pedido — Contagem de Estoque</h2><p>'+new Date().toLocaleDateString('pt-BR')+'</p><table border="1" cellpadding="6" style="border-collapse:collapse;width:100%"><tr><th>Produto</th><th>Un</th><th>Qtd</th><th>Fornecedor</th></tr>'+rows+'</table></body></html>');
      w.print();
    }),
  ]);
  mo.appendChild(mb2);mo.appendChild(mf);
  ov.appendChild(mo);ov.addEventListener('click',e=>{
    // Só fecha se clicar exatamente no overlay, nunca em filhos (selects, dropdowns)
    if(e.target===ov&&!mo.contains(e.target))ov.remove();
  });
  document.body.appendChild(ov);
}


async function modalGerenciarItens(categoria, onSave){
  const ov=div('ov');const mo=div('mo mol');

  function rebuild(){
    mb2.innerHTML='';
    mb2.appendChild(ld());
    db('lola_estoque_itens','GET',null,'?categoria=eq.'+categoria+'&ativo=eq.true&order=ordem.asc').then(itens=>{
      mb2.innerHTML='';

      // Botão novo item
      const btnNovo=btn('btn bp bsm','+ Novo item',()=>modalNovoItemEstoque(categoria,()=>rebuild()));
      btnNovo.style.marginBottom='12px';
      mb2.appendChild(btnNovo);

      if(!itens.length){mb2.appendChild(div('tss mt3','Nenhum item cadastrado ainda.'));return;}

      // Tabela
      const tbl=document.createElement('table');
      tbl.style.cssText='width:100%;border-collapse:collapse';
      const thead=document.createElement('thead');
      const hRow=document.createElement('tr');
      ['Produto','Un. compra','Un. uso','Mín.','Fornecedor',''].forEach((h,i)=>{
        const th=document.createElement('th');
        th.style.cssText='padding:7px 8px;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--v);background:var(--rt);text-align:'+(i>=3?'right':'left');
        th.textContent=h;hRow.appendChild(th);
      });
      thead.appendChild(hRow);tbl.appendChild(thead);

      const tbody=document.createElement('tbody');
      itens.forEach((it,idx)=>{
        const tr=document.createElement('tr');
        tr.style.cssText=(idx%2===0?'background:var(--rf)':'background:#fff')+';border-bottom:1px solid var(--rb)';

        function td(txt,align,style){
          const t=document.createElement('td');
          t.style.cssText='padding:8px;font-size:12px;text-align:'+(align||'left')+(style?';'+style:'');
          t.textContent=txt||'—';return t;
        }

        tr.appendChild(td(it.nome));
        tr.appendChild(td(it.unidade_compra||it.unidade,'left','color:var(--ts)'));
        tr.appendChild(td(it.unidade,'left','font-weight:600'));
        tr.appendChild(td(N(it.qtd_minima,0),'right'));
        tr.appendChild(td(it.fornecedor||'','left','color:var(--ts)'));

        // Botões ação
        const tdAcao=document.createElement('td');
        tdAcao.style.cssText='padding:4px 8px;text-align:right;white-space:nowrap';
        const bEdit=btn('btn bg bsm','✏️',()=>modalEditarItemEstoque(it,()=>rebuild()));
        const bDel=btn('btn bd bsm','🗑',async()=>{
          if(!confirm('Excluir "'+it.nome+'"? Esta ação não pode ser desfeita.'))return;
          await db('lola_estoque_itens','PATCH',{ativo:false},'?id=eq.'+it.id);
          rebuild();
        });
        bEdit.style.marginRight='4px';
        tdAcao.appendChild(bEdit);tdAcao.appendChild(bDel);
        tr.appendChild(tdAcao);
        tbody.appendChild(tr);
      });
      tbl.appendChild(tbody);
      mb2.appendChild(tbl);
    });
  }

  mo.appendChild(div('mh',[
    el('h3',null,'⚙️ Gerenciar itens — '+(CONT_CATS[categoria]||categoria)),
    btn('xb','✕',()=>{ov.remove();onSave&&onSave();})
  ]));
  const mb2=div('mb');
  mo.appendChild(mb2);
  mo.appendChild(div('mf',[btn('btn bg','Fechar',()=>{ov.remove();onSave&&onSave();})]));
  ov.appendChild(mo);
  ov.addEventListener('click',e=>{if(e.target===ov&&!mo.contains(e.target))ov.remove();});
  document.body.appendChild(ov);
  rebuild();
}

      var setS=it.setor?(SET_STY[it.setor]||['ph-tag','#F1EFE8','#6B6258']):null;

          '<div style="flex:1;min-width:0"><div style="font-weight:700;font-size:1.02rem;color:var(--tx);line-height:1.2">'+_esc(nome)+'</div>'+catPill+'</div>'+
          '<div style="flex:0 0 auto;text-align:center;background:#FBEAE7;border-radius:14px;padding:8px 14px;min-width:60px"><div style="font-family:Fraunces,serif;font-weight:600;font-size:1.5rem;line-height:1;color:var(--v)">'+qt+'</div><div style="font-size:.66rem;color:#7E1E1F;margin-top:1px">'+_esc(un)+'</div></div>'+
        '</div>'+

        '<div style="display:flex;gap:10px">'+
          '<div style="flex:1;min-width:0"><div style="font-size:.64rem;font-weight:700;text-transform:uppercase;letter-spacing:.03em;color:#B79A8E;margin-bottom:5px">Setor</div>'+setTag+'</div>'+
